<title>Paris · Paulo & Thaise</title>
<style>
  :root{--bg:#efeae1;--ink:#1a1813;--muted:#6e6a5f;--accent:#a8432c;--gold:#9c7b3a;--line:rgba(26,24,19,.14);--card:#fbf9f4}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;line-height:1.6}
  .bar{position:sticky;top:0;z-index:30;background:rgba(239,234,225,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;padding:11px 18px}
  .bar button.back{background:none;border:none;color:var(--accent);font-size:13px;font-weight:600;letter-spacing:.04em;cursor:pointer;padding:0;display:none}
  .bar .bt{flex:1;font-family:Georgia,serif;font-size:15px;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bar .off{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  .col{max-width:620px;margin:0 auto;padding:0 20px}
  .kick{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);font-weight:600}
  .cover{position:relative;height:60vh;min-height:400px;overflow:hidden}
  .cover img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .cover .grad{position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,8,6,.12) 0%,rgba(10,8,6,.03) 34%,rgba(10,8,6,.82) 100%)}
  .cover .txt{position:absolute;left:0;right:0;bottom:0;padding:22px 22px 26px;color:#fff;max-width:620px;margin:0 auto}
  .cover .kick{color:#f0c9bd}
  .cover h1{font-family:Georgia,serif;font-weight:500;font-size:40px;line-height:1.03;letter-spacing:-.015em;margin:10px 0 11px;color:#fff;text-shadow:0 1px 22px rgba(0,0,0,.4)}
  .cover .wx{font-size:13px;color:#efe7da;line-height:1.5}
  .home-h{font-family:Georgia,serif;font-size:19px;font-weight:500;margin:26px 4px 12px}
  .today{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:var(--ink);color:#f4efe4;border:none;border-radius:3px;padding:13px 16px;margin:14px 0;cursor:pointer;font-size:14px}
  .urgent{display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:#fbeede;border:1px solid #ecd3a0;border-radius:3px;padding:12px 15px;margin:9px 0;cursor:pointer;font-size:14px;color:#7a4a0a;font-weight:600}
  .dcard{display:flex;align-items:stretch;gap:0;width:100%;text-align:left;background:var(--card);border:1px solid var(--line);border-radius:3px;margin:9px 0;cursor:pointer;overflow:hidden}
  .dcard .thumb{width:84px;flex:none;background-size:cover;background-position:center}
  .dcard .di{flex:1;padding:12px 14px;min-width:0}
  .dcard .dn{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);font-weight:600}
  .dcard .dt{font-family:Georgia,serif;font-size:18px;line-height:1.2;margin-top:3px}
  .dcard .dw{font-size:12px;color:var(--muted);margin-top:4px}
  .egrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:6px 0 40px}
  .ebtn{background:var(--card);border:1px solid var(--line);border-radius:3px;padding:13px 13px;cursor:pointer;font-size:13.5px;font-weight:600;color:var(--ink);text-align:left}
  .ebtn small{display:block;font-weight:400;color:var(--muted);font-size:11.5px;margin-top:2px}
  .intro{font-size:16px;color:#46423a;font-style:italic;font-family:Georgia,serif;padding:24px 0 4px}
  .daybtns{display:flex;gap:8px;margin:8px 0 6px}
  .daybtns button{flex:1;background:var(--card);border:1px solid var(--line);border-radius:3px;padding:11px;font-size:12.5px;font-weight:600;color:var(--ink);cursor:pointer;letter-spacing:.04em}
  .stop{padding:28px 0;border-bottom:1px solid var(--line)}
  .stop .num{font-family:Georgia,serif;font-size:13px;color:var(--accent)}
  .stop h2{font-family:Georgia,serif;font-weight:500;font-size:29px;line-height:1.1;margin:6px 0 7px;letter-spacing:-.01em}
  .stop .dek{font-family:Georgia,serif;font-style:italic;font-size:16.5px;color:var(--muted);margin-bottom:13px}
  .stop p{font-size:15.5px;line-height:1.78;color:#34312a;margin:12px 0}
  .stop p em{font-style:italic}
  .stop figure{margin:4px -20px 16px;overflow:hidden}
  .stop figure img{width:100%;display:block;height:244px;object-fit:cover}
  .breathe{background:var(--card);border:1px solid var(--line);padding:14px 16px;margin:16px 0}
  .breathe .bl{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px}
  .breathe p{margin:0;font-size:14px;font-style:italic;color:#4a4639;line-height:1.7}
  .photoq{border-left:2px solid var(--accent);padding:1px 0 1px 15px;margin:16px 0;font-size:13.5px;line-height:1.6;color:#34312a}
  .photoq .pl{display:block;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:4px}
  .merch{margin:14px 0}
  .merch .ml{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:7px}
  .merch .mi{display:flex;justify-content:space-between;gap:12px;font-size:13.5px;padding:5px 0;border-bottom:1px dotted var(--line)}
  .merch .mi b{font-weight:600}
  .facts{display:flex;flex-wrap:wrap;gap:6px 18px;font-size:12px;letter-spacing:.05em;color:var(--muted);text-transform:uppercase;margin:16px 0 12px}
  .facts b{color:var(--ink);font-weight:600}
  .acts{display:flex;gap:8px;flex-wrap:wrap}
  a.map,button.show{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--ink);color:var(--ink);background:none;text-decoration:none;padding:10px 16px;font-size:12px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer}
  .endphrase{background:var(--ink);color:#f4efe4;padding:17px;margin:22px 0}
  .endphrase .hl{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#e0a892;font-weight:700}
  .endphrase .hfr{font-family:Georgia,serif;font-size:19px;margin:8px 0 3px}
  .endphrase .hpt{font-size:12.5px;color:#cfc8b8;margin-top:6px}
  .ess{font-size:14.5px;color:#34312a;padding-bottom:40px}
  .ess h2{font-family:Georgia,serif;font-weight:500;font-size:27px;margin:24px 0 6px}
  .ess p{margin:9px 0;line-height:1.7}
  .ess .box{background:var(--card);border:1px solid var(--line);padding:13px 15px;margin:11px 0}
  .ess ul{list-style:none;margin:8px 0}
  .ess li{margin:9px 0;padding-left:18px;position:relative;line-height:1.55}
  .ess li::before{content:"—";position:absolute;left:0;color:var(--accent)}
  .ess a{color:var(--accent);font-weight:600}
  .pcat{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);font-weight:600;margin:22px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--line)}
  .prow{display:flex;align-items:center;gap:13px;padding:10px 0;border-bottom:1px solid var(--line)}
  .pmain{flex:1;min-width:0}.pfr{font-family:Georgia,serif;font-size:17px;line-height:1.25}.ppr{font-size:12px;color:var(--accent);margin-top:2px}.ppt{font-size:13px;color:var(--muted);margin-top:2px}
  .play{flex:none;width:44px;height:44px;border-radius:50%;border:1px solid var(--ink);background:var(--bg);font-size:17px;cursor:pointer;transition:.15s}
  .play.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .hero-phrase{background:var(--ink);color:#f4efe4;padding:18px;margin:4px 0 8px}
  .hero-phrase .hl{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#e0a892;font-weight:700}
  .hero-phrase .hfr{font-family:Georgia,serif;font-size:20px;margin:8px 0 3px}.hero-phrase .hpr{font-size:12px;color:#c9c2b2}.hero-phrase .hpt{font-size:13px;color:#cfc8b8;margin-top:12px}
  #show{display:none;position:fixed;inset:0;z-index:50;background:#16140f;color:#fff;padding:30px;flex-direction:column;align-items:center;justify-content:center;text-align:center}
  #show.on{display:flex}
  #show .lab{font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:#e0a892;margin-bottom:20px}
  #show .big{font-family:Georgia,serif;font-size:30px;line-height:1.35}
  #show button{margin-top:40px;background:none;border:1px solid #fff;color:#fff;padding:12px 26px;font-size:13px;letter-spacing:.08em;text-transform:uppercase;border-radius:40px;cursor:pointer}
  .pday{margin-bottom:34px}
  .phero{display:block;width:100%;height:230px;object-fit:cover;border-radius:3px;margin-bottom:10px}
  .ptitle{font-family:Georgia,serif;font-weight:500;font-size:30px;letter-spacing:-.01em;margin:6px 0 4px}
  .pwx{font-size:13px;color:var(--muted);margin-bottom:2px}
  .printbtn{display:block;width:100%;background:var(--accent);color:#fff;border:none;border-radius:3px;padding:13px;font-size:14px;font-weight:600;letter-spacing:.04em;cursor:pointer;margin:12px 0}
  @media print{
   .bar,.daybtns,.acts,.play,.today,.urgent,.printbtn,#show{display:none!important}
   body{background:#fff}.col{max-width:100%}
   .stop,.endphrase,figure{page-break-inside:avoid}
   .pday{page-break-before:always}.pday:first-child{page-break-before:auto}
   .stop figure img,.phero{max-height:240px}
   a{color:#1a1813!important;text-decoration:none}
  }
  .howto{margin:14px 0;border-top:1px solid var(--line);padding-top:9px}
  .howto>summary{cursor:pointer;list-style:none;color:#185a8a;font-size:13px;font-weight:600}
  .howto>summary::-webkit-details-marker{display:none}
  .howto .htext{font-size:13.5px;color:#34312a;line-height:1.65;margin-top:7px}
  #gohome{position:fixed;right:14px;bottom:16px;z-index:40;background:var(--ink);color:#fff;text-decoration:none;padding:11px 16px;border-radius:30px;font-size:13px;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,.28)}
  @media print{#gohome{display:none}}
</style>
</head>

<script>
var DAYS=[
{n:1,wd:"Sábado · 27 jun",hero:"img/paris.jpg",tag:"Chegada",title:"Bem-vindos a Paris",

  {k:"~40 min",t:"Orly → hotel",b:"Com malas e cansaço, peguem o táxi oficial na fila (placa Taxis). Tarifa FIXA €44 até essa zona. Mostrem o endereço ao motorista.",addr:"La Planque Hotel, 3 Rue Arthur Groussier, 75010 Paris",maps:"La Planque Hotel 3 Rue Arthur Groussier 75010 Paris"},

   hist:"Você está num pedaço de Paris que Napoleão mandou cavar: o Canal Saint-Martin foi aberto a partir de 1802 pra trazer água limpa e escoar mercadorias. Suas eclusas e passarelas de ferro arqueadas viraram cartão-postal — e cenário do filme Amélie Poulain. Hoje o 10e é descolado, de parisienses de verdade.",

  {k:"noite",t:"Jantar simples, dormir cedo",b:"Não force hoje. Amanhã o corpo já acorda no fuso de Paris."}

{n:2,wd:"Domingo · 28 jun",hero:"img/place-des-vosges.png",tag:"Livre a dois + garimpo",title:"O Marais, devagar",

 blocks:[
  {k:"manhã",t:"Place des Vosges",dek:"Duzentos anos antes de Haussmann, alguém já desenhava Paris como um conjunto.",
   b:"Sentem no jardim antes do calor, deem a volta pelas arcadas na sombra e entrem de graça na Casa de Victor Hugo (esquina sudeste) — ele morou no nº 6 e escreveu parte de Os Miseráveis aqui. Encomendada por Henrique IV e inaugurada em 1612, é a primeira praça planejada da cidade: 36 pavilhões idênticos de tijolo e pedra.",
   hist:"Por séculos a aristocracia duelava de espada no centro deste jardim, mesmo o rei tendo proibido — o endereço mais elegante de Paris também foi o mais sangrento. Hoje o mesmo gramado é onde os parisienses tomam sol no domingo.",
   foto:"Os dois pavilhões do meio — do Rei (sul) e da Rainha (norte) — são mais altos e quebram a simetria de propósito. E procure o ponto onde as arcadas fogem em perspectiva.",

   foto:"💎 Pra outro dia: <b>Thanx God I'm a VIP</b> (12 Rue de Lancry, do lado do hotel) — luxo de 2ª mão a fração do preço, seg–sáb 14h–20h. <a href='https://www.google.com/maps/search/?api=1&query=Thanx%20God%20Im%20a%20VIP%2012%20Rue%20de%20Lancry%2075010%20Paris' target='_blank' rel='noopener' style='color:#a8432c;font-weight:600;white-space:nowrap'>📍 abrir no mapa</a>",
   maps:"Kilo Shop 69 Rue de la Verrerie Paris"},
  {k:"noite",t:"Jantar de barco no Sena",dek:"Ver Paris da água é entender que tudo nasceu deste eixo líquido.",photo:"img/pont-alexandre.jpg",
   b:"Ponto de embarque conforme o grupo. Levem casaco: parado, o barco venta de verdade. A cidade nasceu como Lutécia, povoado romano na Île de la Cité. A Pont Alexandre III, dourada, foi feita pra Expo de 1900; a Pont Neuf, apesar do nome novo, é a mais antiga.",
   hist:"A Pont Alexandre III é quase plana de propósito, pra não tapar a vista dos Invalides de um lado e dos Champs-Élysées do outro — engenharia a serviço da paisagem. As ninfas e cavalos alados dourados seguram a ponte como uma joia.",

{n:3,wd:"Segunda · 29 jun",hero:"img/arc.jpg",tag:"Curso da Thaise · seu 1º dia",title:"O eixo de Paris, a pé",

  {k:"€22",t:"Arco do Triunfo",dek:"O terraço de onde os 8 km de Paris se revelam de uma vez.",

   facts:["€22","até 23h","M° Charles de Gaulle–Étoile"],maps:"Arc de Triomphe Paris"},
  {k:"a pé",t:"Champs-Élysées + Grand Palais",photo:"img/grand-palais.jpg",
   b:"Desça a avenida. Grand Palais e Petit Palais fecham segunda, mas as fachadas valem — e logo adiante, a Pont Alexandre III.",

  {k:"a pé",t:"Concorde → Pirâmide do Louvre",photo:"img/louvre.jpg",

  {k:"18h",t:"Reencontro",b:"Encontre a Thaise no 23 Av. des Champs-Élysées e voltem juntos.",addr:"23 Av. des Champs-Élysées, 75008 Paris",maps:"23 Avenue des Champs-Elysees Paris"}
 ],phrase:{fr:"Un café, s'il vous plaît.",pt:"Um café, por favor. (vem expresso e curto.)"}},

{n:4,wd:"Terça · 30 jun",hero:"img/palais-garnier.jpg",tag:"Curso (Vendôme) · tesouros escondidos",title:"As galerias cobertas",
 wx:{t:"26° / 16°",r:"36% chuva",wear:"Ameno. Smart-casual elegante; sapato confortável."},
 intro:"Terça o Louvre e várias coleções fecham — mas as galerias cobertas e a Salle Ovale abrem. Um dia de tesouros a poucos passos, quase sem turistas.",
 blocks:[

  {k:"a pé",t:"Place Vendôme",photo:"img/place-vendome.jpg",

6:["Do hotel: a pé até Goncourt → L11 (dir. Châtelet) até Châtelet → L1 (dir. La Défense) até George V (~25 min); a estação fica ao lado do nº 62.","George V → L1 (dir. La Défense) 1 parada até Charles de Gaulle–Étoile → L6 (dir. Nation) até Trocadéro (~15 min). A Cité fica no Palais de Chaillot, na própria praça.","A pé: você já está no Trocadéro. Atravesse a esplanada — é o ponto da foto da Torre Eiffel (2 min).","A pé (~11 min) descendo a Av. du Président Wilson até o Palais de Tokyo. À noite, táxi/Uber (~€18–22)."],

8:["Do hotel: a pé até Goncourt → L11 (dir. Châtelet) até Hôtel de Ville (4 paradas, ~8 min); atravesse a ponte a pé até a ilha (5–7 min).","A pé, na mesma ilha: da Notre-Dame à Sainte-Chapelle ~6 min. Atenção a batedores na fila.","A pé (~10 min) pela Pont Marie; o Pavillon fica a 80 m de Sully-Morland. VOLTA: L7 (dir. La Courneuve) até Châtelet → L11 (dir. Mairie des Lilas) até Goncourt. Se tarde, táxi ~€12–15."],
9:["Do hotel: a pé até République (7 min) → L8 (dir. Balard) até Concorde → L12 (dir. Mairie d'Issy) até Solférino (1 parada); 5 min a pé até o Orsay (~30 min).","ROTA SEGURA por ABBESSES (não desça em Barbès nem Anvers): Solférino → L12 (dir. Aubervilliers) até Abbesses (~20 min). Use o ELEVADOR (estação funda) e suba por ruas movimentadas. À NOITE, volte de táxi do Sacré-Cœur (~€20–25)."],
10:["A pé, no bairro: o Canal começa a ~5 min da porta do hotel. Seguro e bonito de manhã.","Do hotel: a pé até République → L8 (dir. Balard) até Concorde → L12 (dir. Mairie d'Issy) até Sèvres-Babylone; 2 min a pé (~35 min).","VOLTA pra pegar as malas: L12 (dir. Aubervilliers) até Madeleine → L8 (dir. Créteil) até République. Com compras, táxi ~€15–18.","HOTEL → ORLY com 2 malas: TÁXI tarifa FIXA ~€44 (24h, malas incluídas, porta a porta, ~30–45 min). Saiam ~15h30–16h. Alternativa (~€16/pessoa): L11 (Goncourt, dir. Châtelet) → L14 (dir. Aéroport d'Orly) — precisa do bilhete 'Paris-Aéroport'. Com mala, recomendo o táxi.",""]

function mh(q){return "https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(q);}
function el(id){return document.getElementById(id);}
function setbar(t,back){el('bt').textContent=t;el('back').style.display=back?'inline-block':'none';}
function go(fn){window.scrollTo(0,0);fn();}
function dayMapUrl(d){var pts=[];d.blocks.forEach(function(b){if(b.maps)pts.push(encodeURIComponent(b.maps));});return "https://www.google.com/maps/dir/"+pts.join('/');}

function blockHTML(b,tr,route,openD){
 var h='<article class="stop"><span class="num">'+(b.k||'')+'</span><h2>'+b.t+'</h2>';
 if(b.dek)h+='<div class="dek">'+b.dek+'</div>';
 if(b.photo)h+='<figure><img src="'+b.photo+'" alt="'+b.t+'" loading="lazy"></figure>';
 if(b.b)h+='<p>'+b.b+'</p>';
 if(b.hist)h+='<div class="breathe"><div class="bl">✦ Respire a história</div><p>'+b.hist+'</p></div>';
 if(b.merch){h+='<div class="merch"><div class="ml">'+b.merch.l+'</div>';b.merch.items.forEach(function(it){h+='<div class="mi"><span>'+it[0]+(it[2]?' <a href="'+mh(it[2])+'" target="_blank" rel="noopener" style="color:#a8432c;white-space:nowrap">📍</a>':'')+'</span><b>'+it[1]+'</b></div>';});h+='</div>';}
 if(b.foto)h+='<div class="photoq"><span class="pl">✦ Tire uma foto disto</span>'+b.foto+'</div>';
 if(tr)h+='<details class="howto"'+(openD?' open':'')+'><summary>🚇 Como chegar</summary><div class="htext">'+tr+(route?' <a href="'+route+'" target="_blank" rel="noopener" style="color:#185a8a;white-space:nowrap">ver rota no mapa →</a>':'')+'</div></details>';
 if(b.facts)h+='<div class="facts">'+b.facts.map(function(f){return '<span>'+f+'</span>';}).join('')+'</div>';
 if(b.maps||b.addr){var q=b.maps||b.addr;h+='<div class="acts"><a class="map" target="_blank" rel="noopener" href="'+mh(q)+'">Abrir no mapa →</a>';if(b.addr)h+='<button class="show" data-show="'+b.addr+'">👁 mostrar</button>';h+='</div>';}
 return h+'</article>';
}
function openDay(n){
 var d=DAYS.find(function(x){return x.n===n;});
 setbar('Dia '+n+' · '+d.wd.split(' · ')[0],true);
 var h='<header class="cover"><img src="'+d.hero+'" alt=""><div class="grad"></div><div class="txt"><div class="kick">Dia '+d.n+' · '+d.wd+'</div><h1>'+d.title+'</h1><div class="wx">'+d.wx.t+' · '+d.wx.r+' · '+d.wx.wear+'</div></div></header>';
 h+='<div class="col"><p class="intro">'+d.intro+'</p>';
 h+='<div class="daybtns"><button onclick="openMapaDia('+n+')">🗺️ ver o dia no mapa</button></div>';

 d.blocks.forEach(function(b,i){var tr=(TRANSIT[d.n]||[])[i]||'';var route='';if(b.maps){var orig=(i>0&&d.blocks[i-1].maps)?d.blocks[i-1].maps:HQ;route="https://www.google.com/maps/dir/"+encodeURIComponent(orig)+"/"+encodeURIComponent(b.maps);}h+=blockHTML(b,tr,route,false);});
 h+='<div class="endphrase"><div class="hl">Frase do dia</div><div class="hfr">'+d.phrase.fr+'</div><button class="play" data-say="'+d.phrase.fr+'" style="margin-top:10px;width:auto;border-radius:40px;padding:9px 18px;font-size:13px">🔊 ouvir</button><div class="hpt">'+d.phrase.pt+'</div></div>';

 h+='</div>';

function openMapaDia(n){var d=DAYS.find(function(x){return x.n===n;});window.open(dayMapUrl(d),'_blank');}

var FRVOICE=null;
function pickVoice(){try{var vs=window.speechSynthesis.getVoices();FRVOICE=vs.filter(function(v){return /^fr/i.test(v.lang);})[0]||null;}catch(e){}}
if('speechSynthesis' in window){pickVoice();window.speechSynthesis.onvoiceschanged=pickVoice;}
function speak(t){if(!('speechSynthesis' in window)){alert('O áudio funciona no navegador do celular (Safari/Chrome).');return;}window.speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(t);u.lang='fr-FR';u.rate=0.88;if(FRVOICE)u.voice=FRVOICE;window.speechSynthesis.speak(u);}
document.addEventListener('click',function(e){
 var s=e.target.closest('[data-say]');if(s){speak(s.getAttribute('data-say'));s.classList.add('on');setTimeout(function(){s.classList.remove('on');},700);return;}
 var sh=e.target.closest('[data-show]');if(sh){el('showbig').textContent=sh.getAttribute('data-show');el('show').classList.add('on');}
});
el('back').onclick=function(){go(renderHome);};
renderHome();

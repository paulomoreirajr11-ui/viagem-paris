<title>Paris · Paulo & Thaise</title>
<style>
  :root{--bg:#efeae1;--ink:#1a1813;--muted:#6e6a5f;--accent:#a8432c;--gold:#9c7b3a;--line:rgba(26,24,19,.14);--card:#fbf9f4}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;line-height:1.6}

  .home-h{font-family:Georgia,serif;font-size:19px;font-weight:500;margin:26px 4px 12px}
  .today{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:var(--ink);color:#f4efe4;border:none;border-radius:3px;padding:13px 16px;margin:14px 0;cursor:pointer;font-size:14px}

  .dcard .dn{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);font-weight:600}
  .dcard .dt{font-family:Georgia,serif;font-size:18px;line-height:1.2;margin-top:3px}
  .dcard .dw{font-size:12px;color:var(--muted);margin-top:4px}
  .egrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:6px 0 40px}
  .ebtn{background:var(--card);border:1px solid var(--line);border-radius:3px;padding:13px 13px;cursor:pointer;font-size:13.5px;font-weight:600;color:var(--ink);text-align:left}
  .ebtn small{display:block;font-weight:400;color:var(--muted);font-size:11.5px;margin-top:2px}
  .intro{font-size:16px;color:#46423a;font-style:italic;font-family:Georgia,serif;padding:24px 0 4px}
  .daybtns{display:flex;gap:8px;margin:8px 0 6px}
  .daybtns button{flex:1;background:var(--card);border:1px solid var(--line);border-radius:3px;padding:11px;font-size:12.5px;font-weight:600;color:var(--ink);cursor:pointer;letter-spacing:.04em}
  .stop{padding:28px 0;border-bottom:1px solid var(--line)}
  .stop .num{font-family:Georgia,serif;font-size:13px;color:var(--accent)}

  .stop .dek{font-family:Georgia,serif;font-style:italic;font-size:16.5px;color:var(--muted);margin-bottom:13px}
  .stop p{font-size:15.5px;line-height:1.78;color:#34312a;margin:12px 0}
  .stop p em{font-style:italic}
  .stop figure{margin:4px -20px 16px;overflow:hidden}
  .stop figure img{width:100%;display:block;height:244px;object-fit:cover}
  .breathe{background:var(--card);border:1px solid var(--line);padding:14px 16px;margin:16px 0}
  .breathe .bl{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px}
  .breathe p{margin:0;font-size:14px;font-style:italic;color:#4a4639;line-height:1.7}
  .photoq{border-left:2px solid var(--accent);padding:1px 0 1px 15px;margin:16px 0;font-size:13.5px;line-height:1.6;color:#34312a}
  .photoq .pl{display:block;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:4px}
  .merch{margin:14px 0}
  .merch .ml{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:7px}
  .merch .mi{display:flex;justify-content:space-between;gap:12px;font-size:13.5px;padding:5px 0;border-bottom:1px dotted var(--line)}
  .merch .mi b{font-weight:600}
  .facts{display:flex;flex-wrap:wrap;gap:6px 18px;font-size:12px;letter-spacing:.05em;color:var(--muted);text-transform:uppercase;margin:16px 0 12px}
  .facts b{color:var(--ink);font-weight:600}
  .acts{display:flex;gap:8px;flex-wrap:wrap}
  a.map,button.show{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--ink);color:var(--ink);background:none;text-decoration:none;padding:10px 16px;font-size:12px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer}
  .endphrase{background:var(--ink);color:#f4efe4;padding:17px;margin:22px 0}
  .endphrase .hl{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#e0a892;font-weight:700}
  .endphrase .hfr{font-family:Georgia,serif;font-size:19px;margin:8px 0 3px}
  .endphrase .hpt{font-size:12.5px;color:#cfc8b8;margin-top:6px}
  .ess{font-size:14.5px;color:#34312a;padding-bottom:40px}
  .ess h2{font-family:Georgia,serif;font-weight:500;font-size:27px;margin:24px 0 6px}
  .ess p{margin:9px 0;line-height:1.7}
  .ess .box{background:var(--card);border:1px solid var(--line);padding:13px 15px;margin:11px 0}
  .ess ul{list-style:none;margin:8px 0}
  .ess li{margin:9px 0;padding-left:18px;position:relative;line-height:1.55}
  .ess li::before{content:"—";position:absolute;left:0;color:var(--accent)}
  .ess a{color:var(--accent);font-weight:600}
  .pcat{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);font-weight:600;margin:22px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--line)}
  .prow{display:flex;align-items:center;gap:13px;padding:10px 0;border-bottom:1px solid var(--line)}
  .pmain{flex:1;min-width:0}.pfr{font-family:Georgia,serif;font-size:17px;line-height:1.25}.ppr{font-size:12px;color:var(--accent);margin-top:2px}.ppt{font-size:13px;color:var(--muted);margin-top:2px}
  .play{flex:none;width:44px;height:44px;border-radius:50%;border:1px solid var(--ink);background:var(--bg);font-size:17px;cursor:pointer;transition:.15s}
  .play.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .hero-phrase{background:var(--ink);color:#f4efe4;padding:18px;margin:4px 0 8px}
  .hero-phrase .hl{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#e0a892;font-weight:700}
  .hero-phrase .hfr{font-family:Georgia,serif;font-size:20px;margin:8px 0 3px}.hero-phrase .hpr{font-size:12px;color:#c9c2b2}.hero-phrase .hpt{font-size:13px;color:#cfc8b8;margin-top:12px}
  #show{display:none;position:fixed;inset:0;z-index:50;background:#16140f;color:#fff;padding:30px;flex-direction:column;align-items:center;justify-content:center;text-align:center}
  #show.on{display:flex}
  #show .lab{font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:#e0a892;margin-bottom:20px}
  #show .big{font-family:Georgia,serif;font-size:30px;line-height:1.35}
  #show .srow{display:flex;gap:12px;margin-top:36px}
  #show .sbtn{background:none;border:1px solid #fff;color:#fff;padding:13px 22px;font-size:13px;letter-spacing:.05em;text-transform:uppercase;border-radius:40px;cursor:pointer;text-decoration:none}
  #show .sbtn.alt{border-color:#e0a892;color:#e0a892}
  .pday{margin-bottom:34px}
  .phero{display:block;width:100%;height:230px;object-fit:cover;border-radius:3px;margin-bottom:10px}
  .ptitle{font-family:Georgia,serif;font-weight:500;font-size:30px;letter-spacing:-.01em;margin:6px 0 4px}
  .pwx{font-size:13px;color:var(--muted);margin-bottom:2px}
  .printbtn{display:block;width:100%;background:var(--accent);color:#fff;border:none;border-radius:3px;padding:13px;font-size:14px;font-weight:600;letter-spacing:.04em;cursor:pointer;margin:12px 0}
  @media print{
   .bar,.daybtns,.acts,.play,.today,.urgent,.printbtn,#show{display:none!important}
   body{background:#fff}.col{max-width:100%}
   .stop,.endphrase,figure{page-break-inside:avoid}
   .pday{page-break-before:always}.pday:first-child{page-break-before:auto}
   .stop figure img,.phero{max-height:240px}
   a{color:#1a1813!important;text-decoration:none}
  }
  .howto{margin:14px 0;border-top:1px solid var(--line);padding-top:9px}

  .howto>summary::-webkit-details-marker{display:none}
  .howto .htext{font-size:13.5px;color:#34312a;line-height:1.65;margin-top:7px}
  .dive{margin:12px 0;border-top:1px solid var(--line);padding-top:9px}
  .dive>summary{cursor:pointer;list-style:none;color:#7a5bb0;font-size:13px;font-weight:600}
  .dive>summary::-webkit-details-marker{display:none}
  .dive .htext{font-size:13.5px;color:#34312a;line-height:1.7;margin-top:7px}
  body.dark .dive .htext{color:#d8d2c6}
  body.dark .dive>summary{color:#b9a3e0}
  .extras{margin:24px 0 4px;padding-top:16px;border-top:2px solid var(--accent)}
  .extras .eh{font-family:Georgia,serif;font-size:18px}
  .extras .es{font-size:12.5px;color:var(--muted);margin:2px 0 12px}
  .xcard{background:var(--card);border:1px solid var(--line);border-radius:8px;overflow:hidden;margin:11px 0}
  .xcard img{width:100%;height:152px;object-fit:cover;display:block}
  .xcard .xi{padding:11px 14px}
  .xcard .xtr{font-size:12px;color:#185a8a;line-height:1.45;margin-bottom:7px}
  body.dark .xcard .xtr{color:#7fb4e0}
  .tlist{list-style:none;margin:8px 0}
  .tlist li{font-size:14px;color:#34312a;padding:7px 0 7px 18px;position:relative;border-bottom:1px solid var(--line);line-height:1.45}
  .tlist li::before{content:"·";position:absolute;left:4px;color:var(--accent);font-weight:700}
  body.dark .tlist li{color:#d8d2c6}
  .countdown{text-align:center;font-size:13px;letter-spacing:.04em;color:var(--accent);font-weight:600;margin:14px 0 2px}
  .tday{font-family:Georgia,serif;font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);font-weight:700;margin:32px 0 6px;padding-top:16px;border-top:2px solid var(--accent)}
  .tday.first{border-top:none;padding-top:6px;margin-top:8px}
  .moment{background:linear-gradient(180deg,#fbeef2,#f6e3ea);border:1px solid #e7c9d4;border-radius:14px;padding:15px 18px;margin:24px 0 4px}
  body.dark .moment{background:#291722;border-color:#52243a}
  .moment .mhd{font-family:Georgia,serif;font-weight:700;color:#8a2a4d;font-size:16px;margin-bottom:6px}
  body.dark .moment .mhd{color:#e79bb5}
  .moment p{font-size:15px;line-height:1.6;margin:0;color:#3f2933}
  body.dark .moment p{color:#ecd9e0}
  .moment .jantar{margin-top:13px;padding-top:12px;border-top:1px dashed #e0b9c6}
  .moment .jhd{font-weight:700;color:#a8432c;font-size:14px;margin-bottom:3px}
  body.dark .moment .jhd{color:#d98a6f}
  .moment .jantar a.map{display:block;margin:7px 0 0}
  .xcard .xt{font-weight:600;font-size:14.5px;line-height:1.2}
  .xcard .xw{font-size:12.5px;color:var(--muted);line-height:1.45;margin:4px 0 7px}
  .xcard a{font-size:11.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--accent);font-weight:600;text-decoration:none}
  body.dark .xcard .xw{color:#a8a294}
  #gohome{position:fixed;right:14px;bottom:16px;z-index:40;background:var(--ink);color:#fff;text-decoration:none;padding:11px 16px;border-radius:30px;font-size:13px;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,.28)}
  @media print{#gohome{display:none}}
  .goldline{font-size:12.5px;color:var(--gold);background:var(--card);border:1px solid var(--line);border-radius:3px;padding:9px 12px;margin:8px 0 2px;line-height:1.5}
  .ess input[type=number]{font-size:15px;padding:6px 8px;border:1px solid var(--line);border-radius:4px;background:var(--card);color:var(--ink)}
  #themebtn{background:none;border:none;font-size:16px;cursor:pointer;padding:0;line-height:1}
  body.dark{--bg:#15130e;--ink:#ece6da;--muted:#9c978b;--card:#211d16;--line:rgba(236,230,218,.13);--accent:#cf7152;--gold:#c2a05a}
  body.dark .bar{background:rgba(21,19,14,.92)}
  body.dark .stop p,body.dark .photoq,body.dark .ess,body.dark .howto .htext,body.dark .merch .mi{color:#d8d2c6}
  body.dark .breathe p{color:#cdc7b8}
  body.dark .intro{color:#b8b2a4}
  body.dark .endphrase,body.dark .hero-phrase,body.dark .today,body.dark #gohome{background:#0f0d09}
  body.dark .urgent{background:#33291a;border-color:#5a4a2a;color:#e8c98a}
  body.dark .ess a,body.dark .howto>summary{color:#e0a892}
</style>

<script>
var DAYS=[
{n:1,wd:"Sábado · 27 jun",hero:"img/paris.jpg",tag:"Chegada",title:"Bem-vindos a Paris",momento:"À noite, no terraço do Trocadéro, escolham um degrau só pra vocês e fiquem quietos quando a Torre começar a cintilar. Não levantem o celular no primeiro minuto — guardem essa imagem só na memória. É a chegada de vocês a Paris.",
 wx:{t:"32° / 20°",r:"20% chuva",wear:"Calor — roupa leve e tênis; 1 casaco fino pra noite."},
 intro:"Hoje é leve de propósito: chegar, largar as malas, sentir o bairro e dormir cedo. Mas o sol só se põe às 22h — a tarde rende.",
 blocks:[
  {k:"09:55",t:"Pouso em Orly",b:"Vocês chegam de Madri, já dentro da Europa — em Orly NÃO tem fila de passaporte. Peguem as 2 malas e sigam pra saída."},
  {k:"~40 min",t:"Orly → hotel",b:"Com malas e cansaço, peguem o táxi oficial na fila (placa Taxis). Tarifa FIXA €44 até essa zona. Aperte o 🔊 abaixo e mostre o endereço — o motorista entende.",say:"Bonjour, pouvez-vous m'emmener à cette adresse, s'il vous plaît ?",addr:"La Planque Hotel, 3 Rue Arthur Groussier, 75010 Paris",maps:"La Planque Hotel 3 Rue Arthur Groussier 75010 Paris"},
  {k:"a partir das 15h",t:"Check-in · La Planque",b:"Se o quarto não estiver pronto, deixem as malas e vão almoçar. Café da manhã incluído. M° Goncourt (linha 11), 3 min a pé.",addr:"3 Rue Arthur Groussier, 75010 Paris",maps:"La Planque Hotel 3 Rue Arthur Groussier 75010 Paris",
   hist:"Você está num pedaço de Paris que Napoleão mandou cavar: o Canal Saint-Martin foi aberto a partir de 1802 pra trazer água limpa e escoar mercadorias. Suas eclusas e passarelas de ferro arqueadas viraram cartão-postal — e cenário do filme Amélie Poulain. Hoje o 10e é descolado, de parisienses de verdade.",
   foto:"Pare numa das passarelas giratórias de ferro: quando uma barcaça passa pela eclusa, a ponte ainda gira pra liberar o caminho — engenharia do século XIX viva até hoje."},
  {k:"tarde",t:"A primeira tarde: o Canal Saint-Martin",dek:"Por que aqui? É o passeio mais bonito a 5 min do hotel — sentir Paris sem cansar no jet lag.",photo:"img/canal.jpg",b:"Caminhada leve pela beira d'água, começando no Quai de Valmy: as pontes de ferro, as eclusas, os parisienses sentados na margem com uma garrafa de vinho. Pare num café e deixe o corpo entender que chegou.",hist:"Boa parte do canal corre escondida — a partir da Bastille ele mergulha num túnel de 2 km sob a cidade. Os barcos vencem 25 metros de desnível subindo uma 'escada de água' feita de eclusas. À beira fica o Hôtel du Nord (1885), que virou lenda do cinema francês. É o passeio preferido dos parisienses no fim da tarde.",foto:"As passarelas de ferro que GIRAM pra deixar a barcaça passar pela eclusa — engenharia de 1820 funcionando até hoje.",maps:"Quai de Valmy Canal Saint-Martin 75010 Paris"},
  {k:"noite",t:"A primeira noite: a Torre Eiffel",dek:"Por que aqui? Não há estreia melhor em Paris do que ver a Torre acender na primeira noite. Vale o cansaço.",photo:"img/eiffel.jpg",b:"No fim da tarde, vão de metrô ao Trocadéro: do terraço, a Torre aparece inteira do outro lado do Sena. Fiquem pro escurecer — a cada hora cheia ela cintila por 5 minutos. É a foto da vida de vocês. Depois, táxi direto pro hotel.",hist:"Construída em 1889 para a Exposição do centenário da Revolução, a Torre era pra ser TEMPORÁRIA, desmontada em 20 anos. Trezentos artistas assinaram um manifesto contra ela; o que a salvou foi a antena de rádio no topo. Hoje, 20 mil lâmpadas a fazem cintilar.",foto:"Do terraço do Trocadéro, a Torre emoldurada entre as duas alas do Palais de Chaillot — o ângulo clássico. Fique no lado direito da esplanada pra fugir da multidão.",maps:"Place du Trocadero 75116 Paris"}
 ],phrase:{fr:"Bonjour ! Une table pour deux, s'il vous plaît.",pt:"Olá! Uma mesa para dois, por favor."}},

{n:2,wd:"Domingo · 28 jun",hero:"img/place-des-vosges.jpg",tag:"Livre a dois + garimpo",title:"O Marais, devagar",momento:"Na Place des Vosges, sentem num banco sob as arcadas de tijolo rosa — a praça mais antiga de Paris (1612), onde Victor Hugo morou. Dez minutos sem pressa e sem celular, só vendo a luz baixar. Reis se casaram aqui; hoje a praça é de vocês.",
 wx:{t:"33° / 21°",r:"41% chuva",wear:"Muito quente: roupa leve. À noite, no rio, leve casaco fino e guarda-chuva."},
 intro:"Domingo é pra desacelerar. De manhã, a praça mais antiga de Paris; à tarde, garimpo nos brechós do Marais (abrem no domingo); à noite, o Sena.",
 blocks:[
  {k:"manhã",t:"Place des Vosges",dek:"Duzentos anos antes de Haussmann, alguém já desenhava Paris como um conjunto.",
   b:"Sentem no jardim antes do calor, deem a volta pelas arcadas na sombra e entrem de graça na Casa de Victor Hugo (esquina sudeste) — ele morou no nº 6 e escreveu parte de Os Miseráveis aqui. Encomendada por Henrique IV e inaugurada em 1612, é a primeira praça planejada da cidade: 36 pavilhões idênticos de tijolo e pedra.",
   hist:"Por séculos a aristocracia duelava de espada no centro deste jardim, mesmo o rei tendo proibido — o endereço mais elegante de Paris também foi o mais sangrento. Hoje o mesmo gramado é onde os parisienses tomam sol no domingo.",
   foto:"Os dois pavilhões do meio — do Rei (sul) e da Rainha (norte) — são mais altos e quebram a simetria de propósito. E procure o ponto onde as arcadas fogem em perspectiva.",
   facts:["praça livre","Casa de V. Hugo grátis","M° Saint-Paul"],addr:"Place des Vosges, 75004 Paris",maps:"Place des Vosges 75004 Paris"},
  {k:"tarde · garimpo",t:"Brechós chic do Marais",dek:"Melhor custo-benefício, onde o parisiense garimpa — e seguro de dia.",
   b:"Tudo num raio de 10 min a pé. Comecem pela rue de la Verrerie e fechem na rue des Rosiers. Levem euros em dinheiro (várias só aceitam cash) e bolsa fechada à frente.",
   hist:"O nome Marais quer dizer 'pântano': era terra alagada que os monges drenaram na Idade Média. No século XVII virou o bairro mais nobre de Paris, cheio de palacetes (hôtels particuliers) — e por sorte escapou das demolições de Haussmann, guardando suas ruas medievais estreitas. Depois foi o coração judaico da cidade; hoje mistura sinagogas centenárias, galerias e os brechós onde vocês garimpam.",
   merch:{l:"As 3 verificadas (abrem domingo)",items:[["Kilo Shop · 69 R. de la Verrerie","por quilo, camiseta ~€10-15","Kilo Shop 69 Rue de la Verrerie 75004 Paris"],["Free'p'star · 8 R. Ste-Croix Bretonnerie","pechincha a partir de €3-10","Free P Star 8 Rue Sainte-Croix de la Bretonnerie 75004 Paris"],["Vintage Désir · 32 R. des Rosiers","baratíssimo, só dinheiro","Vintage Desir 32 Rue des Rosiers 75004 Paris"]]},
   foto:"💎 Pra outro dia: <b>Thanx God I'm a VIP</b> (12 Rue de Lancry, do lado do hotel) — luxo de 2ª mão a fração do preço, seg–sáb 14h–20h. <a href='https://www.google.com/maps/search/?api=1&query=Thanx%20God%20Im%20a%20VIP%2012%20Rue%20de%20Lancry%2075010%20Paris' target='_blank' rel='noopener' style='color:#a8432c;font-weight:600;white-space:nowrap'>📍 abrir no mapa</a>",
   maps:"Kilo Shop 69 Rue de la Verrerie Paris"},
  {k:"noite",t:"Jantar de barco no Sena",dek:"Ver Paris da água é entender que tudo nasceu deste eixo líquido.",photo:"img/pont-alexandre.jpg",
   b:"Ponto de embarque conforme o grupo. Levem casaco: parado, o barco venta de verdade. A cidade nasceu como Lutécia, povoado romano na Île de la Cité. A Pont Alexandre III, dourada, foi feita pra Expo de 1900; a Pont Neuf, apesar do nome novo, é a mais antiga.",
   hist:"A Pont Alexandre III é quase plana de propósito, pra não tapar a vista dos Invalides de um lado e dos Champs-Élysées do outro — engenharia a serviço da paisagem. As ninfas e cavalos alados dourados seguram a ponte como uma joia.",
   foto:"A cada hora cheia, depois de escurecer, a Torre Eiffel cintila por 5 minutos. Vista do rio é a foto da viagem."},
 ],phrase:{fr:"Bonsoir ! C'était une belle journée.",pt:"Boa noite! Foi um lindo dia."}},

{n:3,wd:"Segunda · 29 jun",hero:"img/arc.jpg",tag:"Curso da Thaise · seu 1º dia",title:"O eixo de Paris, a pé",momento:"Vocês se reencontram no fim do dia nos Champs (RH Paris, 18h). Peçam uma taça ou um café e fiquem parados, sem agenda, contando um pro outro o que cada um viu sozinho — o primeiro 'como foi seu dia?' de vocês em Paris.",
 wx:{t:"24° / 20°",r:"53% chuva",wear:"Esfria e chove — guarda-chuva e casaco. Smart-casual (zona de luxo)."},
 intro:"Na segunda muitos museus fecham — o dia perfeito pra fazer o Axe Historique a pé, do Arco até o Louvre. A viagem inteira de Paris numa linha reta.",
 blocks:[
  {k:"~9h",t:"Levo a Thaise",b:"Deixe-a na escola e suba já ao Arco (5 min). Reencontro às 18h — manhã e tarde são suas.",addr:"58 Av. de la Grande Armée, 75017 Paris",maps:"58 Avenue de la Grande Armée 75017 Paris"},
  {k:"€22",t:"Arco do Triunfo",dek:"O terraço de onde os 8 km de Paris se revelam de uma vez.",
   b:"€22 (€16 quarta), aberto até 23h no verão — RESERVE online. Atravesse pela passagem subterrânea, nunca pela rotatória.",
   hist:"Daqui você vê o Axe Historique inteiro: o olhar desce a Champs-Élysées, encontra o obelisco da Concorde, atravessa o Louvre e morre na Grande Arche de La Défense — um arco moderno torto uns 6°, porque não dava pra entortar o metrô embaixo. Napoleão o encomendou em 1806, morreu sem vê-lo pronto e só passou por baixo já morto, em 1840.",
   foto:"Ache 'A Marselhesa' de Rude (lado Champs). 660 generais nas paredes; os sublinhados morreram em combate. Suba às 22h: a Eiffel cintila com o eixo aceso aos seus pés.",
   facts:["€22","até 23h","M° Charles de Gaulle–Étoile"],maps:"Arc de Triomphe Paris"},
  {k:"a pé",t:"Champs-Élysées + Grand Palais",photo:"img/grand-palais.jpg",
   b:"Desça a avenida. Grand Palais e Petit Palais fecham segunda, mas as fachadas valem — e logo adiante, a Pont Alexandre III.",
   hist:"O Grand Palais é uma catedral de vidro e aço de 1900, a maior nave envidraçada da Europa, reaberta em 2024. Pedra acadêmica por fora, estrutura industrial ousada por dentro.",maps:"Grand Palais Paris"},
  {k:"a pé",t:"Concorde → Pirâmide do Louvre",photo:"img/louvre.jpg",
   b:"Pela Concorde (o obelisco de Luxor tem 3.300 anos; aqui caiu a cabeça de Luís XVI) e o Jardim das Tuileries até o Louvre. O museu ABRE segunda (fecha terça).",
   hist:"A pirâmide de I.M. Pei (1989) foi odiada quando inaugurada, chamada de profanação. Hoje é símbolo de Paris e a prova de que o contraste franco envelhece melhor que a imitação tímida. É o ponto onde nasce o eixo que você viu do Arco.",
   foto:"No Carrousel ao lado: a 'pirâmide invertida', a ponta de vidro descendo até quase tocar uma pirâmide de pedra no chão.",
   facts:["pátio livre","Louvre: reserve","fecha terça"],maps:"Pyramide du Louvre Paris"},
  {k:"18h",t:"Reencontro",b:"Encontre a Thaise no 23 Av. des Champs-Élysées e voltem juntos.",addr:"23 Av. des Champs-Élysées, 75008 Paris",maps:"23 Avenue des Champs-Elysees Paris"}
 ],phrase:{fr:"Un café, s'il vous plaît.",pt:"Um café, por favor. (vem expresso e curto.)"}},

{n:4,wd:"Terça · 30 jun",hero:"img/palais-garnier.jpg",tag:"Curso (Vendôme) · tesouros escondidos",title:"As galerias cobertas",momento:"Atravessem juntos uma galeria coberta depois das 19h — a Galerie Vivienne, com seu mosaico no chão e teto de vidro de 1823, fica quase vazia e iluminada à noite. Andem devagar, de mãos dadas, como num filme antigo. Pouquíssimos turistas sabem dessa hora.",
 wx:{t:"26° / 16°",r:"36% chuva",wear:"Ameno. Smart-casual elegante; sapato confortável."},
 intro:"Terça o Louvre e várias coleções fecham — mas as galerias cobertas e a Salle Ovale abrem. Um dia de tesouros a poucos passos, quase sem turistas.",
 blocks:[
  {k:"manhã",t:"Levo a Thaise",b:"Deixe-a na masterclass da Boucheron, na Place Vendôme. Reencontro às 17h no Printemps.",addr:"26 Place Vendôme, 75001 Paris",maps:"26 Place Vendome 75001 Paris"},
  {k:"a pé",t:"Place Vendôme",photo:"img/place-vendome.jpg",
   b:"Gire devagar no meio da praça: cada vitrine é uma das maiores joalherias do mundo, com altura e ritmo idênticos em todos os lados.",
   hist:"Praça octogonal de Hardouin-Mansart, o arquiteto de Versalhes, templo das joalherias e do Ritz. A coluna no centro foi fundida com o bronze dos canhões que Napoleão tomou em Austerlitz.",
   foto:"A coluna imita a de Trajano de Roma, com a batalha em espiral subindo até Napoleão no topo.",maps:"Place Vendome 75001 Paris"},
  {k:"livre",t:"Galerie Vivienne + Salle Ovale",dek:"Os antepassados do shopping, de 1826 — e uma das salas de leitura mais bonitas do mundo, de graça.",
   b:"A Galerie Vivienne (1826) é uma rua privada com teto de vidro e ferro, iluminada a gás. A 2 min, empurre a porta da Salle Ovale (Richelieu): entre sem reserva, sente e olhe pra cima.",
   hist:"As galerias cobertas eram ruas particulares onde a alta sociedade do século XIX passeava protegida da chuva — inventadas quase um século antes dos shoppings. A Salle Ovale, restaurada em 2022, é uma elipse coroada por domos de vidro; abre na terça, justo quando o resto fecha.",
   foto:"Na Vivienne, o piso de mosaicos de Facchina; o nº 13 foi onde morou Vidocq, o 'rei dos ladrões' que virou o 1º detetive de Paris.",
   facts:["acesso livre","Salle Ovale grátis","M° Bourse"],maps:"Galerie Vivienne Paris"},
  {k:"~17h",t:"Reencontro no Printemps",b:"Subam ao terraço do Printemps (gratuito) pra ver Paris do alto no fim da tarde.",maps:"Printemps Haussmann Paris"}
 ],phrase:{fr:"C'est combien ?",pt:"Quanto é? (ou use a câmera do tradutor.)"}},

{n:5,wd:"Quarta · 01 jul",hero:"img/samaritaine.jpg",tag:"Curso (Saint-Honoré) · velho e novo",title:"Concreto, vidro e pedra",momento:"No fim da tarde, subam ao terraço das Galeries Lafayette ou ao do BHV (de graça) e vejam os telhados de zinco de Paris ganharem cor de mel. Sem fila, sem ingresso — só vocês dois e o pôr do sol sobre a cidade inteira.",
 wx:{t:"27° / 16°",r:"22% chuva",wear:"Agradável e seco. Casual estiloso + tênis bom de caminhar."},
 intro:"Quarta abre quase tudo: o coração antigo de Paris onde o clássico conversa, sem medo, com o contemporâneo. (E hoje dá pra emendar o Louvre à noite.)",
 blocks:[
  {k:"9h30",t:"Levo a Thaise",b:"Deixe-a na Rue Saint-Honoré. Reencontro 17h na visita dela à Samaritaine.",addr:"316 Rue Saint-Honoré, 75001 Paris",maps:"316 Rue Saint-Honore 75001 Paris"},
  {k:"€15",t:"Bourse de Commerce — Tadao Ando",dek:"Uma bolsa de grãos do séc. XVIII com um cilindro de concreto encaixado dentro.",
   b:"Abre 11h, fecha 19h (fechada terça), €15. Por dentro está a aula de arquitetura da viagem.",
   hist:"A antiga bolsa de grãos circular virou museu de arte de François Pinault. O japonês Tadao Ando encaixou um imenso cilindro de concreto liso dentro da rotunda histórica, sob a cúpula de vidro — o diálogo perfeito entre o velho e o novo, sem que um toque no outro.",
   foto:"Suba e ande sobre o anel de concreto de Ando: dali você fica na altura exata pra olhar o afresco do século XIX que corre na cúpula, bem acima.",
   facts:["€15","fecha terça","M° Louvre-Rivoli"],maps:"Bourse de Commerce Pinault Collection Paris"},
  {k:"grátis",t:"Saint-Eustache + La Samaritaine",
   b:"A igreja Saint-Eustache (1532-1632) mistura gótico e renascença — Molière foi batizado ali. A 5 min, entre na Samaritaine só pra ver o átrio e o terraço (livres).",
   hist:"A Samaritaine reabriu em 2021 guardando duas joias Art Nouveau — a escadaria de ferro e o vitral do pavão — e ganhou uma fachada de vidro ondulada dos japoneses do SANAA, virada pro Sena.",
   foto:"Olhe pra cima na Samaritaine: o lustre de ferro e o friso do pavão estão lá no alto, originais. O terraço tem vista do Pont-Neuf.",
   facts:["grátis","M° Pont-Neuf"],maps:"Samaritaine Paris"},
  {k:"almoço",t:"Rue Montorgueil",dek:"A rua-mercado onde o parisiense come — não o turista.",
   b:"Rua de pedestres com bancas, padarias e mesinhas. Há comércio de comida aqui desde antes do séc. XIII; Monet a pintou cheia de bandeiras.",
   hist:"Esta é a última sobrevivente das ruas que abasteciam o antigo mercado central, Les Halles — 'o ventre de Paris', como Zola o chamou. Há comércio de comida aqui desde antes do século XIII. Monet a pintou em 1878, coberta de bandeiras tricolores num dia de festa; e a Stohrer, de 1730, é a confeitaria mais antiga da cidade, onde se inventou o baba au rhum para a corte.",
   merch:{l:"O que provar / comprar",items:[["Stohrer (nº 51)","a + antiga confeitaria de Paris (1730), o 'baba au rhum'"],["Queijos & charcutaria","ótimos pra um piquenique"],["Eric Kayser","croissant e pain au chocolat"]]},
   maps:"Rue Montorgueil Paris"},
  {k:"17h → noite",t:"Reencontro + Louvre à noite",dek:"O melhor jeito de ver o Louvre: a nocturne de quarta, quase vazia.",
   b:"Encontre a Thaise na Samaritaine (a passos do Louvre) e entrem juntos: na QUARTA o Louvre abre até 21h45, bem menos cheio. RESERVE o horário (~€22, fecha terça).",
   foto:"De noite, a pirâmide iluminada vira uma joia de vidro pousada sobre a pedra de quatro séculos.",
   facts:["~€22","reserve","qua até 21h45"],maps:"Musée du Louvre Paris"}
 ],phrase:{fr:"Une carafe d'eau, s'il vous plaît.",pt:"Uma jarra de água (de graça), por favor."}},

{n:6,wd:"Quinta · 02 jul",hero:"img/eiffel.jpg",tag:"Curso (Champs) · o santuário do arquiteto",title:"Do gesso ao concreto",momento:"Depois do reencontro no Palais de Tokyo (19h), fiquem na esplanada vendo a Torre Eiffel do outro lado do Sena enquanto escurece. É o mirante que os parisienses amam e poucos turistas conhecem. Brindem ali — mesmo que seja com um café da máquina.",
 wx:{t:"25° / 19°",r:"15% chuva",wear:"Bom pra andar; à noite vão juntos a um museu — leve algo arrumado + casaco fino."},
 intro:"Hoje você chega à Cité de l'Architecture — talvez o lugar mais emocionante de Paris pra um arquiteto — e termina reencontrando a Thaise num museu de arte.",
 blocks:[
  {k:"manhã",t:"Levo a Thaise",b:"Deixe-a nos Champs (Tiffany 11h). Combine ponto e horário do reencontro antes — o celular some na multidão.",addr:"62 Av. des Champs-Élysées, 75008 Paris",maps:"62 Avenue des Champs-Elysees Paris"},
  {k:"€13",t:"Cité de l'Architecture",dek:"Catedrais inteiras, em gesso e tamanho real, dentro de um museu.",
   b:"No Palais de Chaillot (Trocadéro). Não precisa marcar horário: chegue, pague ~€13, entre. Reserve umas boas horas.",
   hist:"É um museu DA arquitetura francesa: galerias inteiras de moldes em gesso, em tamanho real, de portais e tímpanos de catedrais — feitos pra preservar o que o tempo apagaria nas pedras originais. E há um apartamento da Unité d'Habitation de Le Corbusier, onde você entra de verdade.",
   foto:"Você caminha 'dentro' de catedrais que estão a centenas de km umas das outras, lado a lado. Não perca a maquete da unidade Corbusier; suba pra ver a Eiffel emoldurada pela janela.",
   facts:["~€13","fecha terça","M° Trocadéro"],maps:"Cite de l'architecture et du patrimoine Paris"},
  {k:"a pé",t:"Trocadéro (a vista)",b:"Saindo da Cité, atravesse pro terraço do Chaillot (Expo de 1937): a Torre Eiffel inteira do outro lado do Sena. O cartão-postal definitivo.",
   hist:"O Palais de Chaillot foi erguido para a Exposição de 1937, no lugar de um palácio mourisco de 1878. Suas duas alas curvas abraçam a esplanada de onde se tem a vista mais famosa da Torre Eiffel. E foi aqui que a ONU assinou, em 1948, a Declaração Universal dos Direitos Humanos — história do mundo escrita de frente pra Torre.",
   foto:"É daqui a foto clássica da Eiffel de frente. Vá antes do fim da tarde pra luz boa — e segure a bolsa no aperto.",maps:"Place du Trocadero Paris"},
  {k:"19h",t:"Reencontro no Palais de Tokyo",b:"Vejam a exposição juntos — abre até tarde. Depois das vitrines e do gótico, fechar em arte contemporânea é o contraste perfeito.",
   hist:"Também da Expo de 1937, hoje é o maior centro de arte contemporânea da Europa — deixado de propósito em concreto cru, inacabado. Livraria e café abertos à noite.",
   addr:"13 Av. du Président Wilson, 75116 Paris",maps:"Palais de Tokyo Paris"}
 ],phrase:{fr:"C'est magnifique !",pt:"É magnífico! (elogie — eles amam.)"}},

{n:7,wd:"Sexta · 03 jul",hero:"img/fondation-lv.jpg",tag:"Thaise fora o dia todo · SEU dia livre",title:"De Corbusier a Gehry",momento:"Vocês passam o dia separados (ela em La Vallée, você na arquitetura) — então transformem a volta dela num pequeno evento. À noite, jantem num bistrô do bairro do hotel, no Canal Saint-Martin, longe do roteiro turístico, contando as aventuras do dia um do outro.",
 wx:{t:"23° / 17°",r:"15% chuva",wear:"Fresco e seco, dia perfeito de caminhar — camadas + tênis."},
 intro:"A Thaise passa o dia no outlet, e você tem Paris só pra você. Reservei o melhor pra um arquiteto: uma casa-manifesto de Le Corbusier e o veleiro de vidro de Frank Gehry.",
 blocks:[
  {k:"€10",t:"Maison La Roche — Le Corbusier",dek:"O laboratório onde a arquitetura do século XX foi inventada.",
   b:"Comece cedo: a casa é pequena e enche. Ter-sáb 10h-18h (sexta abre), ~€10.",
   hist:"Uma das primeiras casas-manifesto de Le Corbusier (1923-25), onde ele aplicou pela 1ª vez os 'cinco pontos da arquitetura moderna'. Hoje é a sede da Fondation Le Corbusier.",
   foto:"Procure ao vivo os cinco pontos: os pilotis erguendo a casa, a planta livre, a fachada livre, a janela em fita e o terraço-jardim. A rampa curva é pura promenade architecturale.",
   facts:["~€10","ter-sáb","M° Jasmin"],maps:"Maison La Roche Fondation Le Corbusier Paris"},
  {k:"€19-22",t:"Fondation Louis Vuitton — Gehry",dek:"Doze velas de vidro curvo sobre um iceberg branco.",
   b:"No Bois de Boulogne. O único bloco do dia que pede RESERVA de horário. Abre 11h-20h (sex até 21h).",
   hist:"O 'veleiro de vidro' de Frank Gehry (2014): cada painel é único, e o conjunto só foi possível por uma façanha de engenharia e modelagem digital de ponta.",
   foto:"Suba aos terraços e ande entre as velas de vidro — a melhor parte. De certos ângulos, com a água em volta, o prédio parece flutuar.",
   facts:["€19-22","reserve","fecha terça"],maps:"Fondation Louis Vuitton Paris"}
 ],phrase:{fr:"Où sont les toilettes ?",pt:"Onde fica o banheiro?"}},

{n:8,wd:"Sábado · 05 jul",hero:"img/notre-dame.jpg",tag:"Livres a dois · o berço de Paris",title:"A Île de la Cité",momento:"Comprem pão, um queijo e uma fruta e façam um piquenique na ponta oeste da ilha — o Square du Vert-Galant, com os pés quase na água e os barcos passando. Ao entardecer, é o canto mais romântico (e gratuito) de Paris. Levem um vinho.",
 wx:{t:"26° / 16°",r:"16% chuva",wear:"Sol e ameno — casual. Em igreja, ombros cobertos."},
 intro:"Um dia só de vocês dois pela ilha onde Paris começou há mais de dois mil anos. Tudo cabe a pé, devagar.",
 blocks:[
  {k:"manhã · grátis",t:"Notre-Dame de Paris",dek:"A catedral mais luminosa que qualquer parisiense vivo já viu.",
   b:"Reaberta em dez/2024, grátis, todo dia. Na alta temporada, reserve horário online (a fila também anda). Entre devagar e deixe os olhos subirem.",
   hist:"A catedral gótica começou em 1163 e quase se perdeu no incêndio de 2019. Foi reerguida em cinco anos e reabriu em dezembro de 2024, com a pedra clara limpa. A flecha caída foi reconstruída idêntica à de Viollet-le-Duc.",
   foto:"Repare como a pedra ficou quase branca depois da limpeza. Lá no alto, entre as gárgulas, a Stryge — a quimera apoiada no queixo que parece pensar sobre a cidade.",
   facts:["grátis","todo dia","M° Cité"],maps:"Notre-Dame de Paris"},
  {k:"meio-dia · €20",t:"Sainte-Chapelle",dek:"As paredes desaparecem atrás de 15 metros de vitrais.",photo:"img/sainte-chapelle.jpg",
   b:"A passos da catedral. Se reservaram: horário obrigatório, €20 (ou €28 com a Conciergerie). Suba a escadinha de caracol e, quando o teto se abrir, prepare-se.",
   hist:"A 'caixa de joias' gótica de Luís IX, concluída em 1248 em tempo recorde pra guardar relíquias da Paixão. As paredes quase somem atrás dos vitrais, sustentados por hastes finíssimas de pedra — gótico levado ao limite do impossível.",
   foto:"Vá num momento de sol: a luz atravessa mais de mil cenas bíblicas e pinta o chão. Suba à capela alta e gire uma vez em torno de si mesmo. É de chorar.",
   facts:["€20","reserve","M° Cité"],maps:"Sainte-Chapelle Paris"},
  {k:"tarde · grátis",t:"Pavillon de l'Arsenal",dek:"De arquiteto pra arquiteto: onde Paris explica como foi pensada.",
   b:"Na margem direita, a poucos minutos. Entrada totalmente gratuita, ter-dom 11h-19h.",
   hist:"O centro de urbanismo e arquitetura da cidade de Paris — conta como a metrópole foi planejada ao longo dos séculos e como será no futuro.",
   foto:"No piso, uma maquete GIGANTE de Paris com projeção interativa. Ache o seu hotel, o Canal, a Île de la Cité de hoje de manhã.",
   facts:["grátis","fecha segunda","M° Sully-Morland"],maps:"Pavillon de l'Arsenal Paris"}
 ],phrase:{fr:"Deux billets, s'il vous plaît.",pt:"Dois ingressos, por favor."}},

{n:9,wd:"Domingo · 06 jul",hero:"img/sacre-coeur.jpg",tag:"Livres a dois · arte e altura",title:"Da estação à colina",momento:"Última noite em Paris. Subam às escadarias do Sacré-Cœur no fim da tarde — toda a cidade aos seus pés, quase sempre alguém tocando violão. Fiquem pro lusco-fusco, sem pressa de descer. Foi um pacto: vocês voltam.",jantar:{t:"Jantar especial — a noite de despedida (reserve JÁ)",b:"Pra fechar a viagem com chave de ouro, reservem com alguns dias de antecedência uma destas (todas pedem reserva):",opts:[{n:"La Bonne Franquette — clássico boêmio de Montmartre, na rota de hoje",m:"La Bonne Franquette Montmartre Paris"},{n:"Le Coupe-Chou — à luz de velas, casa do séc. XVII (5e)",m:"Le Coupe-Chou Paris"},{n:"Les Ombres — rooftop com vista da Torre Eiffel",m:"Les Ombres Restaurant Quai Branly Paris"}]},
 wx:{t:"22° / 15°",r:"—",wear:"Mais fresco — leve uma 2ª camada. Dia de museu."},
 intro:"O último dia inteiro. Comecem entre os impressionistas, numa estação de trem virada museu, e terminem na colina mais romântica de Paris.",
 blocks:[
  {k:"manhã · €17,50",t:"Musée d'Orsay",dek:"O maior acervo impressionista do mundo, dentro de uma gare de 1900.",
   b:"Abre domingo (fecha segunda). €17,50 — reservem horário, as filas são grandes.",
   hist:"A antiga Gare d'Orsay, estação Beaux-Arts de 1900, foi ameaçada de demolição nos anos 1970 e salva no último instante. O grande vão de ferro e vidro que cobria os trilhos virou a nave de luz que cobre as esculturas.",

1:["","Da fila oficial 'Taxis' (placa branca), táxi tarifa FIXA €44 até o hotel (~40 min, malas incluídas) — o mais fácil no 1º dia. Mais barato (~€13): Metrô L14 (dir. Saint-Denis Pleyel) até Châtelet → L11 (dir. Rosny-Bois-Perrier) até Goncourt. Nunca aceite corrida oferecida dentro do saguão.","","A pé: desça a Rue Arthur Groussier, vire à direita, ~8 min até o Quai de Valmy. Sem metrô.","Do hotel: a pé até República (~7 min) → L9 (dir. Pont de Sèvres) DIRETO até Trocadéro (~25 min). VOLTA À NOITE: não pegue metrô vazio tarde da noite — chame um táxi/Uber direto do Trocadéro ao hotel (~€20–25, ~20 min, porta a porta e seguro)."],
2:["Do hotel: a pé até République (5 min) → L8 (dir. Créteil) até Bastille (3 paradas) → 6 min a pé até a praça.","Tudo a pé pelo Marais: Place des Vosges → rue des Rosiers → rue de la Verrerie (10–15 min). Seguro de dia.","Da rue de la Verrerie: Hôtel de Ville → L1 (dir. La Défense) até Franklin D. Roosevelt → L9 (dir. Pont de Sèvres) até Alma-Marceau (~25 min); 4 min a pé até o cais. À NOITE, volte de táxi/Uber do cais ao hotel (~€20–25)."],
3:["Do hotel: a pé até République → L11 (dir. Châtelet), 1 parada → Châtelet → L1 (dir. La Défense) até George V (~25 min); suba a Av. de la Grande Armée ~8 min até o nº 58.","Do nº 58, ~7 min a pé até o Arco. Atravesse pela PASSAGEM SUBTERRÂNEA (nunca a rotatória).","Tudo a pé: desça a Champs-Élysées (~20 min, ladeira leve), passando pelo Grand Palais. Seguro de dia.","A pé até a Concorde (~5 min) e pelas Tulherias até o Louvre (~15 min). Pra poupar as pernas: L1 (Concorde, dir. Vincennes) 1 parada até Palais Royal–Louvre.","Reencontro: do Louvre, L1 (dir. La Défense) até Franklin D. Roosevelt (3 min até o nº 23). VOLTA: L1 até Châtelet → L11 (dir. Rosny) até Goncourt. À noite, táxi ~€18."],
4:["Do hotel: a pé até République → L8 (dir. Balard) até Opéra (6 paradas, ~12 min) → 4 min a pé até a Place Vendôme.","","Tudo a pé: da Place Vendôme pela Rue des Petits-Champs até a Galerie Vivienne (~8 min); a Salle Ovale fica colada (2 min).","Da Vivienne: Quatre-Septembre → L3 (dir. Pont de Levallois) até Havre-Caumartin (2 paradas); Printemps a 2 min. VOLTA: L9 (dir. Montreuil) até République. Com sacolas, táxi ~€15."],
5:["Do hotel: a pé até Goncourt → L11 (dir. Châtelet) até Châtelet → L1 (dir. La Défense) até Tuileries (~20 min); 2 min a pé até o nº 316.","Perto: a pé (~8 min) pela Rue du Louvre/Coquillière até a Rue de Viarmes (o prédio redondo).","A pé, tudo coladinho (~5 min): Saint-Eustache ao lado; depois pela Rue du Pont Neuf até a Samaritaine.","A pé (~12 min) subindo pela Rue Montmartre. Calçadão seguro de dia.","Samaritaine → Louvre a 8 min a pé pela Rue de Rivoli. À NOITE, volte de táxi/Uber do Louvre (~€12–16)."],
6:["Do hotel: a pé até Goncourt → L11 (dir. Châtelet) até Châtelet → L1 (dir. La Défense) até George V (~25 min); a estação fica ao lado do nº 62.","George V → L1 (dir. La Défense) 1 parada até Charles de Gaulle–Étoile → L6 (dir. Nation) até Trocadéro (~15 min). A Cité fica no Palais de Chaillot, na própria praça.","A pé: você já está no Trocadéro. Atravesse a esplanada — é o ponto da foto da Torre Eiffel (2 min).","A pé (~11 min) descendo a Av. du Président Wilson até o Palais de Tokyo. À noite, táxi/Uber (~€18–22)."],
7:["Do hotel: a pé até Goncourt → L11 (dir. Châtelet) até République → L9 (dir. Pont de Sèvres) até Jasmin (direto); 10 min a pé até o nº 10 (~40 min).","Mais simples: L9 de Jasmin (dir. Montreuil) até Charles de Gaulle–Étoile e pegue o ÔNIBUS-SHUTTLE oficial da Fondation (€2 ida/volta, saída 44 Av. de Friedland). VOLTA à noite: táxi/Uber (~€22–28) — há pouco metrô no Bois de Boulogne."],
8:["Do hotel: a pé até Goncourt → L11 (dir. Châtelet) até Hôtel de Ville (4 paradas, ~8 min); atravesse a ponte a pé até a ilha (5–7 min).","A pé, na mesma ilha: da Notre-Dame à Sainte-Chapelle ~6 min. Atenção a batedores na fila.","A pé (~10 min) pela Pont Marie; o Pavillon fica a 80 m de Sully-Morland. VOLTA: L7 (dir. La Courneuve) até Châtelet → L11 (dir. Mairie des Lilas) até Goncourt. Se tarde, táxi ~€12–15."],
9:["Do hotel: a pé até République (7 min) → L8 (dir. Balard) até Concorde → L12 (dir. Mairie d'Issy) até Solférino (1 parada); 5 min a pé até o Orsay (~30 min).","Do Orsay, ~12 min a pé pela Rue du Bac e Rue de Sèvres — ou 1 parada de metrô. A loja fica colada na estação Sèvres-Babylone (L10/L12).","ROTA SEGURA por ABBESSES: de Sèvres-Babylone, L12 (dir. Aubervilliers) DIRETO até Abbesses (~20 min) — não desça em Barbès nem Anvers. Use o ELEVADOR (estação funda). À NOITE, volte de táxi do Sacré-Cœur (~€20–25)."],
10:["A pé, no bairro: o Canal começa a ~5 min da porta do hotel. Seguro e bonito de manhã.","A pé, no próprio bairro do hotel — padarias e lojinhas do Canal a 5 min, sem stress.","","HOTEL → ORLY com 2 malas: TÁXI tarifa FIXA ~€44 (24h, malas incluídas, porta a porta, ~30–45 min). Saiam ~15h30–16h. Alternativa (~€16/pessoa): L11 (Goncourt, dir. Châtelet) → L14 (dir. Aéroport d'Orly) — precisa do bilhete 'Paris-Aéroport'. Com mala, recomendo o táxi.",""]

var MERGULHE={
2:{"Place des Vosges":"Inaugurada em 1612 com um torneio de três dias para celebrar DOIS casamentos reais ao mesmo tempo (Luís XIII com Ana da Áustria). Foi a primeira praça residencial planejada da Europa e virou modelo para Londres. Madame de Sévigné nasceu aqui em 1626; Richelieu e, depois, Victor Hugo moraram na praça. E, apesar de o duelo ser proibido, nobres se matavam à espada no jardim — o endereço mais elegante de Paris também foi palco dos duelos mais famosos."},
3:{"Arco do Triunfo":"Napoleão encomendou o arco em 1806, mas as obras se arrastaram 30 anos: foi inaugurado só em 1836. Em 1919, para celebrar o fim da 1ª Guerra, o aviador Charles Godefroy fez uma loucura — pilotou um biplano ATRAVÉS do arco. Sob ele descansa, desde 1921, o Túmulo do Soldado Desconhecido, com uma chama reacesa todo dia às 18h30, que nunca se apagou desde 1923 — nem durante a ocupação nazista.","Champs-Élysées + Grand Palais":"A Champs-Élysées era um pântano até o século XVII, quando Le Nôtre, o paisagista de Versalhes, traçou a alameda que viraria 'a avenida mais bonita do mundo'. O Grand Palais, de 1900, guarda a maior abóbada de vidro da Europa — 8.500 m² sobre uma estrutura de aço pintada pra parecer leve. Já serviu de salão do automóvel, de depósito nazista na Guerra e, em 2024, de arena olímpica de esgrima.","Concorde → Pirâmide do Louvre":"O Louvre começou como uma FORTALEZA medieval em 1190 — dá pra ver os fossos e a base da torre original no subsolo. Virou palácio real, foi abandonado quando a corte mudou pra Versalhes e só virou museu público em 1793, na Revolução. A pirâmide de I.M. Pei (1989) tem 673 painéis de vidro (o '666' do Código Da Vinci é mito); Pei a escolheu por ser a forma que menos compete com o palácio e que mais deixa a luz descer ao saguão."},
4:{"Place Vendôme":"A coluna de 44 metros foi erguida por Napoleão com o bronze de 1.200 canhões tomados em Austerlitz, imitando a Coluna de Trajano. Em 1871, a Comuna de Paris a derrubou como símbolo de tirania — e o pintor Courbet, acusado de incitar a destruição, foi condenado a pagar pela reconstrução, o que o arruinou. A praça abriga o Ritz, onde Coco Chanel morou 34 anos e de onde Lady Di saiu na sua última noite, em 1997.","Galerie Vivienne + Salle Ovale":"No começo do século XIX, Paris tinha mais de 150 galerias cobertas — ruas privadas de vidro e ferro, iluminadas a gás, onde se passeava limpo e seco numa cidade ainda de lama e esgoto a céu aberto. Eram o templo do consumo, e o filósofo Walter Benjamin dedicou a elas sua obra sobre a modernidade. Quando Haussmann abriu as grandes avenidas com calçadas, as galerias decaíram — só ~20 sobreviveram."},
5:{"Bourse de Commerce — Tadao Ando":"O edifício circular nasceu em 1763 como mercado de grãos, com uma cúpula que foi uma das maiores estruturas de ferro e vidro do mundo. Por dentro corre um afresco panorâmico de 1889 sobre o comércio entre os continentes — com um olhar colonial que hoje se vê com senso crítico. Em 2021, Tadao Ando inseriu um cilindro de concreto de 9 m de altura DENTRO da rotunda, sem encostar nas paredes históricas: o novo respeitando o velho, separado por um vão de luz.","Saint-Eustache + La Samaritaine":"Saint-Eustache levou um século pra ficar pronta (1532–1632): tem a planta de uma catedral gótica vestida de detalhes renascentistas. Mozart enterrou a mãe ali; Luís XIV fez a primeira comunhão; e o funeral de Molière, proibido pela Igreja por ele ser ator, foi à noite e às escondidas. A Samaritaine, do outro lado, foi o império que um casal de vendedores ergueu no fim do século XIX — hoje, um diálogo entre o Art Nouveau original e o vidro ondulado do SANAA."},
6:{"Cité de l'Architecture":"A ideia de moldar catedrais inteiras em gesso foi de Viollet-le-Duc, o arquiteto que restaurou Notre-Dame: ele queria um ARQUIVO físico da arquitetura francesa, caso os originais se perdessem — e o tempo lhe deu razão. A galeria reúne pórticos e tímpanos em tamanho real de igrejas de toda a França, lado a lado. No andar moderno, há um apartamento inteiro da Unité de Le Corbusier, com as medidas exatas que ele calculou a partir do corpo humano (o 'Modulor').","Trocadéro (a vista)":"A Torre Eiffel à sua frente, de 1889, era pra ser TEMPORÁRIA — desmontada em 20 anos. Trezentos artistas assinaram um manifesto contra ela; Maupassant dizia almoçar no restaurante da torre por ser o único lugar de Paris de onde não a via. O que a salvou foi a antena de rádio no topo, útil demais pro exército. Hoje é repintada à mão a cada 7 anos (60 toneladas de tinta) e, no calor do verão, o ferro dilata e ela cresce alguns centímetros."},
7:{"Maison La Roche — Le Corbusier":"Le Corbusier ergueu esta casa (1923–25) para o banqueiro Raoul La Roche, colecionador de arte cubista — por isso a galeria tem aquela rampa que faz você 'passear' pela arquitetura. Aqui ele formalizou os 'cinco pontos': pilotis, terraço-jardim, planta livre, fachada livre e janela em fita. Curiosidade: ele morreu nadando no Mediterrâneo em 1965, contra ordens médicas, e a França lhe deu funeral de Estado no pátio do Louvre.","Fondation Louis Vuitton — Gehry":"Gehry se inspirou nas estufas de vidro do século XIX e nos veleiros: são 3.600 painéis de vidro curvo, cada um único, só possíveis graças a um software criado para a indústria aeroespacial (o mesmo do Guggenheim de Bilbao). Sob as 12 'velas', um 'iceberg' branco esconde as 11 galerias. Bernard Arnault doou o prédio à cidade — depois de 55 anos, ele volta a ser público."},
8:{"Notre-Dame de Paris":"A construção começou em 1163 e levou quase 200 anos. Foi aqui que Napoleão se coroou imperador em 1804, arrancando a coroa das mãos do Papa pra pôr ele mesmo. No século XIX a catedral estava em ruínas e quase foi demolida — quem a salvou foi Victor Hugo, com 'O Corcunda de Notre-Dame' (1831), que reacendeu o orgulho nacional. Na praça em frente, uma placa de bronze marca o 'Ponto Zero': é dali que se medem TODAS as distâncias rodoviárias da França.","Sainte-Chapelle":"Luís IX, o único rei francês virado santo (São Luís), pagou uma fortuna ao imperador de Constantinopla pela Coroa de Espinhos — e a relíquia custou quase TRÊS VEZES mais do que construir esta capela inteira pra guardá-la. Erguida em tempo recorde (1242–1248), é o auge do gótico radiante: 15 m de vitrais com mais de mil cenas, sobre nervuras tão finas que parecem desafiar a gravidade. A relíquia hoje está no Louvre — foi resgatada do incêndio de Notre-Dame."},
9:{"Musée d'Orsay":"A Gare d'Orsay abriu para a Exposição de 1900 como a primeira estação de trem do mundo movida a eletricidade. Mas em poucas décadas suas plataformas ficaram curtas pros trens modernos e ela foi desativada — quase virou hotel, quase foi demolida. Foi salva nos anos 1970 (logo depois de Paris lamentar ter destruído o mercado de Les Halles) e reaberta como museu em 1986.","Sacré-Cœur + Montmartre":"A basílica foi um 'voto nacional' após a derrota para a Prússia em 1870 e a sangrenta Comuna de 1871 — muitos a veem como monumento político, erguido pra 'expiar' os pecados da França, justo onde a Comuna começou. A pedra é um travertino que, com a chuva, libera calcita e se autobranqueia — por isso nunca escurece. Lá dentro está um dos maiores mosaicos do mundo e o sino Savoyarde, de 19 toneladas."}

2:[{t:"Coulée verte (Promenade Plantée)",why:"O parque suspenso sobre um viaduto de trem — inspirou o High Line de Nova York. Começa perto da Bastille.",photo:"img/coulee-verte.jpg",maps:"Coulée verte René-Dumont Paris"},{t:"Musée Carnavalet — a história de Paris",why:"De graça, no Marais: 2.000 anos de Paris em quadros, maquetes e objetos, num palacete do séc. XVI.",photo:"img/carnavalet.jpg",tr:"No Marais, ~5 min a pé da Place des Vosges (pela rue des Francs-Bourgeois).",hist:"Instalado em dois palacetes renascentistas, é o museu da própria cidade — com a placa original da Bastilha, o quarto de Marcel Proust reconstruído e maquetes de como Paris era antes de Haussmann. Coleção permanente gratuita; fecha às segundas.",maps:"Musée Carnavalet Paris"}],
3:[{t:"Musée de l'Orangerie — Ninfeias de Monet",why:"As oito telas gigantes de Monet em duas salas ovais feitas sob medida pra elas. Fica nas Tulherias, na sua rota. ~€12,50.",photo:"img/orangerie.jpg",maps:"Musée de l'Orangerie Paris"},{t:"Petit Palais — Belas-Artes (grátis)",why:"Em frente ao Grand Palais, na sua descida da Champs: um museu de arte lindíssimo, de graça, com pátio-jardim pra um café.",photo:"img/petit-palais.jpg",tr:"Em frente ao Grand Palais, na Av. Winston Churchill. M° Champs-Élysées–Clemenceau.",hist:"Construído, como o Grand Palais, para a Exposição de 1900. Guarda Rembrandt, Monet e Courbet — e quase ninguém entra, porque acham que é pago. O pátio interno com jardim e o café são um respiro no meio do passeio. Fecha segunda.",maps:"Petit Palais Paris"}],
4:[{t:"Galeries Lafayette — cúpula + terraço",why:"Coladinho no Printemps: a cúpula de vidro e o terraço grátis com vista de Paris.",photo:"img/galeries-lafayette.jpg",maps:"Galeries Lafayette Haussmann Paris"},{t:"Palais Garnier por dentro",why:"A grande escadaria de mármore e o teto pintado por Chagall. A ópera que inspirou 'O Fantasma'. ~€15.",photo:"img/palais-garnier.jpg",maps:"Palais Garnier Opera Paris"}],
5:[{t:"Jardin du Palais-Royal — colunas de Buren",why:"O pátio com as colunas listradas de Buren (1986) — a foto preferida dos parisienses, a 5 min do Louvre.",photo:"img/palais-royal.jpg",maps:"Jardin du Palais-Royal Paris"}],
6:[{t:"Champ de Mars — sob a Torre Eiffel",why:"Depois do Trocadéro, atravesse o rio e fique no gramado EMBAIXO da Torre. Outro ângulo, igualmente mágico.",photo:"img/eiffel.jpg",maps:"Champ de Mars Paris"},{t:"Musée du Quai Branly — Jean Nouvel",why:"A poucos passos da Eiffel: o museu das artes não-ocidentais, com a famosa parede vegetal de 800 m² na fachada.",photo:"img/quai-branly.jpg",tr:"Da Eiffel/Trocadéro, ~10 min a pé pela margem do Sena. M° Alma-Marceau / Iéna. ~€14.",hist:"Jean Nouvel (2006) escondeu o museu atrás de um jardim selvagem e de uma 'parede viva' de Patrick Blanc, com 15 mil plantas. Por dentro, uma rampa escura leva às coleções da África, Ásia, Oceania e Américas. Repare nas 'caixas' coloridas que se projetam na fachada do Sena — cada uma é uma sala.",maps:"Musée du quai Branly Paris"}],
7:[{t:"La Défense + Grande Arche",why:"O fim moderno do eixo histórico: um cubo oco de 110 m alinhado com o Arco do Triunfo e o Louvre. Pra arquiteto, é imperdível.",photo:"img/la-defense.jpg",tr:"M° Linha 1 (dir. La Défense) até o fim — direto do centro, ~20 min. Exterior livre (o terraço do telhado está fechado).",hist:"A Grande Arche, de Otto von Spreckelsen (1989), fecha o Axe Historique a 8 km do Louvre — um arco do século XX 'respondendo' ao de Napoleão. É um cubo quase perfeito (110 m) revestido de mármore de Carrara, girado de propósito 6,3° porque o metrô e as fundações embaixo não deixavam alinhar. Em volta, o maior bairro de arranha-céus da Europa.",maps:"Grande Arche de la Défense"}],
8:[{t:"Conciergerie",why:"A prisão da Revolução, onde Maria Antonieta passou os últimos dias antes da guilhotina. Colada na Sainte-Chapelle (combo €28).",photo:"img/conciergerie.jpg",maps:"Conciergerie Paris"},{t:"Shakespeare and Company",why:"A livraria mais famosa de Paris, de frente pra Notre-Dame — reduto de Hemingway e da geração perdida.",photo:"img/shakespeare.jpg",maps:"Shakespeare and Company 37 Rue de la Bucherie Paris"},{t:"Panthéon — a cripta dos grandes",why:"No Quartier Latin: a cúpula neoclássica, o pêndulo de Foucault e os túmulos de Voltaire, Rousseau, Hugo e Marie Curie. ~€13.",photo:"img/pantheon.jpg",tr:"Da Île de la Cité, ~15 min a pé subindo o Quartier Latin. M° Cardinal Lemoine / RER Luxembourg.",hist:"Começou como igreja de Santa Genoveva; a Revolução a transformou em templo laico dos heróis da França. No centro pende o pêndulo de Foucault, que em 1851 PROVOU visualmente que a Terra gira. Marie Curie foi a 1ª mulher enterrada aqui por mérito próprio. No verão dá pra subir à cúpula e ver Paris.",maps:"Panthéon Paris"},{t:"👑 Versailles — o grande bate-volta",why:"O maior palácio da Europa, a Galeria dos Espelhos e os jardins de Le Nôtre. É um DIA INTEIRO — trocariam o programa do dia por ele.",photo:"img/versailles.jpg",tr:"RER C (linha amarela) direto até 'Versailles Château Rive Gauche', ~40 min. RESERVE horário (~€21–32) e vá CEDO (lota).",hist:"Luís XIV transformou o pavilhão de caça do pai no centro do poder absoluto e mudou a corte inteira pra cá em 1682 — pra ter os nobres sob o olho. A Galeria dos Espelhos, com 357 espelhos, foi onde se assinou o Tratado de Versalhes em 1919. Os jardins geométricos de Le Nôtre são a obra-prima do paisagismo clássico.",maps:"Château de Versailles"}],
9:[{t:"Musée Rodin + jardim",why:"O Pensador no jardim de roseiras, num palacete do séc. XVIII, a 10 min do Orsay. Só o jardim ~€4.",photo:"img/rodin.jpg",maps:"Musée Rodin Paris"},{t:"Café de Flore (Saint-Germain)",why:"O café dos filósofos (Sartre e Beauvoir), perto do Bon Marché. Um expresso na calçada, sentindo o bairro.",photo:"img/cafe-flore.jpg",maps:"Café de Flore Saint-Germain Paris"},{t:"Les Invalides + Túmulo de Napoleão",why:"A cúpula dourada que brilha no céu de Paris, e o sarcófago de Napoleão sob ela. A 10 min do Orsay/Rodin.",photo:"img/invalides.jpg",tr:"Rive Gauche, entre o Orsay e o Rodin. M° Invalides / La Tour-Maubourg. Igreja do Domo + túmulo ~€15.",hist:"Luís XIV mandou construir como hospital e lar de soldados feridos — função que mantém até hoje. Sob a cúpula dourada de Hardouin-Mansart repousa Napoleão, num sarcófago de quartzito vermelho dentro de seis caixões encaixados. O Museu do Exército ao lado é um dos maiores do mundo.",maps:"Les Invalides Paris"},{t:"Jardin du Luxembourg",why:"O parque mais amado dos parisienses: cadeiras verdes na beira da fonte, o palácio do Senado e um clima de domingo perfeito.",photo:"img/luxembourg.jpg",tr:"Saint-Germain/Quartier Latin, perto do Bon Marché e do Café de Flore. M° Saint-Sulpice / RER Luxembourg.",hist:"Maria de Médici mandou criá-lo em 1612 com saudade dos jardins de Florença — por isso o ar italiano. Hoje o palácio é o Senado francês. Os parisienses vêm ler, jogar xadrez e ver as crianças empurrarem barquinhos no tanque octogonal.",maps:"Jardin du Luxembourg Paris"}]
};

function mh(q){return "https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(q);}
function el(id){return document.getElementById(id);}
function setbar(t,back){el('bt').textContent=t;el('back').style.display=back?'inline-block':'none';}

function dayMapUrl(d){var pts=[];d.blocks.forEach(function(b){if(b.maps)pts.push(encodeURIComponent(b.maps));});return "https://www.google.com/maps/dir/"+pts.join('/');}

 var d=DAYS.find(function(x){return x.n===n;});

 h+='<div class="col"><p class="intro">'+d.intro+'</p><div class="goldline">🌇 Em julho o sol se põe só ~22h — a tarde rende. ✨ Após escurecer, a Torre Eiffel cintila 5 min a cada hora cheia.</div>';

 h+=extrasHTML(d.n);
 if(d.momento){h+='<div class="moment"><div class="mhd">💗 Momento a dois</div><p>'+d.momento+'</p>';if(d.jantar){h+='<div class="jantar"><div class="jhd">🍷 '+d.jantar.t+'</div><p>'+d.jantar.b+'</p>';if(d.jantar.opts)d.jantar.opts.forEach(function(o){h+='<a class="map" target="_blank" rel="noopener" href="'+mh(o.m)+'">'+o.n+' →</a>';});h+='</div>';}h+='</div>';}
 h+='<div class="endphrase"><div class="hl">Frase do dia</div><div class="hfr">'+d.phrase.fr+'</div><button class="play" data-say="'+d.phrase.fr+'" style="margin-top:10px;width:auto;border-radius:40px;padding:9px 18px;font-size:13px">🔊 ouvir</button><div class="hpt">'+d.phrase.pt+'</div></div>';

 h+='</div>';

function openMapaDia(n){var d=DAYS.find(function(x){return x.n===n;});window.open(dayMapUrl(d),'_blank');}

var THAISE=[
{d:"Segunda · 29 jun",places:[
{tm:"9h · manhã",t:"Escola — Passaporte Fashionista",addr:"58 Av. de la Grande Armée, 75017",foto:"img/arc.jpg",hist:"Seu curso começa aqui, na Avenue de la Grande Armée — a avenida que sai POR TRÁS do Arco do Triunfo seguindo o grande eixo histórico de Paris rumo a La Défense (a continuação exata da linha Louvre–Concorde–Champs–Arco). Você emerge do metrô e o Arco te dá bom dia. Manhã de masterclass: tendências 26/27 e como o luxo se traduz em joalheria.",mais:"Você está sobre um dos gestos urbanos mais ambiciosos do mundo: o Axe Historique (Eixo Histórico), uma linha reta de 8 km que parte do pátio do Louvre, atravessa o Obelisco da Concorde, sobe os Champs-Élysées até o Arco do Triunfo e segue pela sua Avenue de la Grande Armée até a Grande Arche de La Défense — um arco moderno e vazado, de 1989, alinhado de propósito com o Arco de Napoleão. Reis, imperadores e presidentes foram estendendo essa linha por mais de 350 anos, cada um querendo deixar sua marca no horizonte. Quando sair do curso e olhar pra trás, o Arco do Triunfo estará perfeitamente emoldurado pela avenida. Pouca gente percebe que pisa numa régua começada por Le Nôtre no séc. XVII.",m:"58 Avenue de la Grande Armée, 75017 Paris"},
{tm:"17h15",t:"Galeries Lafayette — evento Sunday Riley",addr:"Champs-Élysées",foto:"img/galeries-lafayette.jpg",hist:"As Galeries Lafayette nasceram em 1894 como uma lojinha de novidades e explodiram em 1912 com a cúpula art nouveau de vidro e aço de 33 m — uma 'catedral do comércio' onde o luxo virou espetáculo aberto a todos. A unidade dos Champs (2019) é a mais sensorial e tecnológica. O evento é da Sunday Riley, marca de skincare de luxo da Califórnia.",mais:"Théophile Bader e um primo abriram uma pequena loja de novidades em 1894, na esquina da Rue La Fayette. O salto veio em 1912: o arquiteto Ferdinand Chanut e o mestre vidraceiro Jacques Gruber (gênio da Art Nouveau de Nancy) ergueram a cúpula neobizantina de mais de 40 m de altura, em vidro e aço dourado, pra que a luz natural caísse sobre as mercadorias como numa catedral. Era a estratégia dos 'grands magasins' que Émile Zola já retratara no romance 'O Paraíso das Damas': transformar a compra em espetáculo e desejo. Suba ao terraço (de graça) — a vista 360° de Paris, com a Ópera Garnier aos seus pés e a Torre Eiffel ao longe, é um dos segredos mais bem guardados da cidade. A loja dos Champs, onde é o evento, é a mais nova, assinada pelo escritório dinamarquês BIG (Bjarke Ingels), de 2019.",m:"Galeries Lafayette Champs-Élysées Paris"},
{tm:"18h · reencontro 💗",t:"RH Paris — o Paulo te encontra",addr:"Champs-Élysées",foto:"img/champs-elysees.jpg",hist:"RH (Restoration Hardware) é a gigante americana do design de interiores de luxo; sua galeria na avenida mais famosa do mundo é uma imersão em mobiliário, arte e arquitetura. É aqui que o Paulo te encontra às 18h — fim do primeiro dia, vocês dois de novo na Champs-Élysées ao entardecer.",mais:"A RH (antiga Restoration Hardware) é a marca que popularizou o 'varejo como hospitalidade': em vez de lojas, abre galerias — espaços onde o mobiliário é encenado em ambientes completos, com cafés, terraços e jardins, pra você morar a marca por algumas horas em vez de só comprar. É a mesma lógica que a alta joalheria usa nos seus salões: o luxo de hoje vende experiência e tempo, não vitrine. Repare como cada andar é pensado como um apartamento — luz quente, pé-direito alto, nada de etiqueta de preço à mostra. Fim de tarde nos Champs, é o lugar perfeito pra você e o Paulo sentarem e contarem o dia um pro outro.",m:"Champs-Élysées, Paris"}
]},
{d:"Terça · 30 jun",places:[
{tm:"11h",t:"Boucheron",addr:"26 Place Vendôme",foto:"img/place-vendome.jpg",hist:"Boucheron foi a PRIMEIRA joalheria a se instalar na Place Vendôme, em 1893. Frédéric Boucheron, fino observador, escolheu de propósito o nº 26 — o canto que pega mais sol — pra que os diamantes da vitrine cintilassem o dia inteiro. A praça, desenhada por Hardouin-Mansart para Luís XIV, tem no centro a coluna de Napoleão (bronze de canhões fundidos em Austerlitz). Hoje as maiores maisons do mundo cercam essa coluna — e a Boucheron começou tudo.",mais:"Frédéric Boucheron abriu sua primeira boutique em 1858, ainda nas galerias do Palais-Royal, e só em 1893 ocupou o nº 26 da Place Vendôme — o primeiro joalheiro a apostar na praça, hoje cercada por todos os grandes nomes. Sua obra-prima é o colar 'Point d'Interrogation' (1879): sem fecho, ele se apoia sozinho no pescoço — uma revolução, porque pela primeira vez a mulher podia colocar a própria joia sem ajuda. A casa é célebre pelo naturalismo: penas de pavão, hera, serpentes e flocos de neve cravejados. A praça em si é uma joia: desenhada por Jules Hardouin-Mansart para Luís XIV, tem no centro a Coluna Vendôme, feita do bronze de 1.200 canhões tomados em Austerlitz — derrubada pelos communards em 1871 (com o pintor Courbet por trás) e depois reerguida. Hoje a Boucheron pertence ao grupo Kering.",m:"26 Place Vendôme, Paris"},
{tm:"13h30 almoço · 15h masterclass",t:"Printemps — almoço Bleu Coupole",addr:"Bd Haussmann",foto:"img/printemps.jpg",hist:"O Printemps Haussmann, de 1865, é um dos grandes magazines de Paris. Seu tesouro é a cúpula de vitrais art déco de 1923 (3.185 vidros coloridos), e sob ela fica o restaurante — você almoça literalmente debaixo dela. À tarde, masterclass de joalheria na sala Rotonde. Repare na fachada: as varandas de ferro art nouveau são tombadas.",mais:"Jules Jaluzot fundou o Printemps em 1865 e foi um pioneiro: em 1881 tornou-se uma das primeiras lojas do mundo iluminada a eletricidade, e inventou as liquidações de fim de estação e a entrega em domicílio. A cúpula art nouveau de vidro colorido, sua imagem-símbolo, tem cerca de 3.185 peças montadas em 1923 pelo ateliê Brière; durante a 2ª Guerra ela foi desmontada peça por peça e escondida pra não ser destruída, voltando ao lugar só em 1973. Hoje é monumento histórico tombado. O restaurante Bleu Coupole fica exatamente sob ela — você almoça banhada por essa luz de igreja laica. Repare também na fachada: as marquises e varandas de ferro forjado são originais do início do séc. XX.",m:"Printemps Haussmann Paris"}
]},
{d:"Quarta · 01 jul",places:[
{tm:"9h30",t:"Mad Lords",addr:"316 Rue Saint-Honoré",foto:"img/rue-saint-honore.jpg",hist:"A Rue Saint-Honoré é a rua da moda autoral de Paris — discreta por fora, poderosíssima por dentro (foi aqui que a lendária boutique Colette ditou moda ao mundo). A Mad Lords é o oposto da joalheria de banco: peças rock, prata, vintage garimpado e sob medida, queridinhas de músicos e estilistas. Joia como atitude.",mais:"A Rue Saint-Honoré era, na origem, uma estrada romana, e há séculos é a espinha dorsal da moda parisiense — foi aqui que a lendária Colette (no nº 213, de 1997 a 2017) inventou o conceito de 'concept store' e ditou tendência pro mundo todo. A Mad Lords é a antítese da joalheria de cofre da Place Vendôme: peças rock, prata enegrecida, diamantes antigos misturados a caveiras e correntes, muito sob medida, adoradas por músicos e estilistas. É joia como tatuagem — identidade e atitude, não investimento. Olhe as vitrines das casas vizinhas no caminho: nesta rua, o poder se veste de discrição.",m:"316 Rue Saint-Honoré, Paris"},
{tm:"15h",t:"Vever",addr:"9 Rue de la Paix",foto:"img/rue-de-la-paix.jpg",hist:"A Rue de la Paix liga a Ópera à Place Vendôme e foi, no séc. XIX, O endereço do luxo (é a casa mais cara do Banco Imobiliário francês). A Vever é uma das mais antigas (1821) e foi ESTRELA da joalheria Art Nouveau — Henri Vever levou o Grand Prix na Exposição Universal de 1900. Reaberta há pouco pela 6ª geração, agora obcecada por ética e ouro sustentável. História viva nas suas mãos.",mais:"A Vever nasceu em 1821 em Metz e depois se mudou pra Paris; seu auge foi com Henri Vever, que não era só joalheiro — era historiador (escreveu a obra de referência sobre a joalheria francesa do séc. XIX) e grande colecionador de arte japonesa. No Grand Prix da Exposição Universal de 1900 ele consagrou a Art Nouveau em joias: esmalte plique-à-jour (translúcido, como vitral), libélulas, perfis de mulheres, formas da natureza. A casa adormeceu por décadas e foi ressuscitada em 2021 por Damien e Camille Vever, a 6ª geração, agora obcecada por rastreabilidade, ouro reciclado e diamantes éticos. E a rua faz jus: a Rue de la Paix, aberta por Napoleão, foi o berço da alta-costura (Charles Worth) e o endereço histórico da Cartier (nº 13).",m:"9 Rue de la Paix, Paris"},
{tm:"17h · reencontro 💗",t:"Samaritaine — o Paulo te encontra",addr:"9 Rue de la Monnaie",foto:"img/samaritaine.jpg",hist:"A Samaritaine é uma loja-joia: aberta em 1870, fechada por quase 16 anos e reaberta em 2021 numa restauração de tirar o fôlego. Por dentro, o grande vitral e a escadaria de ferro art nouveau, com o friso de pavões; na Rue de Rivoli, a fachada ondulada de vidro dos japoneses SANAA. O antigo e o novíssimo na mesma quadra — pura aula de arquitetura. O Paulo te encontra aqui.",mais:"Ernest Cognacq e Marie-Louise Jaÿ — ele um ex-camelô, ela uma vendedora — fundaram a Samaritaine em 1870 com o lema 'na Samaritaine se encontra de tudo'. O edifício é uma aula de história da arquitetura: a parte Art Nouveau (1905-1910) é de Frantz Jourdain, com estrutura de ferro aparente, cerâmica florida e um deslumbrante friso de pavões; a ampliação Art Déco (1928), voltada ao Sena, é de Henri Sauvage. Fechada em 2005 por questões de segurança, ficou 16 anos em obras e reabriu em 2021 numa restauração da LVMH, com a polêmica fachada ondulada de vidro dos japoneses SANAA na Rue de Rivoli — uma 'cortina' que reflete a cidade antiga. Por dentro, a grande escadaria de ferro e o friso restaurado de 260 m² são de tirar o fôlego. Hoje abriga loja de luxo e o hotel Cheval Blanc.",m:"La Samaritaine, 9 Rue de la Monnaie, Paris"}
]},
{d:"Quinta · 02 jul",places:[
{tm:"11h",t:"Tiffany & Co.",addr:"62 Champs-Élysées",foto:"img/champs-elysees.jpg",hist:"Fundada em Nova York em 1837, a Tiffany inventou duas coisas eternas: a 'caixa azul' (a cor é registrada — ninguém mais pode usá-la) e o anel de noivado 'Tiffany Setting' (1886), com a pedra suspensa no ar por seis garras pra captar o máximo de luz. Audrey Hepburn fez o resto, de vestido preto diante da vitrine. Esta é a loja-bandeira nos Champs.",mais:"Charles Lewis Tiffany abriu a casa em Nova York em 1837. O famoso azul foi escolhido em 1845 (a cor do ovo do tordo-americano) e hoje é uma cor registrada, com número Pantone próprio — '1837'. O 'Tiffany Setting' de 1886 ergueu o diamante solitário acima do anel, em seis garras, pra captar luz por todos os lados — virou O anel de noivado. A casa guarda o Tiffany Diamond, um diamante amarelo de 128,54 quilates usado por pouquíssimas mulheres na história: Audrey Hepburn (na divulgação de 'Bonequinha de Luxo', 1961), Lady Gaga (Oscar 2019) e Beyoncé. Designers lendários assinaram coleções: Jean Schlumberger, Elsa Peretti (o bracelete Bone, o pingente Open Heart) e Paloma Picasso. Em 2021 a LVMH comprou a Tiffany por US$ 15,8 bilhões — a maior aquisição da história do luxo.",m:"Tiffany 62 Champs-Élysées Paris"},
{tm:"15h",t:"Galerie Dior",addr:"11 Rue François 1er",foto:"img/avenue-montaigne.jpg",hist:"A dois passos da Avenue Montaigne — a avenida da alta-costura, onde Christian Dior abriu sua maison no nº 30 e lançou em 1947 o 'New Look' que reinventou a silhueta feminina do pós-guerra. A Galerie Dior é o museu da casa: a escada com vestidos flutuando num degradê de cores é o ponto mais fotografado de Paris pelas amantes de moda.",mais:"Em 12 de fevereiro de 1947, Christian Dior apresentou sua primeira coleção no nº 30 da Avenue Montaigne. A editora Carmel Snow exclamou 'it's such a new look!' — e batizou uma era: cintura marcada, ombros suaves e saias rodadíssimas que gastavam metros de tecido, uma fartura quase escandalosa num pós-guerra ainda em racionamento. Dior morreu em 1957, e por sua casa passaram nomes que viraram lenda: Yves Saint Laurent (aos 21 anos!), Marc Bohan, Gianfranco Ferré, John Galliano, Raf Simons e, desde 2016, Maria Grazia Chiuri — a primeira mulher à frente da maison. A Galerie Dior (museu aberto em 2022) tem como clímax uma escadaria onde centenas de miniaturas e vestidos flutuam num degradê de cores — o ponto mais fotografado por quem ama moda. Procure o lírio-do-vale: a flor da sorte de Monsieur Dior, costurada na barra de muitos vestidos.",m:"Galerie Dior, 11 Rue François 1er, Paris"},
{tm:"16h30",t:"Dolce & Gabbana — Alta Gioielleria",addr:"54 Av. Montaigne",foto:"img/avenue-montaigne.jpg",hist:"Na mesma Avenue Montaigne, a alta joalheria dos sicilianos Domenico Dolce e Stefano Gabbana: peças únicas, barrocas, douradas, inspiradas na Sicília, nos mosaicos bizantinos e no esplendor do sul da Itália. O oposto do minimalismo — joia como ópera.",mais:"Domenico Dolce (siciliano, filho de alfaiate) e Stefano Gabbana (milanês) se conheceram em 1980 e lançaram a grife em 1985. A Alta Gioielleria e a Alta Moda da dupla são desfiladas em lugares-espetáculo — Taormina, Veneza, Capri — com peças únicas que custam fortunas. O imaginário é 100% mediterrâneo e barroco: mosaicos bizantinos de Monreale, ouro de igreja, limões da Sicília, a coppola, o preto do luto siciliano e a sensualidade do cinema de Visconti ('O Leopardo'). Onde a Place Vendôme é contenção, a D&G é ópera: joia como teatro, fé e festa. Estar na Avenue Montaigne — a rua da alta-costura, com Dior, Chanel e Valentino lado a lado — já é parte do espetáculo.",m:"54 Avenue Montaigne, Paris"},
{tm:"19h · reencontro 💗",t:"Pomellato — Palais de Tokyo",addr:"Av. du Président Wilson",foto:"img/palais-tokyo.jpg",hist:"A Pomellato nasceu em Milão em 1967 e mudou a joalheria italiana: foi a primeira a tratar joia como moda — prêt-à-porter de luxo, pedras coloridas inusitadas, a coleção Nudo. A expo é no Palais de Tokyo, templo da arte contemporânea (e a esplanada dele tem o melhor pôr do sol sobre a Torre Eiffel). O Paulo te encontra aqui às 19h.",mais:"Pino Rabolini criou a Pomellato em Milão em 1967, vindo de uma família de ourives, com uma ideia então herética: aplicar a lógica do prêt-à-porter à joalheria — joias pra usar todo dia, empilháveis, sem hora marcada. O anel Nudo (2001) é o ícone: uma pedra colorida lapidada e 'nua', sem garras escondendo nada. A casa foi das primeiras a adotar 100% ouro responsável e hoje pertence ao grupo Kering. A exposição é no Palais de Tokyo — erguido para a Expo de 1937, é hoje o maior centro de arte contemporânea da Europa, famoso pelo concreto cru, pelas mostras ousadas e por abrir até meia-noite. E não deixe de sair na esplanada: dali se vê uma das mais belas perspectivas da Torre Eiffel, do outro lado do Sena — guarde pro reencontro com o Paulo às 19h.",m:"Palais de Tokyo, Paris"}
]},
{d:"Sexta · 03 jul",places:[
{tm:"dia todo · fora de Paris",t:"La Vallée Village",addr:"Serris (perto da Disneyland)",foto:"img/la-vallee-village.jpg",hist:"La Vallée Village é o outlet de grifes a leste de Paris, desenhado como uma ruazinha colorida a céu aberto — mais de 110 boutiques. É onde se garimpa alta-costura da temporada passada com 30–60% off. Programa: café + masterclass sobre consumo e sustentabilidade no luxo, almoço incluído e tarde livre pra caçar. Dica: leve uma sacola dobrável e pés descansados.",mais:"La Vallée Village faz parte da The Bicester Collection, uma rede de 11 'villages' de luxo na Europa e China, da Value Retail — todos desenhados como ruazinhas charmosas a céu aberto, não como shopping fechado. Fica em Serris, ao lado do Val d'Europe e da Disneyland Paris, a leste da cidade. A lógica do outlet: as marcas escoam coleções de temporadas passadas, sobras e linhas feitas pra outlet, com 33% a 60% de desconto. Sendo de fora da União Europeia, você ainda pode pedir o reembolso de imposto (détaxe) — peça a fatura de tax refund nas lojas. Dicas de quem entende: chegue cedo, use a personal shopper gratuita pra ganhar tempo, e foque no que vale a pena lá (couro, casacos, bolsas).",m:"La Vallée Village, Serris"}
]},
{d:"Sábado · 04 jul",places:[
{tm:"com o grupo",t:"Maison Pommery",addr:"Reims (provável bate-volta)",foto:"img/pommery.jpg",hist:"Provável bate-volta a Reims, capital do champagne. A Maison Pommery foi erguida por Madame Louise Pommery no fim do séc. XIX — viúva e uma das primeiras grandes empresárias da França. Ela INVENTOU o champagne 'brut' (seco), criado pro gosto inglês, rompendo com o champagne doce da época. As caves são antigas pedreiras de giz romanas, a 30 m de profundidade, com 18 km de galerias esculpidas. Almoço harmonizado na fonte.",mais:"Louise Pommery enviuvou em 1858 e, em vez de vender o negócio do marido, assumiu o leme e o transformou numa das maiores casas de champagne do mundo — feito raríssimo para uma mulher do séc. XIX. Sua jogada genial foi criar, em 1874, o primeiro champagne 'brut' (seco), pensado pro paladar inglês — até então o champagne era doce; ela inverteu o mercado. Mandou erguer prédios de estilo escocês-elisabetano e comprou 120 'crayères' — antigas pedreiras de giz cavadas pelos romanos —, ligando-as por 18 km de galerias a 30 m de profundidade, onde mandou esculpir baixos-relevos monumentais nas paredes. Foi também mecenas visionária: encheu as caves de arte, tradição que continua hoje com mostras de arte contemporânea entre as garrafas. E você estará em Reims, a cidade da catedral onde os reis da França eram coroados — vale uma espiada se sobrar tempo.",m:"Maison Pommery, Reims"}
]}

 h+='</div>';el('app').innerHTML=h;window.scrollTo(0,0);
}

}
var FRVOICE=null;
function pickVoice(){try{var vs=window.speechSynthesis.getVoices();FRVOICE=vs.filter(function(v){return /^fr/i.test(v.lang);})[0]||null;}catch(e){}}
if('speechSynthesis' in window){pickVoice();window.speechSynthesis.onvoiceschanged=pickVoice;}
function speak(t){if(!('speechSynthesis' in window)){alert('O áudio funciona no navegador do celular (Safari/Chrome).');return;}window.speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(t);u.lang='fr-FR';u.rate=0.88;if(FRVOICE)u.voice=FRVOICE;window.speechSynthesis.speak(u);}
function hideShow(){el('show').classList.remove('on');}
document.addEventListener('click',function(e){
 var s=e.target.closest('[data-say]');if(s){speak(s.getAttribute('data-say'));s.classList.add('on');setTimeout(function(){s.classList.remove('on');},700);return;}
 var sh=e.target.closest('[data-show]');if(sh){var ad=sh.getAttribute('data-show');el('showbig').textContent=ad;el('showmap').href=mh(ad);el('show').classList.add('on');}
});
el('back').onclick=function(){go(renderHome);};
renderHome();
if('serviceWorker' in navigator && location.protocol.indexOf('http')===0 && location.hostname.indexOf('localhost')<0 && location.hostname!=='127.0.0.1'){navigator.serviceWorker.register('sw.js').catch(function(){});}
document.addEventListener('change',function(e){var c=e.target.closest('[data-chk]');if(c)localStorage.setItem('chk:'+c.getAttribute('data-chk'),c.checked?'1':'');});
function setTheme(d){document.body.classList.toggle('dark',d);var b=el('themebtn');if(b)b.textContent=d?'☀️':'🌙';localStorage.setItem('dark',d?'1':'');}
if(el('themebtn'))el('themebtn').onclick=function(){setTheme(!document.body.classList.contains('dark'));};
setTheme(localStorage.getItem('dark')==='1');
</script>
</body>
</html>

{d:"Segunda · 29 jun",comer:[{t:"Chez Meunier",d:"fama de melhor croissant, no Bd Haussmann — coladinho nas Galeries e no Printemps",m:"Chez Meunier 35 Boulevard Haussmann Paris"}],places:[
{tm:"9h · manhã",t:"Escola — Passaporte Fashionista",addr:"58 Av. de la Grande Armée, 75017",foto:"img/arc.jpg",hist:"Seu curso começa aqui, na Avenue de la Grande Armée — a avenida que sai POR TRÁS do Arco do Triunfo seguindo o grande eixo histórico de Paris rumo a La Défense (a continuação exata da linha Louvre–Concorde–Champs–Arco). Você emerge do metrô e o Arco te dá bom dia. Manhã de masterclass: tendências 26/27 e como o luxo se traduz em joalheria.",mais:"Você está pisando no Axe Historique — o Eixo Histórico —, talvez o gesto urbano mais ambicioso já feito por uma civilização: uma linha reta de 8 km que André Le Nôtre, o jardineiro do Rei Sol, começou a traçar em 1667 ao esticar a vista das Tulherias rumo ao poente. Ao longo de três séculos e meio, cada governante quis prolongá-la e deixar sua marca — o Obelisco de Luxor na Concorde (3.300 anos, presente do Egito), a subida dos Champs-Élysées, o Arco do Triunfo encomendado por Napoleão em 1806.<br><br>A sua escola fica logo ATRÁS do Arco, na Avenue de la Grande Armée — batizada em homenagem ao exército de Napoleão —, que é a continuação exata dessa linha rumo ao oeste. E ela não para: segue até La Défense, onde em 1989 ergueram a Grande Arche, um cubo oco e branco tão imenso que a catedral de Notre-Dame caberia sob o seu vão, alinhado de propósito com o Arco do Triunfo pra 'responder' a Napoleão dois séculos depois. Curiosidade de arquiteto: a Grande Arche teve de ser girada uns 6° em relação ao eixo, porque embaixo dela passavam o metrô, o trem e as ruas — não dava pra assentá-la perfeitamente reta.<br><br>Então, quando você sair da masterclass e olhar pra trás, o Arco do Triunfo estará emoldurado pela avenida; e além dele, invisível mas exata, a linha que vai até o Louvre. Pouquíssima gente no mundo sabe que, ao tomar um café ali, está em pé sobre uma régua de 350 anos.",m:"58 Avenue de la Grande Armée, 75017 Paris"},
{tm:"17h15",t:"Galeries Lafayette — evento Sunday Riley",addr:"Champs-Élysées",foto:"img/galeries-lafayette.jpg",hist:"As Galeries Lafayette nasceram em 1894 como uma lojinha de novidades e explodiram em 1912 com a cúpula art nouveau de vidro e aço de 33 m — uma 'catedral do comércio' onde o luxo virou espetáculo aberto a todos. A unidade dos Champs (2019) é a mais sensorial e tecnológica. O evento é da Sunday Riley, marca de skincare de luxo da Califórnia.",mais:"Tudo começou em 1894, quando os primos alsacianos Théophile Bader e Alphonse Kahn abriram uma lojinha de novidades na esquina da Rue La Fayette com a Chaussée d'Antin. Em menos de vinte anos viraram um império — e em 1912 coroaram a loja da Boulevard Haussmann com a cúpula que virou símbolo de Paris: 43 metros de altura, projetada por Ferdinand Chanut, com vitrais do mestre Jacques Gruber (o gênio da Art Nouveau de Nancy) e ferragens douradas de Louis Majorelle, em estilo neobizantino. A ideia era genial: deixar a luz cair lá de cima sobre as mercadorias como numa catedral, transformando o ato de comprar em peregrinação e desejo.<br><br>Era a era dos 'grands magasins', que Émile Zola já imortalizara no romance 'O Paraíso das Damas' (1883): preço fixo, vitrines teatrais, liquidações, o consumo como espetáculo — o luxo, antes só dos palácios, agora aberto a quem entrasse pela porta. Sob a cúpula, até hoje acontecem desfiles numa passarela suspensa.<br><br>Dois segredos que quase ninguém aproveita: o terraço lá em cima é gratuito e entrega uma das mais belas vistas 360° de Paris — a Ópera Garnier aos seus pés, a Torre Eiffel ao longe. E a loja dos Champs-Élysées, onde é o seu evento, é uma cria nova (2019), repensada pelo escritório dinamarquês BIG, de Bjarke Ingels — mais curada, tecnológica e íntima que a casa-mãe da Haussmann.",m:"Galeries Lafayette Champs-Élysées Paris"},
{tm:"18h · reencontro 💗",t:"RH Paris — o Paulo te encontra",addr:"Champs-Élysées",foto:"img/champs-elysees.jpg",hist:"RH (Restoration Hardware) é a gigante americana do design de interiores de luxo; sua galeria na avenida mais famosa do mundo é uma imersão em mobiliário, arte e arquitetura. É aqui que o Paulo te encontra às 18h — fim do primeiro dia, vocês dois de novo na Champs-Élysées ao entardecer.",mais:"A RH — sigla de Restoration Hardware — é a marca americana que reinventou o varejo de luxo transformando loja em experiência. A filosofia do fundador, Gary Friedman, é radical: nada de prateleiras e etiquetas, e sim 'galerias' que parecem mansões habitadas, onde o móvel é encenado em ambientes completos, com restaurantes, jardins e terraços — você passa a tarde MORANDO a marca, não comprando nela.<br><br>A RH Paris é novíssima: abriu em 5 de setembro de 2025, a primeira galeria da marca na França, justamente no nº 23 dos Champs-Élysées (no antigo prédio da Abercrombie & Fitch). São quase 4.000 m² em sete andares — uma das maiores do mundo. No 2º andar, o restaurante Le Jardin RH fica sob uma abóbada curva de vidro e aço inspirada no Grand Palais; lá no topo, o Le Petit RH tem 7.000 poliedros de vidro soprado à mão, paredes laqueadas cor de champanhe e vista 360° da cidade.<br><br>Repare na lógica, porque é a MESMA da alta joalheria que você está estudando: o luxo de hoje não vende objeto, vende tempo, atmosfera e pertencimento — exatamente o que as maisons fazem nos seus salões privados. É o ponto perfeito pra encerrar o primeiro dia: fim de tarde nos Champs, você e o Paulo num terraço, contando um pro outro tudo o que viram.",m:"Champs-Élysées, Paris"}
]},
{d:"Terça · 30 jun",places:[
{tm:"11h",t:"Boucheron",addr:"26 Place Vendôme",foto:"img/place-vendome.jpg",hist:"Boucheron foi a PRIMEIRA joalheria a se instalar na Place Vendôme, em 1893. Frédéric Boucheron, fino observador, escolheu de propósito o nº 26 — o canto que pega mais sol — pra que os diamantes da vitrine cintilassem o dia inteiro. A praça, desenhada por Hardouin-Mansart para Luís XIV, tem no centro a coluna de Napoleão (bronze de canhões fundidos em Austerlitz). Hoje as maiores maisons do mundo cercam essa coluna — e a Boucheron começou tudo.",mais:"Frédéric Boucheron abriu sua primeira boutique em 1858, aos 28 anos, sob as arcadas do Palais-Royal. Em 1893 fez a aposta que mudaria a joalheria: foi o PRIMEIRO a se instalar na aristocrática Place Vendôme, no nº 26 — e escolheu esse número de propósito, por ser o canto da praça que pega mais sol, pra que os diamantes da vitrine cintilassem o dia inteiro. Onde ele ousou ir, todas as grandes maisons o seguiram; hoje a praça é o endereço mais valioso da joalheria mundial, e foi a Boucheron que começou tudo.<br><br>A casa ficou célebre por trazer a natureza pra dentro da joia — penas de pavão, hera, serpentes, flocos de neve cravejados — e por invenções ousadas, como o colar 'Point d'Interrogation' (1879): sem fecho, ele se equilibra sozinho sobre o pescoço, permitindo pela primeira vez que uma mulher colocasse a própria joia sem a ajuda de uma criada. Um detalhe técnico que era, no fundo, um gesto de liberdade.<br><br>E a praça é uma joia de pedra: desenhada por Jules Hardouin-Mansart para Luís XIV por volta de 1699, tem no centro a Coluna Vendôme (1810), fundida com o bronze de 1.200 canhões tomados por Napoleão em Austerlitz e decorada feito a Coluna de Trajano, em Roma. Em 1871 os revolucionários da Comuna a derrubaram — com o pintor Gustave Courbet entre os idealizadores, que depois faliu pagando a reconstrução. Hoje a Boucheron pertence ao grupo Kering e ainda recebe clientes lá no alto do nº 26, num apartamento privado com vista pra coluna.",m:"26 Place Vendôme, Paris"},
{tm:"13h30 almoço · 15h masterclass",t:"Printemps — almoço Bleu Coupole",addr:"Bd Haussmann",foto:"img/printemps.jpg",hist:"O Printemps Haussmann, de 1865, é um dos grandes magazines de Paris. Seu tesouro é a cúpula de vitrais art déco de 1923 (3.185 vidros coloridos), e sob ela fica o restaurante — você almoça literalmente debaixo dela. À tarde, masterclass de joalheria na sala Rotonde. Repare na fachada: as varandas de ferro art nouveau são tombadas.",mais:"Jules Jaluzot, ex-funcionário do Bon Marché, fundou o Printemps em 1865 e logo virou pioneiro: foi uma das primeiras lojas do mundo a usar iluminação elétrica (anos 1880), inventou as liquidações de fim de estação e a entrega em domicílio, e batizou a casa de 'Primavera' por puro otimismo. Um incêndio devastou boa parte em 1881, e o arquiteto Paul Sédille reergueu a fachada monumental que você vê hoje, tombada como monumento histórico.<br><br>O tesouro é a cúpula: 3.185 vidros coloridos montados em 1923 pelo ateliê Brière, num grande vitral. Durante a 2ª Guerra ela foi desmontada peça por peça e escondida pra escapar dos bombardeios — e só voltou ao lugar em 1973. Hoje o restaurante Bleu Coupole fica exatamente sob ela: você almoça banhada por uma luz de igreja laica, colorida, que muda conforme o céu lá fora.<br><br>Olho de quem entende: o Printemps foi um dos berços do 'merchandising' moderno — suas vitrines animadas de Natal viraram uma tradição que para a cidade. Suba também ao terraço pra ver o mar de telhados de zinco de Paris; e, na fachada, repare nas marquises e varandas de ferro forjado, originais da virada do século XX.",m:"Printemps Haussmann Paris"}
]},
{d:"Quarta · 01 jul",comer:[{t:"L'Artisan Parfumeur",d:"na Rue Saint-Honoré (a sua rua de hoje) — peça pra provar o perfume 'La Chasse aux Papillons'",m:"L'Artisan Parfumeur 209 Rue Saint-Honoré Paris"}],places:[
{tm:"9h30",t:"Mad Lords",addr:"316 Rue Saint-Honoré",foto:"img/rue-saint-honore.jpg",hist:"A Rue Saint-Honoré é a rua da moda autoral de Paris — discreta por fora, poderosíssima por dentro (foi aqui que a lendária boutique Colette ditou moda ao mundo). A Mad Lords é o oposto da joalheria de banco: peças rock, prata, vintage garimpado e sob medida, queridinhas de músicos e estilistas. Joia como atitude.",mais:"Esqueça a joalheria de cofre da Place Vendôme: a Mad Lords é o oposto rebelde. Foi fundada em 2012 pelo casal Serge e Caroline Muller — ela com passado de marketing e relações públicas em casas como Louis Vuitton e Ralph Lauren, e anos no mercado de luxo de Nova York. Os dois juntaram o amor por joia a um estilo de vida 'boho encontra rock-and-roll' e criaram uma das lojas mais cultuadas de Paris, nos nº 316 e 320 da Rue Saint-Honoré.<br><br>O lugar é uma experiência: uma boutique de rua e um ateliê com vista pra um pátio interno, entre móveis vintage, objetos exóticos e perfumes. A Mad Lords não fabrica — ela CURA: garimpa peças de designers cultuados do mundo todo, como o turco Sevan Bıçakçı (anéis com micro-esculturas dentro da pedra), a americana Anita Ko, a Jacquie Aiche e a Spinelli Kilcollin (dos anéis-corrente). O lema é 'joia para quebradores de código' — peças com alma, história e atitude, não etiqueta de banco.<br><br>E o endereço combina: a Rue Saint-Honoré, antiga estrada romana, é a espinha dorsal da moda autoral de Paris — foi aqui que a lendária Colette (nº 213, de 1997 a 2017) inventou o conceito de 'concept store' e ditou tendência pro planeta. Nesta rua, o verdadeiro poder se veste de discrição.",m:"316 Rue Saint-Honoré, Paris"},
{tm:"15h",t:"Vever",addr:"9 Rue de la Paix",foto:"img/rue-de-la-paix.jpg",hist:"A Rue de la Paix liga a Ópera à Place Vendôme e foi, no séc. XIX, O endereço do luxo (é a casa mais cara do Banco Imobiliário francês). A Vever é uma das mais antigas (1821) e foi ESTRELA da joalheria Art Nouveau — Henri Vever levou o Grand Prix na Exposição Universal de 1900. Reaberta há pouco pela 6ª geração, agora obcecada por ética e ouro sustentável. História viva nas suas mãos.",mais:"A Vever é uma das mais antigas dinastias de joalheiros da França: nasceu em 1821 em Metz e se mudou pra Paris em 1871, quando a região foi anexada pela Alemanha. Seu auge tem nome: Henri Vever, que não era só joalheiro — era também historiador (escreveu a obra de referência sobre a joalheria francesa do século XIX, em três volumes) e um dos maiores colecionadores de arte japonesa da Europa, paixão que transparece nas suas joias.<br><br>No Grand Prix da Exposição Universal de Paris, em 1900, a Vever consagrou a Art Nouveau em forma de joia: esmalte plique-à-jour (translúcido, como um vitral em miniatura), libélulas, íris, perfis de mulheres de cabelos esvoaçantes — a natureza e o sonho no lugar da rigidez. Peças que dialogavam com Lalique e que hoje estão em museus.<br><br>Depois a casa adormeceu por décadas — até 2021, quando Damien e Camille Vever, a 6ª geração, a ressuscitaram com uma obsessão bem contemporânea: rastreabilidade total, ouro 100% reciclado e diamantes éticos. É raro tocar numa marca que atravessou 200 anos e renasceu fiel a si mesma. E o endereço não decepciona: a Rue de la Paix, aberta por Napoleão, foi o berço da alta-costura (Charles Worth) e abriga a Cartier desde 1899 — é, não à toa, a casa mais cara do Banco Imobiliário francês.",m:"9 Rue de la Paix, Paris"},
{tm:"17h · reencontro 💗",t:"Samaritaine — o Paulo te encontra",addr:"9 Rue de la Monnaie",foto:"img/samaritaine.jpg",hist:"A Samaritaine é uma loja-joia: aberta em 1870, fechada por quase 16 anos e reaberta em 2021 numa restauração de tirar o fôlego. Por dentro, o grande vitral e a escadaria de ferro art nouveau, com o friso de pavões; na Rue de Rivoli, a fachada ondulada de vidro dos japoneses SANAA. O antigo e o novíssimo na mesma quadra — pura aula de arquitetura. O Paulo te encontra aqui.",mais:"A história já começa romântica: Ernest Cognacq, um camelô que vendia gravatas numa banca na Pont Neuf, e Marie-Louise Jaÿ, vendedora do Bon Marché, se casaram e em 1870 abriram uma lojinha — batizada de Samaritaine por causa de uma antiga bomba d'água da ponte, decorada com a cena bíblica da samaritana. O lema virou ditado parisiense: 'On trouve tout à la Samaritaine' (na Samaritaine se acha de tudo). O casal enriqueceu e virou grande mecenas — sua coleção de arte do séc. XVIII é hoje o Musée Cognacq-Jay.<br><br>O prédio é uma aula viva de arquitetura: a ala Art Nouveau (1905-1910) é de Frantz Jourdain, com estrutura de ferro aparente, cerâmica florida e um deslumbrante friso de pavões; a ampliação Art Déco voltada ao Sena (1926-1928) é de Henri Sauvage. Fechou em 2005 por não cumprir as normas de segurança e ficou 16 anos em obras.<br><br>Reabriu em 2021, restaurada pela LVMH, e o contraste virou o espetáculo: na Rue de Rivoli, os japoneses do escritório SANAA (Kazuyo Sejima e Ryue Nishizawa, prêmio Pritzker) ergueram uma fachada de vidro ondulado, como uma cortina que reflete a cidade antiga ao redor — gerou polêmica e virou ícone. Por dentro, a grande escadaria de ferro e o friso de pavões de 260 m² foram restaurados fio a fio. Hoje o prédio abriga uma loja de luxo e o hotel Cheval Blanc, com spa Dior. Velho e novíssimo na mesma quadra — pra vocês, o lugar perfeito do reencontro.",m:"La Samaritaine, 9 Rue de la Monnaie, Paris"}
]},
{d:"Quinta · 02 jul",places:[
{tm:"11h",t:"Tiffany & Co.",addr:"62 Champs-Élysées",foto:"img/champs-elysees.jpg",hist:"Fundada em Nova York em 1837, a Tiffany inventou duas coisas eternas: a 'caixa azul' (a cor é registrada — ninguém mais pode usá-la) e o anel de noivado 'Tiffany Setting' (1886), com a pedra suspensa no ar por seis garras pra captar o máximo de luz. Audrey Hepburn fez o resto, de vestido preto diante da vitrine. Esta é a loja-bandeira nos Champs.",mais:"Charles Lewis Tiffany abriu a casa em Nova York em 1837 — começou vendendo papelaria e bugigangas finas e logo virou o joalheiro da elite americana, apelidado de 'o Rei dos Diamantes' por trazer as grandes pedras europeias pro Novo Mundo. Em 1845 lançou o 'Blue Book', o primeiro catálogo de vendas por correio dos EUA, na famosa cor azul-ovo-de-tordo que virou marca registrada — hoje uma cor exclusiva, com número Pantone próprio batizado '1837'. Ninguém mais no mundo pode usá-la.<br><br>Em 1886, a Tiffany mudou a história do amor com o 'Tiffany Setting': ergueu o diamante solitário no ar, preso por seis garras finas, pra que a luz entrasse por todos os lados e a pedra brilhasse ao máximo — virou O anel de noivado, copiado pra sempre. A casa guarda o lendário Tiffany Diamond: um diamante amarelo de 128,54 quilates, lapidado em 82 facetas, usado por pouquíssimas mulheres na história — entre elas Audrey Hepburn (na campanha de 'Bonequinha de Luxo', 1961), Lady Gaga (Oscar 2019) e Beyoncé.<br><br>'Bonequinha de Luxo' eternizou a vitrine da 5ª Avenida, mas o brilho real veio dos designers: Jean Schlumberger e suas criaturas fantásticas, Elsa Peretti (o bracelete Bone, o colar Open Heart, o Diamonds by the Yard) e Paloma Picasso. Em 2021 a LVMH comprou a Tiffany por US$ 15,8 bilhões — a maior aquisição da história do luxo. A loja dos Champs é o coração francês da marca.",m:"Tiffany 62 Champs-Élysées Paris"},
{tm:"15h",t:"Galerie Dior",addr:"11 Rue François 1er",foto:"img/avenue-montaigne.jpg",hist:"A dois passos da Avenue Montaigne — a avenida da alta-costura, onde Christian Dior abriu sua maison no nº 30 e lançou em 1947 o 'New Look' que reinventou a silhueta feminina do pós-guerra. A Galerie Dior é o museu da casa: a escada com vestidos flutuando num degradê de cores é o ponto mais fotografado de Paris pelas amantes de moda.",mais:"Em 12 de fevereiro de 1947, num casarão no nº 30 da Avenue Montaigne, Christian Dior apresentou sua primeira coleção. A editora americana Carmel Snow, da Harper's Bazaar, exclamou: 'It's such a new look!' — e batizou uma era. Era a cintura fininha, os ombros suaves e as saias rodadíssimas que gastavam metros e metros de tecido: uma explosão de feminilidade e fartura num pós-guerra ainda racionado, tão ousada que houve até protesto na rua. Em poucos anos, Dior sozinho respondia por boa parte das exportações de moda da França.<br><br>Monsieur Dior era cheio de superstições — consultava cartomantes e adotou o lírio-do-vale (muguet) como amuleto, costurado escondido na barra dos vestidos. Morreu cedo, em 1957, e por sua casa passaram nomes que viraram lenda: Yves Saint Laurent assumiu aos 21 anos, depois vieram Marc Bohan, Gianfranco Ferré, o teatral John Galliano, Raf Simons (do documentário 'Dior and I') e, desde 2016, Maria Grazia Chiuri — a primeira MULHER à frente da maison.<br><br>A Galerie Dior, museu aberto em 2022 no endereço histórico restaurado, conta tudo isso em treze salas. O clímax é uma escadaria em espiral onde mais de 1.800 miniaturas, objetos e vestidos flutuam num degradê de cores do branco ao rosa — o ponto mais fotografado de Paris por quem ama moda. Procure o muguet escondido: a sorte de Monsieur Dior continua ali.",m:"Galerie Dior, 11 Rue François 1er, Paris"},
{tm:"16h30",t:"Dolce & Gabbana — Alta Gioielleria",addr:"54 Av. Montaigne",foto:"img/avenue-montaigne.jpg",hist:"Na mesma Avenue Montaigne, a alta joalheria dos sicilianos Domenico Dolce e Stefano Gabbana: peças únicas, barrocas, douradas, inspiradas na Sicília, nos mosaicos bizantinos e no esplendor do sul da Itália. O oposto do minimalismo — joia como ópera.",mais:"Domenico Dolce nasceu em Polizzi Generosa, no coração da Sicília, filho de um alfaiate — costura desde menino. Stefano Gabbana é milanês, de olhar gráfico e publicitário. Se conheceram em 1980 e lançaram a grife em 1985; hoje são uma das últimas grandes maisons ainda independentes e nas mãos dos próprios fundadores.<br><br>A Alta Gioielleria e a Alta Moda da dupla não desfilam em passarela comum: são apresentadas como espetáculos em lugares-relíquia da Itália — o teatro grego de Taormina, os palácios de Veneza, os templos de Agrigento, Capri —, com peças únicas que custam fortunas e clientes que cruzam o mundo atrás delas. O imaginário é 100% mediterrâneo e barroco: os mosaicos bizantinos dourados da catedral de Monreale, o sagrado coração, os limões e as figueiras-da-índia da Sicília, a coppola, os carrinhos sicilianos pintados, o leopardo, o preto do luto das viúvas.<br><br>É o cinema de Visconti ('O Leopardo') e a intensidade de Anna Magnani virados joia. Onde a Place Vendôme é contenção e geometria, a D&G é ópera, fé e festa — o excesso assumido como arte. E o palco não podia ser outro: a Avenue Montaigne, a rua da alta-costura, com Dior, Chanel, Valentino e Armani lado a lado. Estar ali já é parte do espetáculo.",m:"54 Avenue Montaigne, Paris"},
{tm:"19h · reencontro 💗",t:"Pomellato — Palais de Tokyo",addr:"Av. du Président Wilson",foto:"img/palais-tokyo.jpg",hist:"A Pomellato nasceu em Milão em 1967 e mudou a joalheria italiana: foi a primeira a tratar joia como moda — prêt-à-porter de luxo, pedras coloridas inusitadas, a coleção Nudo. A expo é no Palais de Tokyo, templo da arte contemporânea (e a esplanada dele tem o melhor pôr do sol sobre a Torre Eiffel). O Paulo te encontra aqui às 19h.",mais:"Pino Rabolini criou a Pomellato em Milão, em 1967, vindo de uma família de ourives (a Casa Rabolini). Sua ideia era quase herética para a época: aplicar à joalheria a lógica do prêt-à-porter da moda — joias pra usar TODO dia, empilháveis, sem precisar de ocasião nem de pedir permissão a ninguém. Foi a primeira grande marca a tratar a joia fina como atitude diária, e não como cofre guardado.<br><br>O ícone é o anel Nudo (2001): uma pedra colorida lapidada e 'nua', sem garras a escondendo — pura cor. Tudo é feito à mão em Milão, e a casa foi pioneira em usar 100% ouro responsável (certificado desde 2018). Hoje pertence ao grupo Kering e é conhecida também por campanhas de empoderamento feminino.<br><br>E a exposição não podia ter casa melhor: o Palais de Tokyo, erguido para a Exposição Internacional de 1937, é hoje o maior centro de arte contemporânea da Europa — famoso pelo interior de concreto cru deixado à mostra, pelas mostras ousadas e por ficar aberto até meia-noite. Antes de subir pro reencontro com o Paulo às 19h, saia na esplanada: dali se vê, do outro lado do Sena, uma das mais belas perspectivas da Torre Eiffel. Guarde esse pôr do sol.",m:"Palais de Tokyo, Paris"}
]},
{d:"Sexta · 03 jul",places:[
{tm:"dia todo · fora de Paris",t:"La Vallée Village",addr:"Serris (perto da Disneyland)",foto:"img/la-vallee-village.jpg",hist:"La Vallée Village é o outlet de grifes a leste de Paris, desenhado como uma ruazinha colorida a céu aberto — mais de 110 boutiques. É onde se garimpa alta-costura da temporada passada com 30–60% off. Programa: café + masterclass sobre consumo e sustentabilidade no luxo, almoço incluído e tarde livre pra caçar. Dica: leve uma sacola dobrável e pés descansados.",mais:"La Vallée Village faz parte da The Bicester Collection, a rede de 'villages' de luxo criada pela Value Retail, do americano Scott Malkin — são onze ao todo, na Europa e na China, sendo o original o Bicester Village, perto de Oxford. A sacada do conceito: nada de shopping fechado e sem graça, e sim uma ruazinha charmosa a céu aberto, de fachadas coloridas e mais de 110 boutiques, pra que comprar pareça passear. Fica em Serris, na região de Marne-la-Vallée, ao lado do Val d'Europe e da Disneyland Paris (uns 40 min de RER A do centro).<br><br>Como funciona um outlet de verdade: as grifes escoam ali coleções de temporadas passadas, sobras de estoque e, às vezes, linhas feitas especialmente pra outlet — com 33% a 60% de desconto sobre o preço de etiqueta. E tem um truque que multiplica a economia: como vocês moram fora da União Europeia, têm direito ao détaxe (reembolso de imposto, ~12%). Peça a fatura de tax refund em cada loja e valide no aeroporto, nos terminais PABLO, antes de despachar as malas.<br><br>Dicas de quem entende: chegue cedo (as melhores peças e tamanhos somem), baixe o app do village pra ver as ofertas do dia e use a personal shopper gratuita pra não perder tempo. E foque no que realmente vale num outlet francês: couro, casacos, bolsas e clássicos que não saem de moda — não o básico, que você acha em qualquer lugar.",m:"La Vallée Village, Serris"}
]},
{d:"Sábado · 04 jul",places:[
{tm:"com o grupo",t:"Maison Pommery",addr:"Reims (provável bate-volta)",foto:"img/pommery.jpg",hist:"Provável bate-volta a Reims, capital do champagne. A Maison Pommery foi erguida por Madame Louise Pommery no fim do séc. XIX — viúva e uma das primeiras grandes empresárias da França. Ela INVENTOU o champagne 'brut' (seco), criado pro gosto inglês, rompendo com o champagne doce da época. As caves são antigas pedreiras de giz romanas, a 30 m de profundidade, com 18 km de galerias esculpidas. Almoço harmonizado na fonte.",mais:"A história da Maison Pommery é, antes de tudo, a de uma mulher à frente do seu tempo. Quando o marido morreu em 1858, poucos meses depois de entrarem no ramo do vinho, Louise Pommery — com filhos pequenos — não vendeu o negócio: assumiu o leme e o transformou numa das maiores casas de champagne do mundo. Num século em que mulheres mal podiam assinar contratos, virou uma das grandes empresárias da França, ao lado da Veuve Clicquot, outra viúva visionária.<br><br>Sua jogada genial foi de paladar e de mercado: até então o champagne era doce, quase um licor. Pensando no gosto britânico por algo mais seco e elegante, ela criou em 1874 o Pommery Nature — um dos primeiros champagnes 'brut' da história — e virou o setor do avesso. É por causa dela que hoje brindamos com brut.<br><br>E o lugar é tão extraordinário quanto: ela mandou erguer um domínio em estilo escocês-elisabetano e comprou 120 'crayères' — antigas pedreiras de giz cavadas pelos romanos —, ligando-as por 18 km de galerias a 30 metros de profundidade, onde encomendou baixos-relevos monumentais esculpidos nas paredes de cal. Mecenas apaixonada por arte, encheu as caves de obras — tradição que continua hoje com mostras de arte contemporânea entre as garrafas. Tudo isso em Reims, a cidade da catedral gótica onde quase todos os reis da França foram coroados, de Clóvis a Carlos VII (este ao lado de Joana d'Arc). Se sobrar tempo, vale muito uma espiada na catedral.",m:"Maison Pommery, Reims"}
]}
];
function openThaise(focus){
 setbar('Roteiro da Thaise',true);
 var h='<div class="col"><div style="padding:24px 0 4px"><div class="kick">👗 Para a Thaise</div><h1 style="font-family:Georgia,serif;font-weight:500;font-size:30px;margin:8px 0 6px">Seu roteiro de joalheria</h1><div class="lead">Cada lugar do seu curso LUXE LAB, em detalhe — foto, endereço, história e mapa. Os 💗 marcam onde o Paulo te reencontra.</div></div>';
 THAISE.forEach(function(day,di){h+='<div class="tday'+(di===0?' first':'')+'" id="tday'+di+'">'+day.d+'</div>';day.places.forEach(function(p){h+='<article class="stop">';if(p.foto)h+='<figure><img src="'+p.foto+'" alt="'+p.t+'" loading="lazy"></figure>';if(p.tm)h+='<span class="num">'+p.tm+'</span>';h+='<h2>'+p.t+'</h2>';if(p.addr)h+='<div class="dek">📍 '+p.addr+'</div>';h+='<p style="font-size:15px;line-height:1.62;margin:10px 0 2px">'+p.hist+'</p>';if(p.mais)h+='<details class="dive"><summary>📖 conhecer a fundo</summary><div class="htext">'+p.mais+'</div></details>';if(p.m)h+='<div class="acts"><a class="map" target="_blank" rel="noopener" href="'+mh(p.m)+'">Abrir no mapa →</a></div>';h+='</article>';});h+=eatHTML(day.comer);});
 h+='</div>';el('app').innerHTML=h;var _f=(typeof focus==='number')?document.getElementById('tday'+focus):null;if(_f){window.scrollTo(0,_f.getBoundingClientRect().top+window.pageYOffset-58);}else{window.scrollTo(0,0);}
}
function daysToTrip(){try{var now=new Date();var trip=new Date(2026,5,27);var diff=Math.ceil((trip-now)/86400000);return diff;}catch(e){return null;}}
function renderHome(){
 setbar('Paris',false);
 var h='<header class="cover"><img src="img/paris.jpg" alt=""><div class="grad"></div><div class="txt"><div class="kick">Paulo & Thaise</div><h1>Paris, dia a dia</h1><div class="wx">27 de junho – 7 de julho · 2026 · guia de bolso offline</div></div></header><div class="col">';
 var dd=daysToTrip();
 if(dd&&dd>0)h+='<div class="countdown">✨ Faltam '+dd+' dia'+(dd>1?'s':'')+' para Paris</div>';
 var td=tripDayToday();
 if(td)h+='<button class="today" onclick="go(function(){openDay('+td+')})">📍 É hoje — ir para o Dia '+td+'</button>';
 h+='<button class="urgent" onclick="go(function(){openEss(\'reservas\')})">⏰ Reserve esta semana — alguns ingressos esgotam</button>';
 h+='<button class="today" style="background:#7a2348" onclick="go(openThaise)">👗 Roteiro da Thaise — curso + maisons</button>';
 h+='<div class="home-h">Os 10 dias</div>';
 DAYS.forEach(function(d){h+='<button class="dcard" onclick="go(function(){openDay('+d.n+')})"><span class="thumb" style="background-image:url(\''+d.hero+'\')"></span><span class="di"><span class="dn">Dia '+d.n+' · '+d.wd+'</span><span class="dt">'+d.title+'</span><span class="dw">'+d.tag+'</span></span></button>';});
 h+='<div class="home-h">Essencial</div><div class="egrid">';
 ESS.forEach(function(s){h+='<button class="ebtn" onclick="go(function(){openEss(\''+s.key+'\')})">'+s.e+' '+s.t+'<small>'+s.sub+'</small></button>';});
 h+='</div><a href="roteiro-video.html" style="display:block;text-align:center;font-size:13.5px;color:var(--accent);background:var(--card);border:1px solid var(--line);border-radius:9px;padding:15px;margin:2px 0 10px;text-decoration:none;font-weight:700;letter-spacing:.02em">🎬 Roteiro de vídeo · arquitetura</a><button class="printbtn" onclick="go(renderPrint)">📄 Versão para PDF / imprimir</button></div>';
 el('app').innerHTML=h;
}
var FRVOICE=null;
function pickVoice(){try{var vs=window.speechSynthesis.getVoices();FRVOICE=vs.filter(function(v){return /^fr/i.test(v.lang);})[0]||null;}catch(e){}}
if('speechSynthesis' in window){pickVoice();window.speechSynthesis.onvoiceschanged=pickVoice;}
function speak(t){if(!('speechSynthesis' in window)){alert('O áudio funciona no navegador do celular (Safari/Chrome).');return;}window.speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(t);u.lang='fr-FR';u.rate=0.88;if(FRVOICE)u.voice=FRVOICE;window.speechSynthesis.speak(u);}
function hideShow(){el('show').classList.remove('on');}
document.addEventListener('click',function(e){
 var s=e.target.closest('[data-say]');if(s){speak(s.getAttribute('data-say'));s.classList.add('on');setTimeout(function(){s.classList.remove('on');},700);return;}
 var sh=e.target.closest('[data-show]');if(sh){var ad=sh.getAttribute('data-show');el('showbig').textContent=ad;el('showmap').href=mh(ad);el('show').classList.add('on');}
});
el('back').onclick=function(){go(renderHome);};
renderHome();
if('serviceWorker' in navigator && location.protocol.indexOf('http')===0 && location.hostname.indexOf('localhost')<0 && location.hostname!=='127.0.0.1'){navigator.serviceWorker.register('sw.js').catch(function(){});}
document.addEventListener('change',function(e){var c=e.target.closest('[data-chk]');if(c)localStorage.setItem('chk:'+c.getAttribute('data-chk'),c.checked?'1':'');});
function setTheme(d){document.body.classList.toggle('dark',d);var b=el('themebtn');if(b)b.textContent=d?'☀️':'🌙';localStorage.setItem('dark',d?'1':'');}
if(el('themebtn'))el('themebtn').onclick=function(){setTheme(!document.body.classList.contains('dark'));};
setTheme(localStorage.getItem('dark')==='1');
</script>

{n:1,wd:"Sábado · 27 jun",hero:"img/paris.jpg",tag:"Chegada",title:"Bem-vindos a Paris",momento:"À noite, no terraço do Trocadéro, escolham um degrau só pra vocês e fiquem quietos quando a Torre começar a cintilar. Não levantem o celular no primeiro minuto — guardem essa imagem só na memória. É a chegada de vocês a Paris.",

  {k:"noite",t:"A primeira noite: a Torre Eiffel",dek:"Por que aqui? Não há estreia melhor em Paris do que ver a Torre acender na primeira noite. Vale o cansaço.",photo:"img/eiffel.jpg",b:"No fim da tarde, vão de metrô ao Trocadéro: do terraço, a Torre aparece inteira do outro lado do Sena. Fiquem pro escurecer — a cada hora cheia ela cintila por 5 minutos. É a foto da vida de vocês. Depois, táxi direto pro hotel.",hist:"Construída em 1889 para a Exposição do centenário da Revolução, a Torre era pra ser TEMPORÁRIA, desmontada em 20 anos. Trezentos artistas assinaram um manifesto contra ela; o que a salvou foi a antena de rádio no topo. Hoje, 20 mil lâmpadas a fazem cintilar.",foto:"Do terraço do Trocadéro, a Torre emoldurada entre as duas alas do Palais de Chaillot — o ângulo clássico. Fique no lado direito da esplanada pra fugir da multidão.",maps:"Place du Trocadero 75116 Paris"}
 ],phrase:{fr:"Bonjour ! Une table pour deux, s'il vous plaît.",pt:"Olá! Uma mesa para dois, por favor."}},

{n:2,wd:"Domingo · 28 jun",hero:"img/place-des-vosges.jpg",comer:[{t:"Carette",d:"café clássico na própria Place des Vosges, sob as arcadas",m:"Carette Place des Vosges Paris"},{t:"Marché des Enfants Rouges",d:"o mercado coberto mais antigo de Paris — comidinhas do mundo todo (abre domingo; fecha 2ª)",m:"Marché des Enfants Rouges 39 Rue de Bretagne Paris"},{t:"Ruelas do Marais",d:"Rue des Rosiers (falafel) e a medieval Rue des Barres, pura atmosfera",m:"Rue des Barres 75004 Paris"}],tag:"Livre a dois + garimpo",title:"O Marais, devagar",momento:"Na Place des Vosges, sentem num banco sob as arcadas de tijolo rosa — a praça mais antiga de Paris (1612), onde Victor Hugo morou. Dez minutos sem pressa e sem celular, só vendo a luz baixar. Reis se casaram aqui; hoje a praça é de vocês.",
 wx:{t:"33° / 21°",r:"41% chuva",wear:"Muito quente: roupa leve. À noite, no rio, leve casaco fino e guarda-chuva."},
 intro:"Domingo é pra desacelerar. De manhã, a praça mais antiga de Paris; à tarde, garimpo nos brechós do Marais (abrem no domingo); à noite, o Sena.",
 blocks:[
  {k:"manhã",t:"Place des Vosges",dek:"Duzentos anos antes de Haussmann, alguém já desenhava Paris como um conjunto.",
   b:"Sentem no jardim antes do calor, deem a volta pelas arcadas na sombra e entrem de graça na Casa de Victor Hugo (esquina sudeste) — ele morou no nº 6 e escreveu parte de Os Miseráveis aqui. Encomendada por Henrique IV e inaugurada em 1612, é a primeira praça planejada da cidade: 36 pavilhões idênticos de tijolo e pedra.",
   hist:"Por séculos a aristocracia duelava de espada no centro deste jardim, mesmo o rei tendo proibido — o endereço mais elegante de Paris também foi o mais sangrento. Hoje o mesmo gramado é onde os parisienses tomam sol no domingo.",
   foto:"Os dois pavilhões do meio — do Rei (sul) e da Rainha (norte) — são mais altos e quebram a simetria de propósito. E procure o ponto onde as arcadas fogem em perspectiva.",
   facts:["praça livre","Casa de V. Hugo grátis","M° Saint-Paul"],addr:"Place des Vosges, 75004 Paris",maps:"Place des Vosges 75004 Paris"},
  {k:"tarde · garimpo",t:"Brechós chic do Marais",dek:"Melhor custo-benefício, onde o parisiense garimpa — e seguro de dia.",
   b:"Tudo num raio de 10 min a pé. Comecem pela rue de la Verrerie e fechem na rue des Rosiers. Levem euros em dinheiro (várias só aceitam cash) e bolsa fechada à frente.",
   hist:"O nome Marais quer dizer 'pântano': era terra alagada que os monges drenaram na Idade Média. No século XVII virou o bairro mais nobre de Paris, cheio de palacetes (hôtels particuliers) — e por sorte escapou das demolições de Haussmann, guardando suas ruas medievais estreitas. Depois foi o coração judaico da cidade; hoje mistura sinagogas centenárias, galerias e os brechós onde vocês garimpam.",
   merch:{l:"As 3 verificadas (abrem domingo)",items:[["Kilo Shop · 69 R. de la Verrerie","por quilo, camiseta ~€10-15","Kilo Shop 69 Rue de la Verrerie 75004 Paris"],["Free'p'star · 8 R. Ste-Croix Bretonnerie","pechincha a partir de €3-10","Free P Star 8 Rue Sainte-Croix de la Bretonnerie 75004 Paris"],["Vintage Désir · 32 R. des Rosiers","baratíssimo, só dinheiro","Vintage Desir 32 Rue des Rosiers 75004 Paris"]]},
   foto:"💎 Pra outro dia: <b>Thanx God I'm a VIP</b> (12 Rue de Lancry, do lado do hotel) — luxo de 2ª mão a fração do preço, seg–sáb 14h–20h. <a href='https://www.google.com/maps/search/?api=1&query=Thanx%20God%20Im%20a%20VIP%2012%20Rue%20de%20Lancry%2075010%20Paris' target='_blank' rel='noopener' style='color:#a8432c;font-weight:600;white-space:nowrap'>📍 abrir no mapa</a>",
   maps:"Kilo Shop 69 Rue de la Verrerie Paris"},
  {k:"noite",t:"Jantar de barco no Sena",dek:"Ver Paris da água é entender que tudo nasceu deste eixo líquido.",photo:"img/pont-alexandre.jpg",
   b:"Ponto de embarque conforme o grupo. Levem casaco: parado, o barco venta de verdade. A cidade nasceu como Lutécia, povoado romano na Île de la Cité. A Pont Alexandre III, dourada, foi feita pra Expo de 1900; a Pont Neuf, apesar do nome novo, é a mais antiga.",
   hist:"A Pont Alexandre III é quase plana de propósito, pra não tapar a vista dos Invalides de um lado e dos Champs-Élysées do outro — engenharia a serviço da paisagem. As ninfas e cavalos alados dourados seguram a ponte como uma joia.",
   foto:"A cada hora cheia, depois de escurecer, a Torre Eiffel cintila por 5 minutos. Vista do rio é a foto da viagem."},
 ],phrase:{fr:"Bonsoir ! C'était une belle journée.",pt:"Boa noite! Foi um lindo dia."}},

{n:3,wd:"Segunda · 29 jun",hero:"img/arc.jpg",comer:[{t:"Le Jardin du Petit Palais",d:"café no pátio-jardim do Petit Palais (museu de entrada GRÁTIS), ao lado do Grand Palais",m:"Petit Palais Avenue Winston Churchill Paris"},{t:"Angelina",d:"o chocolate quente mais famoso de Paris e o doce Mont-Blanc, na Rue de Rivoli (beira as Tulherias)",m:"Angelina 226 Rue de Rivoli Paris"}],tag:"Curso da Thaise · seu 1º dia",title:"O eixo de Paris, a pé",momento:"Vocês se reencontram no fim do dia nos Champs (RH Paris, 18h). Peçam uma taça ou um café e fiquem parados, sem agenda, contando um pro outro o que cada um viu sozinho — o primeiro 'como foi seu dia?' de vocês em Paris.",
 wx:{t:"24° / 20°",r:"53% chuva",wear:"Esfria e chove — guarda-chuva e casaco. Smart-casual (zona de luxo)."},
 intro:"Na segunda muitos museus fecham — o dia perfeito pra fazer o Axe Historique a pé, do Arco até o Louvre. A viagem inteira de Paris numa linha reta.",
 blocks:[
  {k:"~9h",t:"Levo a Thaise",b:"Deixe-a na escola e suba já ao Arco (5 min). Reencontro às 18h — manhã e tarde são suas.",addr:"58 Av. de la Grande Armée, 75017 Paris",maps:"58 Avenue de la Grande Armée 75017 Paris"},
  {k:"€22",t:"Arco do Triunfo",dek:"O terraço de onde os 8 km de Paris se revelam de uma vez.",
   b:"€22 (€16 quarta), aberto até 23h no verão — RESERVE online. Atravesse pela passagem subterrânea, nunca pela rotatória.",
   hist:"Daqui você vê o Axe Historique inteiro: o olhar desce a Champs-Élysées, encontra o obelisco da Concorde, atravessa o Louvre e morre na Grande Arche de La Défense — um arco moderno torto uns 6°, porque não dava pra entortar o metrô embaixo. Napoleão o encomendou em 1806, morreu sem vê-lo pronto e só passou por baixo já morto, em 1840.",
   foto:"Ache 'A Marselhesa' de Rude (lado Champs). 660 generais nas paredes; os sublinhados morreram em combate. Suba às 22h: a Eiffel cintila com o eixo aceso aos seus pés.",
   facts:["€22","até 23h","M° Charles de Gaulle–Étoile"],maps:"Arc de Triomphe Paris"},
  {k:"a pé",t:"Champs-Élysées + Grand Palais",photo:"img/grand-palais.jpg",
   b:"Desça a avenida. Grand Palais e Petit Palais fecham segunda, mas as fachadas valem — e logo adiante, a Pont Alexandre III.",
   hist:"O Grand Palais é uma catedral de vidro e aço de 1900, a maior nave envidraçada da Europa, reaberta em 2024. Pedra acadêmica por fora, estrutura industrial ousada por dentro.",maps:"Grand Palais Paris"},
  {k:"a pé",t:"Concorde → Pirâmide do Louvre",photo:"img/louvre.jpg",
   b:"Pela Concorde (o obelisco de Luxor tem 3.300 anos; aqui caiu a cabeça de Luís XVI) e o Jardim das Tuileries até o Louvre. O museu ABRE segunda (fecha terça).",
   hist:"A pirâmide de I.M. Pei (1989) foi odiada quando inaugurada, chamada de profanação. Hoje é símbolo de Paris e a prova de que o contraste franco envelhece melhor que a imitação tímida. É o ponto onde nasce o eixo que você viu do Arco.",
   foto:"No Carrousel ao lado: a 'pirâmide invertida', a ponta de vidro descendo até quase tocar uma pirâmide de pedra no chão.",
   facts:["pátio livre","Louvre: reserve","fecha terça"],maps:"Pyramide du Louvre Paris"},
  {k:"18h",t:"Reencontro",b:"Encontre a Thaise no 23 Av. des Champs-Élysées e voltem juntos.",addr:"23 Av. des Champs-Élysées, 75008 Paris",maps:"23 Avenue des Champs-Elysees Paris"}
 ],phrase:{fr:"Un café, s'il vous plaît.",pt:"Um café, por favor. (vem expresso e curto.)"}},

{n:4,wd:"Terça · 30 jun",hero:"img/palais-garnier.jpg",comer:[{t:"Le Petit Vendôme",d:"fama de 'melhor sanduíche de Paris', a passos da Place Vendôme",m:"Le Petit Vendome 8 Rue des Capucines Paris"},{t:"Le Chocolat Alain Ducasse",d:"chocolate artesanal do chef, perto da Ópera",m:"Le Chocolat Alain Ducasse 1 Rue Auber Paris"},{t:"Passage des Panoramas",d:"a passagem coberta mais antiga de Paris (1799), cheia de bistrôs",m:"Passage des Panoramas Paris"}],tag:"Curso (Vendôme) · tesouros escondidos",title:"As galerias cobertas",momento:"Atravessem juntos uma galeria coberta depois das 19h — a Galerie Vivienne, com seu mosaico no chão e teto de vidro de 1823, fica quase vazia e iluminada à noite. Andem devagar, de mãos dadas, como num filme antigo. Pouquíssimos turistas sabem dessa hora.",
 wx:{t:"26° / 16°",r:"36% chuva",wear:"Ameno. Smart-casual elegante; sapato confortável."},
 intro:"Terça o Louvre e várias coleções fecham — mas as galerias cobertas e a Salle Ovale abrem. Um dia de tesouros a poucos passos, quase sem turistas.",
 blocks:[
  {k:"manhã",t:"Levo a Thaise",b:"Deixe-a na masterclass da Boucheron, na Place Vendôme. Reencontro às 17h no Printemps.",addr:"26 Place Vendôme, 75001 Paris",maps:"26 Place Vendome 75001 Paris"},
  {k:"a pé",t:"Place Vendôme",photo:"img/place-vendome.jpg",
   b:"Gire devagar no meio da praça: cada vitrine é uma das maiores joalherias do mundo, com altura e ritmo idênticos em todos os lados.",
   hist:"Praça octogonal de Hardouin-Mansart, o arquiteto de Versalhes, templo das joalherias e do Ritz. A coluna no centro foi fundida com o bronze dos canhões que Napoleão tomou em Austerlitz.",
   foto:"A coluna imita a de Trajano de Roma, com a batalha em espiral subindo até Napoleão no topo.",maps:"Place Vendome 75001 Paris"},
  {k:"livre",t:"Galerie Vivienne + Salle Ovale",dek:"Os antepassados do shopping, de 1826 — e uma das salas de leitura mais bonitas do mundo, de graça.",
   b:"A Galerie Vivienne (1826) é uma rua privada com teto de vidro e ferro, iluminada a gás. A 2 min, empurre a porta da Salle Ovale (Richelieu): entre sem reserva, sente e olhe pra cima.",
   hist:"As galerias cobertas eram ruas particulares onde a alta sociedade do século XIX passeava protegida da chuva — inventadas quase um século antes dos shoppings. A Salle Ovale, restaurada em 2022, é uma elipse coroada por domos de vidro; abre na terça, justo quando o resto fecha.",
   foto:"Na Vivienne, o piso de mosaicos de Facchina; o nº 13 foi onde morou Vidocq, o 'rei dos ladrões' que virou o 1º detetive de Paris.",
   facts:["acesso livre","Salle Ovale grátis","M° Bourse"],maps:"Galerie Vivienne Paris"},
  {k:"~17h",t:"Reencontro no Printemps",b:"Subam ao terraço do Printemps (gratuito) pra ver Paris do alto no fim da tarde.",maps:"Printemps Haussmann Paris"}
 ],phrase:{fr:"C'est combien ?",pt:"Quanto é? (ou use a câmera do tradutor.)"}},

{n:5,wd:"Quarta · 01 jul",hero:"img/samaritaine.jpg",comer:[{t:"Rue Montorgueil",d:"a rua-mercado de Paris: padarias, ostras, queijos e cafés — a melhor parada gastronômica do passeio",m:"Rue Montorgueil 75002 Paris"}],tag:"Curso (Saint-Honoré) · velho e novo",title:"Concreto, vidro e pedra",momento:"No fim da tarde, subam ao terraço das Galeries Lafayette ou ao do BHV (de graça) e vejam os telhados de zinco de Paris ganharem cor de mel. Sem fila, sem ingresso — só vocês dois e o pôr do sol sobre a cidade inteira.",
 wx:{t:"27° / 16°",r:"22% chuva",wear:"Agradável e seco. Casual estiloso + tênis bom de caminhar."},
 intro:"Quarta abre quase tudo: o coração antigo de Paris onde o clássico conversa, sem medo, com o contemporâneo. (E hoje dá pra emendar o Louvre à noite.)",
 blocks:[
  {k:"9h30",t:"Levo a Thaise",b:"Deixe-a na Rue Saint-Honoré. Reencontro 17h na visita dela à Samaritaine.",addr:"316 Rue Saint-Honoré, 75001 Paris",maps:"316 Rue Saint-Honore 75001 Paris"},
  {k:"€15",t:"Bourse de Commerce — Tadao Ando",dek:"Uma bolsa de grãos do séc. XVIII com um cilindro de concreto encaixado dentro.",
   b:"Abre 11h, fecha 19h (fechada terça), €15. Por dentro está a aula de arquitetura da viagem.",
   hist:"A antiga bolsa de grãos circular virou museu de arte de François Pinault. O japonês Tadao Ando encaixou um imenso cilindro de concreto liso dentro da rotunda histórica, sob a cúpula de vidro — o diálogo perfeito entre o velho e o novo, sem que um toque no outro.",
   foto:"Suba e ande sobre o anel de concreto de Ando: dali você fica na altura exata pra olhar o afresco do século XIX que corre na cúpula, bem acima.",
   facts:["€15","fecha terça","M° Louvre-Rivoli"],maps:"Bourse de Commerce Pinault Collection Paris"},
  {k:"grátis",t:"Saint-Eustache + La Samaritaine",
   b:"A igreja Saint-Eustache (1532-1632) mistura gótico e renascença — Molière foi batizado ali. A 5 min, entre na Samaritaine só pra ver o átrio e o terraço (livres).",
   hist:"A Samaritaine reabriu em 2021 guardando duas joias Art Nouveau — a escadaria de ferro e o vitral do pavão — e ganhou uma fachada de vidro ondulada dos japoneses do SANAA, virada pro Sena.",
   foto:"Olhe pra cima na Samaritaine: o lustre de ferro e o friso do pavão estão lá no alto, originais. O terraço tem vista do Pont-Neuf.",
   facts:["grátis","M° Pont-Neuf"],maps:"Samaritaine Paris"},
  {k:"almoço",t:"Rue Montorgueil",dek:"A rua-mercado onde o parisiense come — não o turista.",
   b:"Rua de pedestres com bancas, padarias e mesinhas. Há comércio de comida aqui desde antes do séc. XIII; Monet a pintou cheia de bandeiras.",
   hist:"Esta é a última sobrevivente das ruas que abasteciam o antigo mercado central, Les Halles — 'o ventre de Paris', como Zola o chamou. Há comércio de comida aqui desde antes do século XIII. Monet a pintou em 1878, coberta de bandeiras tricolores num dia de festa; e a Stohrer, de 1730, é a confeitaria mais antiga da cidade, onde se inventou o baba au rhum para a corte.",
   merch:{l:"O que provar / comprar",items:[["Stohrer (nº 51)","a + antiga confeitaria de Paris (1730), o 'baba au rhum'"],["Queijos & charcutaria","ótimos pra um piquenique"],["Eric Kayser","croissant e pain au chocolat"]]},
   maps:"Rue Montorgueil Paris"},
  {k:"17h → noite",t:"Reencontro + Louvre à noite",dek:"O melhor jeito de ver o Louvre: a nocturne de quarta, quase vazia.",
   b:"Encontre a Thaise na Samaritaine (a passos do Louvre) e entrem juntos: na QUARTA o Louvre abre até 21h45, bem menos cheio. RESERVE o horário (~€22, fecha terça).",
   foto:"De noite, a pirâmide iluminada vira uma joia de vidro pousada sobre a pedra de quatro séculos.",
   facts:["~€22","reserve","qua até 21h45"],maps:"Musée du Louvre Paris"}
 ],phrase:{fr:"Une carafe d'eau, s'il vous plaît.",pt:"Uma jarra de água (de graça), por favor."}},

{n:6,wd:"Quinta · 02 jul",hero:"img/eiffel.jpg",tag:"Curso (Champs) · o santuário do arquiteto",title:"Do gesso ao concreto",momento:"Depois do reencontro no Palais de Tokyo (19h), fiquem na esplanada vendo a Torre Eiffel do outro lado do Sena enquanto escurece. É o mirante que os parisienses amam e poucos turistas conhecem. Brindem ali — mesmo que seja com um café da máquina.",
 wx:{t:"25° / 19°",r:"15% chuva",wear:"Bom pra andar; à noite vão juntos a um museu — leve algo arrumado + casaco fino."},
 intro:"Hoje você chega à Cité de l'Architecture — talvez o lugar mais emocionante de Paris pra um arquiteto — e termina reencontrando a Thaise num museu de arte.",
 blocks:[
  {k:"manhã",t:"Levo a Thaise",b:"Deixe-a nos Champs (Tiffany 11h). Combine ponto e horário do reencontro antes — o celular some na multidão.",addr:"62 Av. des Champs-Élysées, 75008 Paris",maps:"62 Avenue des Champs-Elysees Paris"},
  {k:"€13",t:"Cité de l'Architecture",dek:"Catedrais inteiras, em gesso e tamanho real, dentro de um museu.",
   b:"No Palais de Chaillot (Trocadéro). Não precisa marcar horário: chegue, pague ~€13, entre. Reserve umas boas horas.",
   hist:"É um museu DA arquitetura francesa: galerias inteiras de moldes em gesso, em tamanho real, de portais e tímpanos de catedrais — feitos pra preservar o que o tempo apagaria nas pedras originais. E há um apartamento da Unité d'Habitation de Le Corbusier, onde você entra de verdade.",
   foto:"Você caminha 'dentro' de catedrais que estão a centenas de km umas das outras, lado a lado. Não perca a maquete da unidade Corbusier; suba pra ver a Eiffel emoldurada pela janela.",
   facts:["~€13","fecha terça","M° Trocadéro"],maps:"Cite de l'architecture et du patrimoine Paris"},
  {k:"a pé",t:"Trocadéro (a vista)",b:"Saindo da Cité, atravesse pro terraço do Chaillot (Expo de 1937): a Torre Eiffel inteira do outro lado do Sena. O cartão-postal definitivo.",
   hist:"O Palais de Chaillot foi erguido para a Exposição de 1937, no lugar de um palácio mourisco de 1878. Suas duas alas curvas abraçam a esplanada de onde se tem a vista mais famosa da Torre Eiffel. E foi aqui que a ONU assinou, em 1948, a Declaração Universal dos Direitos Humanos — história do mundo escrita de frente pra Torre.",
   foto:"É daqui a foto clássica da Eiffel de frente. Vá antes do fim da tarde pra luz boa — e segure a bolsa no aperto.",maps:"Place du Trocadero Paris"},
  {k:"19h",t:"Reencontro no Palais de Tokyo",b:"Vejam a exposição juntos — abre até tarde. Depois das vitrines e do gótico, fechar em arte contemporânea é o contraste perfeito.",
   hist:"Também da Expo de 1937, hoje é o maior centro de arte contemporânea da Europa — deixado de propósito em concreto cru, inacabado. Livraria e café abertos à noite.",
   addr:"13 Av. du Président Wilson, 75116 Paris",maps:"Palais de Tokyo Paris"}
 ],phrase:{fr:"C'est magnifique !",pt:"É magnífico! (elogie — eles amam.)"}},

{n:7,wd:"Sexta · 03 jul",hero:"img/fondation-lv.jpg",tag:"Thaise fora o dia todo · SEU dia livre",title:"De Corbusier a Gehry",momento:"Vocês passam o dia separados (ela em La Vallée, você na arquitetura) — então transformem a volta dela num pequeno evento. À noite, jantem num bistrô do bairro do hotel, no Canal Saint-Martin, longe do roteiro turístico, contando as aventuras do dia um do outro.",
 wx:{t:"23° / 17°",r:"15% chuva",wear:"Fresco e seco, dia perfeito de caminhar — camadas + tênis."},

   hist:"Uma das primeiras casas-manifesto de Le Corbusier (1923-25), onde ele aplicou pela 1ª vez os 'cinco pontos da arquitetura moderna'. Hoje é a sede da Fondation Le Corbusier.",
   foto:"Procure ao vivo os cinco pontos: os pilotis erguendo a casa, a planta livre, a fachada livre, a janela em fita e o terraço-jardim. A rampa curva é pura promenade architecturale.",
   facts:["~€10","ter-sáb","M° Jasmin"],maps:"Maison La Roche Fondation Le Corbusier Paris"},
  {k:"€19-22",t:"Fondation Louis Vuitton — Gehry",dek:"Doze velas de vidro curvo sobre um iceberg branco.",
   b:"No Bois de Boulogne. O único bloco do dia que pede RESERVA de horário. Abre 11h-20h (sex até 21h).",
   hist:"O 'veleiro de vidro' de Frank Gehry (2014): cada painel é único, e o conjunto só foi possível por uma façanha de engenharia e modelagem digital de ponta.",
   foto:"Suba aos terraços e ande entre as velas de vidro — a melhor parte. De certos ângulos, com a água em volta, o prédio parece flutuar.",

 ],phrase:{fr:"Où sont les toilettes ?",pt:"Onde fica o banheiro?"}},

{n:8,wd:"Domingo · 05 jul",hero:"img/orsay.jpg",comer:[{t:"Fromagerie Quatrehomme",d:"queijaria premiada, na mesma Rue de Sèvres da Grande Épicerie",m:"Fromagerie Quatrehomme 62 Rue de Sevres Paris"},{t:"Les Deux Magots",d:"o café histórico de Saint-Germain (Sartre, Hemingway, Picasso passaram por lá)",m:"Les Deux Magots Saint-Germain-des-Pres Paris"}],tag:"Livres a dois · arte e sabores",title:"Impressionistas e sabores",momento:"Parem juntos diante de UM quadro no Orsay — os bailarinos de Degas, um Van Gogh, um Monet — e fiquem dois minutos só olhando, sem foto. Escolham 'o quadro de vocês' pra lembrar a vida inteira.",
 wx:{t:"26° / 16°",r:"16% chuva",wear:"Sol e ameno — dia de museu e de andar; leve casual e tênis."},
 intro:"Hoje é o dia da arte e dos sabores: comecem entre os impressionistas numa antiga gare de 1900, almocem (e garimpem presentes) no templo gastronômico de Paris, e de tarde a cidade explica de graça como foi pensada.",
 blocks:[

4:["Do hotel: a pé até République → L8 (dir. Balard) até Opéra (6 paradas, ~12 min) → 4 min a pé até a Place Vendôme.","","Tudo a pé: da Place Vendôme pela Rue des Petits-Champs até a Galerie Vivienne (~8 min); a Salle Ovale fica colada (2 min).","Da Vivienne: Quatre-Septembre → L3 (dir. Pont de Levallois) até Havre-Caumartin (2 paradas); Printemps a 2 min. VOLTA: L9 (dir. Montreuil) até République. Com sacolas, táxi ~€15."],

6:["Do hotel: a pé até Goncourt → L11 (dir. Châtelet) até Châtelet → L1 (dir. La Défense) até George V (~25 min); a estação fica ao lado do nº 62.","George V → L1 (dir. La Défense) 1 parada até Charles de Gaulle–Étoile → L6 (dir. Nation) até Trocadéro (~15 min). A Cité fica no Palais de Chaillot, na própria praça.","A pé: você já está no Trocadéro. Atravesse a esplanada — é o ponto da foto da Torre Eiffel (2 min).","A pé (~11 min) descendo a Av. du Président Wilson até o Palais de Tokyo. À noite, táxi/Uber (~€18–22)."],
7:["Do hotel: a pé até Goncourt → L11 (dir. Châtelet) até République → L9 (dir. Pont de Sèvres) até Jasmin (direto); 10 min a pé até o nº 10 (~40 min).","Mais simples: L9 de Jasmin (dir. Montreuil) até Charles de Gaulle–Étoile e pegue o ÔNIBUS-SHUTTLE oficial da Fondation (€2 ida/volta, saída 44 Av. de Friedland). VOLTA à noite: táxi/Uber (~€22–28) — há pouco metrô no Bois de Boulogne."],
8:["Do hotel: a pé até Goncourt → L11 (dir. Châtelet) até Hôtel de Ville (4 paradas, ~8 min); atravesse a ponte a pé até a ilha (5–7 min).","A pé, na mesma ilha: da Notre-Dame à Sainte-Chapelle ~6 min. Atenção a batedores na fila.","A pé (~10 min) pela Pont Marie; o Pavillon fica a 80 m de Sully-Morland. VOLTA: L7 (dir. La Courneuve) até Châtelet → L11 (dir. Mairie des Lilas) até Goncourt. Se tarde, táxi ~€12–15."],
9:["Do hotel: a pé até République (7 min) → L8 (dir. Balard) até Concorde → L12 (dir. Mairie d'Issy) até Solférino (1 parada); 5 min a pé até o Orsay (~30 min).","Do Orsay, ~12 min a pé pela Rue du Bac e Rue de Sèvres — ou 1 parada de metrô. A loja fica colada na estação Sèvres-Babylone (L10/L12).","ROTA SEGURA por ABBESSES: de Sèvres-Babylone, L12 (dir. Aubervilliers) DIRETO até Abbesses (~20 min) — não desça em Barbès nem Anvers. Use o ELEVADOR (estação funda). À NOITE, volte de táxi do Sacré-Cœur (~€20–25)."],

2:{"Place des Vosges":"Mandada erguer pelo rei Henrique IV, foi construída entre 1605 e 1612 e inaugurada em abril de 1612 com um grande carrossel (torneio equestre) de três dias, celebrando o noivado duplo das duas coroas — Luís XIII com Ana da Áustria (o casamento só viria em 1615). Chamava-se Place Royale; o nome 'des Vosges' só chegou em 1800, homenageando o primeiro departamento francês a quitar os impostos da Revolução.<br><br>É um quadrado quase perfeito de 140 × 140 m, cercado por 36 pavilhões idênticos (nove por lado) de tijolo rosa e pedra clara, sobre arcadas, com telhados inclinados de ardósia. A grande revolução não foi cada casa, e sim IMPOR a todas a mesma fachada — o nascimento da fachada urbana 'regrada' em Paris, modelo que as squares de Londres copiariam. Só os pavilhões do Rei (ao sul) e da Rainha (ao norte) são mais altos, marcando o eixo.<br><br>É um quem-é-quem da história: Madame de Sévigné nasceu no nº 1 bis em 1626; Victor Hugo morou no nº 6 de 1832 a 1848 (hoje a Maison de Victor Hugo, museu gratuito); Richelieu e Bossuet também moraram na praça. A estátua de Luís XIII no centro é uma réplica de mármore de 1825 — a original de bronze foi fundida na Revolução. Dois cuidados de especialista: a autoria do traçado é debatida (atribui-se a um time com Du Cerceau, Métezeau e Chastillon — não crave um nome só); e é a praça planejada mais antiga de PARIS, mas não da Europa (a Plaza Mayor de Madri, de 1590, a antecede)."},
3:{"Arco do Triunfo":"Napoleão encomendou o arco em 1806, logo após Austerlitz, prometendo aos soldados que voltariam 'sob arcos de triunfo'. O projeto é de Jean-François Chalgrin, mas a obra se arrastou 30 anos e só foi inaugurada em 29 de julho de 1836, sob Luís Filipe — Napoleão, morto em 1821, só passou por baixo já como cadáver, no retorno de suas cinzas, em 1840. Tem 49,5 m de altura.<br><br>É um lugar de gestos extremos. Em 7 de agosto de 1919, três semanas após o desfile da vitória, o aviador Charles Godefroy cruzou voando POR DENTRO do vão, num biplano Nieuport. E desde 1921 repousa ali o Túmulo do Soldado Desconhecido; a 'chama da lembrança' foi acesa em 11 de novembro de 1923 e é reavivada TODO dia às 18h30, sem falhar nunca — nem durante a ocupação nazista.<br><br>Olho de arquiteto: Chalgrin se inspirou no Arco de Tito (vão único), mas trocou as colunas clássicas por uma massa lisa e monumental — repare no contraste entre a parede nua e a explosão escultórica de François Rude ('A Marselhesa'). No alto está um dos melhores miradouros de Paris, no centro da 'estrela' de doze avenidas, de onde se lê o Eixo Histórico: Louvre → Concorde → Champs → Arco → La Défense, a mesma linha que a Thaise pisa no curso. (Pro vídeo: o nº de degraus aparece de formas diferentes nas fontes — fale 'cerca de 280' pra não errar.)","Champs-Élysées + Grand Palais":"A Champs-Élysées — 'Campos Elísios', o paraíso da mitologia grega, e NÃO uma referência ao Palácio do Eliseu — era pântano e hortas até 1667, quando Le Nôtre, o paisagista de Versalhes, traçou a alameda. Tem 1,9 km de comprimento por 70 m de largura, do obelisco da Concorde ao Arco do Triunfo; o desfile de 14 de Julho desce por ela desde 1919. Não é a maior nem a mais larga do mundo — é 'a mais bela', pelo eixo monumental.<br><br>No trecho-jardim, o Grand Palais é uma catedral de ferro e vidro de 1900, erguida para a Exposição Universal. Foi obra de QUATRO arquitetos sob coordenação de Charles Girault (não de um só), e guarda a maior clarabóia de vidro da Europa — cerca de 15.000 m² sobre uma estrutura que usa mais ferro que a própria Torre Eiffel. Já foi salão do automóvel, hospital militar na 1ª Guerra e, em 2024, arena olímpica de esgrima e taekwondo, após uma restauração que durou até 2025.<br><br>Olho de arquiteto: por fora, pedra Beaux-Arts acadêmica; por dentro, um esqueleto de aço rebitado banhado de luz zenital — vale filmar essa 'mentira' da fachada. Nos cantos do topo, as quadrigas de bronze de Récipon (bigas de quatro cavalos prestes a saltar do prédio). E não confunda: Grand Palais e Petit Palais (hoje o museu de belas-artes da cidade) são DOIS prédios distintos, frente a frente.","Concorde → Pirâmide do Louvre":"Comecem na Place de la Concorde, projetada por Ange-Jacques Gabriel (1755-1775) e a maior praça de Paris. Foi o palco do Terror: ali a guilhotina decepou 1.119 pessoas, entre elas Luís XVI (jan/1793) e Maria Antonieta (out/1793) — mas atenção, naquela época a praça se chamava Place de la Révolution, não Concorde. No centro, o Obelisco de Luxor: granito ROSA (não amarelo), uns 3.300 anos, 23 m e 222 toneladas numa pedra só, presente do Egito erguido em 1836, gravado com os feitos de Ramsés II.<br><br>Atravessem o Jardim das Tulherias (de Le Nôtre) até o Louvre, que nasceu como FORTALEZA medieval em 1190, sob Filipe Augusto, voltada contra os ingleses — os fossos e a base da torre original estão visíveis no subsolo do museu. Virou palácio dos reis, foi abandonado quando a corte foi para Versalhes e só se tornou museu público em 10 de agosto de 1793, em plena Revolução (antes de Napoleão).<br><br>A pirâmide de vidro é de I. M. Pei, encomendada por Mitterrand e inaugurada em 1989. E aqui vai ouro pro seu vídeo: o mito de 'O Código Da Vinci' diz que ela tem 666 vidros 'a pedido de Mitterrand' — é FALSO. O próprio Louvre informa 793 painéis; a imprensa cita 673; nunca foi 666, e Mitterrand jamais pediu número nenhum. Pei escolheu a pirâmide por ser a forma que menos compete com o palácio e mais deixa a luz descer ao saguão."},
4:{"Place Vendôme":"A Place Vendôme é o tapete vermelho da joalheria mundial, mas nasceu como uma jogada imobiliária de Luís XIV: o arquiteto Jules Hardouin-Mansart desenhou só o 'envelope' — as fachadas uniformes e obrigatórias — e os lotes atrás delas foram vendidos a especuladores, que ergueram o que quiseram por dentro. Por isso ela é tão harmoniosa por fora. É octogonal (cantos chanfrados), de cerca de 213 × 124 m.<br><br>No centro, a Coluna Vendôme (44,3 m) imita a Coluna de Trajano, em Roma: um núcleo de pedra revestido por 425 placas de bronze em espiral, erguida por Napoleão (1806-1810) para celebrar Austerlitz. Cuidado com um mito pro seu vídeo: diz-se que o bronze veio de '1.200 canhões' tomados na batalha — esse é o número da propaganda; historiadores apontam ~130 canhões realmente capturados. Em 1871 a Comuna de Paris derrubou a coluna como símbolo de tirania, e o pintor Gustave Courbet, acusado de incitar o ato, foi condenado a pagar a reconstrução — dívida que o arruinou e o exilou na Suíça, onde morreu.<br><br>A praça respira lenda: no Ritz (aberto em 1898, no nº 15) Coco Chanel morou mais de 30 anos, e foi de lá que a princesa Diana saiu na sua última noite, em 30 de agosto de 1997; Chopin morreu no nº 12, em 1849. E foi aqui, em 1893, que a Boucheron foi a primeira joalheria a se instalar — dando início à meca dos diamantes que a Thaise visita no curso.","Galerie Vivienne + Salle Ovale":"No século XIX, Paris chegou a ter mais de uma centena de galerias cobertas — ruas privadas de vidro e ferro, iluminadas a gás, onde a elite passeava limpa e seca numa cidade ainda de lama, cavalos e esgoto aberto. Foram dos primeiros espaços públicos com iluminação a gás, e o filósofo Walter Benjamin dedicou a elas sua obra inacabada sobre o nascimento da modernidade (o 'Livro das Passagens'). Quando Haussmann rasgou as avenidas e surgiram os grandes magazines, elas decaíram — hoje restam cerca de 20 (evite cravar números: dizem que existiram '150' ou '300' e que 'restam 150' — tudo disputado).<br><br>A Galerie Vivienne é a rainha das sobreviventes: projetada em 1823 e aberta em 1826 por François-Jacques Delannoy, em estilo neoclássico 'pompeiano', tem ~176 m de comprimento por apenas 3 m de largura, com uma rotunda envidraçada. Os mosaicos do piso são de Giandomenico Facchina (adição posterior). Tombada em 1974, abriga a histórica livraria Jousseaume; a escadaria do nº 13 levava à antiga casa do detetive Vidocq. Quase vazia ao entardecer, é puro cinema.<br><br>A poucos passos, a Salle Ovale da Biblioteca Nacional (site Richelieu) é um segredo gratuito — entra-se só pra admirar, sem cartão de leitor. Cuidado com a data no vídeo: o salão oval (de Jean-Louis Pascal) foi construído de 1897 a 1932 e só inaugurado em 1936 — o '1868' que circula por aí é dos edifícios vizinhos de Labrouste, não dele. Reaberto em 2022, tem 16 óculos envidraçados sobre 16 pares de colunas de ferro fundido e uma grande clarabóia central."},
5:{"Bourse de Commerce — Tadao Ando":"O prédio circular nasceu em 1763-67 como a Halle au blé, o mercado de grãos de Paris, projeto de Nicolas Le Camus de Mézières. Tem 122 m de CIRCUNFERÊNCIA (não de diâmetro — cuidado com esse erro comum). Sua cúpula é um marco: a primeira, de madeira (1783), pegou fogo, e em 1811 foi refeita em esqueleto de ferro — uma das maiores cúpulas metálicas da história, décadas antes da Torre Eiffel; o vidro só veio em 1888-89, quando virou bolsa de comércio. Sob ela corre um afresco panorâmico de 1889 (~1.400 m²) sobre o comércio entre os continentes, com um olhar colonial que hoje se vê com senso crítico.<br><br>Em 2016, o bilionário François Pinault — dono do grupo Kering, que controla Boucheron e Pomellato, justamente maisons do roteiro da Thaise — fechou um arrendamento de 50 anos com a cidade (não comprou o prédio) para abrigar sua coleção de arte contemporânea, e chamou o japonês Tadao Ando, o mestre do concreto.<br><br>A solução de Ando, aberta em maio de 2021, é uma aula de diálogo entre épocas: ele inseriu um cilindro de concreto liso de 9 m de altura DENTRO da rotunda histórica, sem encostar nas paredes originais — separados por um vão de luz que dá a volta inteira. É reversível, pensado pra poder sair sem ferir o monumento. Suba à passarela sob a cúpula pra sentir o vazio vertical de quase 40 m.","Saint-Eustache + La Samaritaine":"Saint-Eustache levou um século pra ficar pronta (1532-1633) e por isso é única: tem a estrutura e a altura ousada de uma catedral gótica — abóbadas a uns 33,5 m, a mesma de Notre-Dame —, mas vestida com detalhes da Renascença que chegavam da Itália no meio da obra. Tem o maior órgão de tubos da França (cerca de 8.000 tubos).<br><br>A igreja viu de tudo: Luís XIV fez ali a primeira comunhão (1649); a mãe de Mozart teve as exéquias na paróquia (1778); e Molière foi BATIZADO ali em 1622 e casou-se ali — mas atenção pro vídeo: ele NÃO está enterrado na igreja. Como ator, teve em 1673 um enterro noturno e quase clandestino no cemitério da paróquia, e hoje repousa no Père-Lachaise. A praça em frente, junto ao antigo Les Halles (o 'ventre de Paris' de Zola), virou jardim.<br><br>Descendo ao Sena, a Samaritaine fecha o contraste. Nasceu em 1870 de um casal — Ernest Cognacq, ex-camelô da Pont-Neuf, e Marie-Louise Jaÿ — e leva o nome de uma antiga bomba d'água da ponte. Por dentro, a obra-prima Art Nouveau de Frantz Jourdain (ferro aparente, cerâmica, o friso de pavões — este assinado por Francis Jourdain, o filho); a ala Art Déco voltada ao rio é de Henri Sauvage. Fechada em 2005, reabriu em 2021 numa restauração da LVMH, e na Rue de Rivoli (não no lado do Sena) ganhou a fachada de vidro ondulado dos japoneses do SANAA. Hoje reúne loja de luxo e o hotel Cheval Blanc — e é onde a Thaise reencontra você."},
6:{"Cité de l'Architecture":"A ideia por trás deste museu é genial: moldar em gesso, em tamanho real, pedaços inteiros de catedrais — pórticos, tímpanos, estátuas — de toda a França e reuni-los sob um teto. Nasceu como o Musée de Sculpture comparée, ideia de Viollet-le-Duc (o arquiteto que restaurou Notre-Dame), aberto em 1882. Você caminha entre fachadas românicas e góticas que, na vida real, estão a centenas de quilômetros umas das outras, comparando séculos num só olhar. São cópias em gesso (moulages), não originais — e esse é o ponto, não um defeito: muitos moldes foram tirados no séc. XIX e hoje preservam esculturas mais legíveis do que os originais, já corroídos pela poluição.<br><br>No andar moderno, a joia que o público mais ama: a reconstituição em TAMANHO REAL (não uma maquete) de um apartamento da Unité d'Habitation de Le Corbusier — você entra e sente o teto a 2,26 m, altura calculada pelo 'Modulor', o sistema de proporções que ele criou a partir do corpo humano.<br><br>Tudo isso no Palais de Chaillot — e atenção pro vídeo: o prédio atual é de 1937 (Exposição Internacional), não o antigo Palais du Trocadéro de 1878, que foi demolido. Do terraço, o melhor mirante da Torre Eiffel da cidade — onde a viagem de vocês ganha sua foto mais bonita.","Trocadéro (a vista)":"Do terraço do Palais de Chaillot você tem O cartão-postal de Paris: a Torre Eiffel inteira, emoldurada, do outro lado do Sena. Mas a torre que todos amam quase não existiu. Construída entre 1887 e 1889 para a Exposição Universal do centenário da Revolução, ela era pra ser TEMPORÁRIA: a concessão era de 20 anos e expirava em 1909, quando seria desmontada.<br><br>Crédito que costuma se perder: a ideia estrutural foi dos engenheiros Maurice Koechlin e Émile Nouguier, com a forma final do arquiteto Stephen Sauvestre — Gustave Eiffel comprou a patente, bancou e defendeu a obra (por isso leva o nome dele). Trezentos artistas assinaram um manifesto contra 'essa torre de ferro odiosa'; conta-se que Maupassant almoçava no restaurante dela por ser o único ponto de Paris de onde não a via. O que a salvou da demolição em 1909 não foi o carinho do público, e sim a antena de radiotelegrafia no topo, valiosa demais para o exército.<br><br>Detalhes que arrepiam um arquiteto: ela é de FERRO PUDLADO (não aço), com 18.038 peças unidas por 2,5 milhões de rebites; a curva das pernas foi calculada pra que o vento passe 'por dentro' da estrutura. Hoje tem 330 m (eram 300 m em 1889, antes das antenas), é repintada à mão a cada ~7 anos (umas 60 toneladas de tinta), e no calor o topo se inclina cerca de 15 cm pra LONGE do sol (o lado quente dilata). Fiquem pro escurecer: a cada hora cheia ela cintila por 5 minutos."},
7:{"Maison La Roche — Le Corbusier":"Le Corbusier ergueu esta casa entre 1923 e 1925 com o primo Pierre Jeanneret — e atenção pro vídeo: não é uma casa só, é um PAR geminado (Maison La Roche + Maison Jeanneret), no fundo de um beco no 16e. O cliente da ala-galeria, Raoul La Roche, era um banqueiro suíço colecionador de arte cubista; queria uma casa que fosse também galeria. Por isso o coração dela é um hall de pé-direito triplo com uma rampa curva que faz você 'passear' pela arquitetura — a 'promenade architecturale', que nasceu aqui.<br><br>Foi nesta casa que Le Corbusier pôs em prática pela primeira vez os princípios que viraria os célebres 'cinco pontos da arquitetura moderna': os pilotis, o terraço-jardim, a planta livre, a fachada livre e a janela em fita. (Cuidado: ele só os FORMULOU por escrito em 1927, depois da casa — não diga que 'criou os cinco pontos aqui em 1923'.) Hoje é a sede da Fondation Le Corbusier e Patrimônio da Humanidade pela UNESCO (2016, num conjunto de 17 obras em 7 países).<br><br>Dois detalhes de especialista: ao contrário do mito do 'branco puro corbusiano', o interior tem policromia purista (cores estudadas) desde a origem. E a morte do mestre combina com a obra — em 1965, Le Corbusier morreu de ataque cardíaco enquanto nadava no Mediterrâneo, contra ordens médicas; a França lhe deu funeral de Estado no pátio do Louvre, com discurso de André Malraux.","Fondation Louis Vuitton — Gehry":"Frank Gehry, o arquiteto do Guggenheim de Bilbao, quis criar 'uma nuvem de vidro' no Bois de Boulogne — e abriu ao público em outubro de 2014. São 12 'velas' de vidro curvo (douze voiles), feitas de cerca de 3.600 painéis, cada um único, curvado individualmente a quente. Só foi possível erguê-las graças a um software de modelagem 3D derivado do CATIA, da indústria aeroespacial (o mesmo de Bilbao), com peças cortadas e moldadas por robôs.<br><br>Sob as velas esconde-se um volume branco que a própria equipe apelidou de 'iceberg', revestido em Ductal (um concreto de altíssimo desempenho com fibra), onde ficam as 11 galerias. Não confunda os números pro vídeo: são ~3.600 painéis de VIDRO nas velas e cerca de 19.000 painéis de CONCRETO (Ductal) no iceberg — coisas diferentes.<br><br>Por trás de tudo está Bernard Arnault, dono da LVMH — o grupo que controla a Tiffany e a Dior que a Thaise visita. O prédio fica em terreno arrendado da cidade e, pela cláusula, depois de 55 anos passa a pertencer a Paris (por volta de 2062): um presente com data marcada. Vale combinar com o Jardin d'Acclimatation ao lado, ótimo pra respirar."},
8:{"Musée d'Orsay":"A Gare d'Orsay foi inaugurada em 1900 para a Exposição Universal — uma catedral Beaux-Arts de ferro e vidro do arquiteto Victor Laloux, anunciada como a primeira estação-terminal urbana totalmente eletrificada do mundo (sem fumaça nem vapor, por isso pôde ser fechada com a cobertura de vidro). Mas o progresso a atropelou: as plataformas eram curtas demais para os trens modernos, mais longos, e o tráfego de longa distância parou em 1939.<br><br>Por décadas ela ficou à deriva — virou depósito, abrigo de prisioneiros libertados em 1945, palco da coletiva de De Gaulle em 1958, sala de leilões e cenário de cinema (Orson Welles filmou 'O Processo' ali, em 1962). Chegou a estar ameaçada de demolição. O que a salvou foi o remorso coletivo: depois que Paris destruiu o belíssimo mercado de ferro de Les Halles, nos anos 1970, decidiu-se preservar a velha estação.<br><br>A conversão em museu (1983-86) é uma joia de reaproveitamento: os arquitetos da ACT mantiveram a nave de Laloux e a italiana Gae Aulenti desenhou o interior — atenção, ela assinou as SALAS, não o prédio. Reaberto em 1986, guarda a maior coleção impressionista do mundo (Monet, Van Gogh, Degas, Renoir, Cézanne). Suba atrás do enorme relógio de vidro do antigo saguão e olhe Paris através dos ponteiros, com Montmartre ao fundo — a foto mais querida do museu. (Fecha às segundas.)"},
9:{"Notre-Dame de Paris":"A construção de Notre-Dame começou em 1163 e levou quase 200 anos — gerações de pedreiros que nunca a viram pronta. É o gótico em estado puro: um dos primeiros edifícios a usar os arcobotantes, os 'braços' de pedra externos que seguram as paredes por fora e permitiram abrir as enormes rosáceas. As abóbadas da nave estão a 33 m — e foi a abóbada de pedra que conteve o fogo e salvou boa parte da catedral em 2019.<br><br>Ela viu a História: aqui Napoleão se coroou imperador em 1804, pondo a coroa na própria cabeça (detalhe pro vídeo: o famoso quadro de David NÃO mostra esse instante, e sim Napoleão coroando Josefina). No século XIX a catedral estava em ruínas e quase foi demolida; quem a salvou foi Victor Hugo, com 'O Corcunda de Notre-Dame' (1831), que forçou o grande restauro de Viollet-le-Duc — foi ele quem criou a flecha de 96 m (1859) e as quimeras (a célebre Stryge, o demônio pensativo, é do séc. XIX, NÃO medieval).<br><br>Depois do incêndio de 15 de abril de 2019, a catedral foi reerguida em cinco anos e reabriu em dezembro de 2024 (a estrutura de pedra e as torres resistiram — ela não foi 'destruída'). Na praça em frente, procure no chão a plaquinha de bronze do 'Ponto Zero' (de 1924): é dali que se medem TODAS as distâncias rodoviárias da França. Dizem que pisar nele garante a volta a Paris — pisem juntos.","Sainte-Chapelle":"Luís IX — o único rei francês canonizado, São Luís — pagou uma fortuna por uma relíquia: a Coroa de Espinhos. Comprou-a do imperador latino de Constantinopla, Balduíno II, que a havia empenhado a banqueiros venezianos — então, na prática, o rei resgatou a relíquia de Veneza. E o detalhe que impressiona: a relíquia custou cerca de TRÊS VEZES mais do que construir a capela inteira (≈135 mil livres contra ≈40 mil) — quase metade da renda anual do reino. A joia valia muito mais que o cofre.<br><br>Consagrada em 1248, erguida em menos de sete anos, é o auge do gótico 'radiante': as paredes quase somem atrás de 15 metros de vitrais com mais de mil cenas bíblicas — uma 'bíblia de luz' para um tempo em que quase ninguém lia. Segredo de engenharia: como arcobotantes externos estragariam o efeito, embutiram correntes de ferro que seguram as paredes à tração. E não é pedra cinza nua — o interior é todo policromado, pintado e dourado.<br><br>São duas capelas sobrepostas: a de baixo, escura, para os criados e a guarda; a de cima, luminosa, só para o rei e a corte. Correção importante pro vídeo: a Coroa de Espinhos NÃO está mais no Louvre — sobreviveu à Revolução e ao incêndio de 2019 (resgatada a tempo) e VOLTOU à Notre-Dame em dezembro de 2024. (O arquiteto da capela, na verdade, é desconhecido — evite cravar 'Pierre de Montreuil'.)","Sacré-Cœur + Montmartre":"O Sacré-Cœur tem uma história mais política do que parece. Foi um 'voto nacional' de expiação após a derrota para a Prússia em 1870 e a sangrenta Comuna de Paris em 1871 — erguido de propósito no alto de Montmartre, justamente onde a Comuna começou. Para uns é monumento de reconciliação; para outros, uma penitência imposta a um bairro operário rebelde — tema sensível até hoje. O arquiteto foi Paul Abadie; as obras foram de 1875 a 1914, mas a consagração só veio em 1919 (atrasada pela guerra). Cuidado pro vídeo: é uma basílica ROMANO-BIZANTINA, não gótica, e não é catedral (a catedral de Paris é a Notre-Dame).<br><br>Dois truques de engenharia: como o subsolo de Montmartre era furado por antigas pedreiras de gesso, a basílica se apoia em 83 poços de uns 33 m de profundidade, pilares invisíveis enterrados. E ela nunca escurece porque é feita de um travertino de Château-Landon que, com a chuva, libera calcita e se autobranqueia — quanto mais chove, mais branca. Lá dentro, um dos maiores mosaicos do mundo (o Cristo em majestade, ~475 m²) e o sino Savoyarde, de quase 19 toneladas.<br><br>Mas o programa de verdade é a colina inteira: Montmartre (o 'Monte dos Mártires', ligado a São Dionísio) foi por séculos uma aldeia de vinhas e moinhos, e virou o reduto dos pintores — Picasso pintou ali 'Les Demoiselles d'Avignon'; Renoir, Van Gogh e Toulouse-Lautrec moraram por perto. Perca-se nas ruelas atrás da basílica (a Place du Tertre dos retratistas, a última vinha de Paris, o muro do 'eu te amo' em 250 línguas) e sente nos degraus pra ver o sol descer. É a despedida perfeita."}

1:[{t:"Galeries Lafayette — cúpula + terraço",why:"A cúpula art nouveau de vidro (1912) e o terraço com vista 360° de Paris — de graça.",photo:"img/galeries-lafayette.jpg",maps:"Galeries Lafayette Haussmann Paris"},{t:"Jardim das Tulherias + margem do Sena",why:"A caminhada clássica do Louvre à Concorde pelo jardim, descendo pra beira do rio no fim da tarde.",photo:"img/tuileries.jpg",maps:"Jardin des Tuileries Paris"},{t:"Île Saint-Louis + sorvete Berthillon",why:"A ilha mais charmosa do Sena e o sorvete mais famoso de Paris, com a Notre-Dame ali do lado ao entardecer.",photo:"img/ile-saint-louis.jpg",maps:"Île Saint-Louis Paris"}],
2:[{t:"Coulée verte (Promenade Plantée)",why:"O parque suspenso sobre um viaduto de trem — inspirou o High Line de Nova York. Começa perto da Bastille.",photo:"img/coulee-verte.jpg",maps:"Coulée verte René-Dumont Paris"},{t:"Musée Carnavalet — a história de Paris",why:"De graça, no Marais: 2.000 anos de Paris em quadros, maquetes e objetos, num palacete do séc. XVI.",photo:"img/carnavalet.jpg",tr:"No Marais, ~5 min a pé da Place des Vosges (pela rue des Francs-Bourgeois).",hist:"Instalado em dois palacetes renascentistas, é o museu da própria cidade — com a placa original da Bastilha, o quarto de Marcel Proust reconstruído e maquetes de como Paris era antes de Haussmann. Coleção permanente gratuita; fecha às segundas.",maps:"Musée Carnavalet Paris"}],
3:[{t:"Musée de l'Orangerie — Ninfeias de Monet",why:"As oito telas gigantes de Monet em duas salas ovais feitas sob medida pra elas. Fica nas Tulherias, na sua rota. ~€12,50.",photo:"img/orangerie.jpg",maps:"Musée de l'Orangerie Paris"},{t:"Petit Palais — Belas-Artes (grátis)",why:"Em frente ao Grand Palais, na sua descida da Champs: um museu de arte lindíssimo, de graça, com pátio-jardim pra um café.",photo:"img/petit-palais.jpg",tr:"Em frente ao Grand Palais, na Av. Winston Churchill. M° Champs-Élysées–Clemenceau.",hist:"Construído, como o Grand Palais, para a Exposição de 1900. Guarda Rembrandt, Monet e Courbet — e quase ninguém entra, porque acham que é pago. O pátio interno com jardim e o café são um respiro no meio do passeio. Fecha segunda.",maps:"Petit Palais Paris"}],
4:[{t:"Galeries Lafayette — cúpula + terraço",why:"Coladinho no Printemps: a cúpula de vidro e o terraço grátis com vista de Paris.",photo:"img/galeries-lafayette.jpg",maps:"Galeries Lafayette Haussmann Paris"},{t:"Palais Garnier por dentro",why:"A grande escadaria de mármore e o teto pintado por Chagall. A ópera que inspirou 'O Fantasma'. ~€15.",photo:"img/palais-garnier.jpg",maps:"Palais Garnier Opera Paris"}],
5:[{t:"Jardin du Palais-Royal — colunas de Buren",why:"O pátio com as colunas listradas de Buren (1986) — a foto preferida dos parisienses, a 5 min do Louvre.",photo:"img/palais-royal.jpg",maps:"Jardin du Palais-Royal Paris"}],
6:[{t:"Champ de Mars — sob a Torre Eiffel",why:"Depois do Trocadéro, atravesse o rio e fique no gramado EMBAIXO da Torre. Outro ângulo, igualmente mágico.",photo:"img/eiffel.jpg",maps:"Champ de Mars Paris"},{t:"Musée du Quai Branly — Jean Nouvel",why:"A poucos passos da Eiffel: o museu das artes não-ocidentais, com a famosa parede vegetal de 800 m² na fachada.",photo:"img/quai-branly.jpg",tr:"Da Eiffel/Trocadéro, ~10 min a pé pela margem do Sena. M° Alma-Marceau / Iéna. ~€14.",hist:"Jean Nouvel (2006) escondeu o museu atrás de um jardim selvagem e de uma 'parede viva' de Patrick Blanc, com 15 mil plantas. Por dentro, uma rampa escura leva às coleções da África, Ásia, Oceania e Américas. Repare nas 'caixas' coloridas que se projetam na fachada do Sena — cada uma é uma sala.",maps:"Musée du quai Branly Paris"}],
7:[{t:"La Défense + Grande Arche",why:"O fim moderno do eixo histórico: um cubo oco de 110 m alinhado com o Arco do Triunfo e o Louvre. Pra arquiteto, é imperdível.",photo:"img/la-defense.jpg",tr:"M° Linha 1 (dir. La Défense) até o fim — direto do centro, ~20 min. Exterior livre (o terraço do telhado está fechado).",hist:"A Grande Arche, de Otto von Spreckelsen (1989), fecha o Axe Historique a 8 km do Louvre — um arco do século XX 'respondendo' ao de Napoleão. É um cubo quase perfeito (110 m) revestido de mármore de Carrara, girado de propósito 6,3° porque o metrô e as fundações embaixo não deixavam alinhar. Em volta, o maior bairro de arranha-céus da Europa.",maps:"Grande Arche de la Défense"}],

9:[{t:"Musée Rodin + jardim",why:"O Pensador no jardim de roseiras, num palacete do séc. XVIII, a 10 min do Orsay. Só o jardim ~€4.",photo:"img/rodin.jpg",maps:"Musée Rodin Paris"},{t:"Café de Flore (Saint-Germain)",why:"O café dos filósofos (Sartre e Beauvoir), perto do Bon Marché. Um expresso na calçada, sentindo o bairro.",photo:"img/cafe-flore.jpg",maps:"Café de Flore Saint-Germain Paris"},{t:"Les Invalides + Túmulo de Napoleão",why:"A cúpula dourada que brilha no céu de Paris, e o sarcófago de Napoleão sob ela. A 10 min do Orsay/Rodin.",photo:"img/invalides.jpg",tr:"Rive Gauche, entre o Orsay e o Rodin. M° Invalides / La Tour-Maubourg. Igreja do Domo + túmulo ~€15.",hist:"Luís XIV mandou construir como hospital e lar de soldados feridos — função que mantém até hoje. Sob a cúpula dourada de Hardouin-Mansart repousa Napoleão, num sarcófago de quartzito vermelho dentro de seis caixões encaixados. O Museu do Exército ao lado é um dos maiores do mundo.",maps:"Les Invalides Paris"},{t:"Jardin du Luxembourg",why:"O parque mais amado dos parisienses: cadeiras verdes na beira da fonte, o palácio do Senado e um clima de domingo perfeito.",photo:"img/luxembourg.jpg",tr:"Saint-Germain/Quartier Latin, perto do Bon Marché e do Café de Flore. M° Saint-Sulpice / RER Luxembourg.",hist:"Maria de Médici mandou criá-lo em 1612 com saudade dos jardins de Florença — por isso o ar italiano. Hoje o palácio é o Senado francês. Os parisienses vêm ler, jogar xadrez e ver as crianças empurrarem barquinhos no tanque octogonal.",maps:"Jardin du Luxembourg Paris"}]
